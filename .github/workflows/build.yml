name: Build Dark Souls Tracker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build tracker
        run: python3 build_tracker.py
      
      - name: Commit and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Build Dark Souls Remastered platinum tracker"
          git push
          git rm build_tracker.py walkthrough.txt .github/workflows/build.yml
          git commit -m "Remove build files (no longer needed)"
          git push
