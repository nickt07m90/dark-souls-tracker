Head up the steps on the other side of the small arena, at the top on your left you can pick up
the Xanthous Set if you defeated the King Jeremiah Phantom, head to the end of the path for a
small scene and to return to Anor Londo, from here head back to the Darkmoon Tomb bonfire.
When you arrive equip the Darkmoon Séance Ring you found in the Catacombs and approach the
large statue which will disappear when you get close enough. At the bottom of the stairs stop at
the rug on the floor (DO NOT ENTER THE FOG) and you will hear a voice speak to you select
Kneel, once it is done you can enter into a Covenant with the Blade of the Darkmoon and unlock
Covenant: Blade of the Darkmoon
Discover Blade of the Darkmoon covenant.

2 guides
you will also receive the Darkmoon Blade Covenant Ring and a Blue Eye Orb. You must gain a
rank in this Covenant by offering up ten Souvenir of Reprisals these can be obtained either by
wearing the Darkmoon Blade Covenant Ring and invading other players, when you defeat the
host you will be rewarded with one, the other option is to try farm them from the Crow Demons in
the Painted World (you can come and go as you please now), I prefer a mix of the two, if you
travel back to Ariamis (you can warp) just do laps of the area killing Crow Demons while wearing
the Darkmoon Blade Covenant Ring and using the Blue Eye Orb time to time, you should get a
decent mix of drops and PvP encounters. Once you have the ten souvenirs you need head back
to the Darkmoon Tomb and offer them up, when all ten have been handed over you will rise in
rank and be given the Darkmoon Talisman, and the Miracle:
🔆
Darkmoon Blade (18/23)
Next equip your best Magic Defense armour pieces and head through the fog door to face the
next optional boss.
Dark Sun Gwyndolin
This boss pretty much exclusively uses magic attacks and will always try to stay a reasonable
distance from you but killing him isn't too difficult. Gwyndolin has three attacks that he will use
as he likes, the first is a Homing Soul Arrow attack, it's best to hide behind the pillars to avoid
this as it can be devastating, the second is a large ball of magic that can pass through the pillars
so running out of the way is the only way to avoid it, finally Gwyndolin will rise up slightly and fire
a volley of arrows at you twice, simply hide or zigzag in the open to avoid them.
The only real strategy here is to zigzag between the pillars and get up to Gwyndolin to land your
attacks, using your weapon two-handed is simple here as Gwyndolin will not use any melee
attacks and you can deal big damage, once you get to close or you manage to land a hit or two
Gwyndolin will teleport further down the hallway, repeat this until Gwyndolin is defeated.

Upon victory you will get 40,000 souls and the Soul of Gwyndolin as well as unlocking
Defeat the Dark Sun Gwyndolin
Defeat Dark Sun Gwyndolin, the Darkmoon God.
5 guides

After having killed Gwyndolin head down to the end of the hallway now (it will be much shorter
once the fight is over) and find three chests which contain the Brass Set, nothing - just an empty
chest, and the Miracle:
🔆
Sunlight Blade (19/23)
With that head back up the the bonfire.
Now that you have killed Gwyndolin the Fire Keeper for the Anor Londo bonfire will become
hostile to you, warp in there and kill her, this will cause the bonfire to be extinguished but that's
ok it isn't a very important one, when she is dead you can collect another Fire Keeper Soul, warp
to the Daughter of Chaos and upgrade your Estus Flasks again, next check your inventory and
make sure you have at least three Purple Moss Clumps in your inventory if you don't warp to
Firelink and go see the female merchant in the aqueduct and buy some.
When you're ready head out into the Blighttown swamp and head over to the pillar just before the
entrance to the Great Hollow, if you look over to your right you should be able to see your old pal
Siegmyer standing beside another pillar, run over to him and speak to him a couple of times (the
first time he will be asleep), when he asks for some moss hand it over and to show his gratitude
Siegmyer will give you the Pierce Shield. If you look behind Siegmyer you should be able to see a
glowing corpse, head over to it defeating any Giant Leeches that get in your way and pick up a
Large Titanite Shard, look over to your left from the corpse and you can see another one
surrounded by more Leeches, kill them all and pick up the Server, with that head back to any
bonfire and warp to Anor Londo (yes the dead bonfire)
Head outside up the stairs and turn left into the room with two Sentinels, don't bother with them
unless you want to and take the doorway on your right, kill the Sentinel you find here then follow
the path up to a passageway, inside you will find two Armoured Tusk enemies, it is best to attack
them with something like the Lightning Spear as they are extremely resistant to physical damage,
when both are dead head out and rest at your new bonfire, kindle it if you can for the next area
and take the elevator at the top of the stairs to enter.
16. The Dukes Archives & Crystal Cave
When you step off the elevator and into the next room you will be attacked from your left by a
new enemy, an Undead Crystal Soldier these guys aren't too tough, back stabs and parry/riposte
attacks work well and are fairly easy to land. There will be two more Crystal Soldiers on this level
then just up the steps will be two more, one wielding a bow and the other a sword as well as a

Crystal Golem on the right behind the second Soldier, time the archers shots and run up the
stairs while he reloads killing him, be careful as a Channeller is in the next room and may take
shots at you from here.
The second Soldier should try to attack you now, walk back down the steps to avoid the
Channellers magic and kill it then head up the steps and take care of the Crystal Golem.
In the next room sprint for the Channeller dodging its spells as you go and try to kill it quickly
before it teleports away (usually at the first landing up the stairs in the centre of this room),
whether it dies or teleports stay on this floor and make a lap of the room killing another three or
so Crystal Soldiers, when you get behind the staircase you can find a corpse with a Soul of a
Brave Warrior on it.
Head up the stairs now and kill the Crystal Archer and the Channeller if it's still alive, at the
landing turn left and head up some more stairs. Kill the Crystal Soldier at the top and then turn
left and follow the walkway to the end for a chest with Twinkling Titanite inside.
Head over to the to the other side of the room and turn left when you can to find another Crystal
Soldier, kill it and head to the corpse in front of you and another Crystal Soldier will attack you
from your left, when you've defeated it you can pick up a Twinkling Titanite.
Head back to the main path and turn left to kill two more Crystal Soldiers, at the end of the
walkway will be a Mimic posing as a chest, when you've killed it you can pick up a Crystal Knight
Shield then head to the elevator platform and take it up.
When the elevator stops look for and head up the only passageway in the room, after a few
moments you will encounter the Crystal General this guy is pretty easy, if you have high stability
just guard his attacks and retaliate when he staggers a bit, when dead you will get 3,000 souls
and the enemy will not respawn this playthrough. Continue through and head up the stairs, about
halfway up you will find a Crystal Lizard, kill it if you can and head up to the top of the stairs to
find a fog door.
Before heading through you should know that you will be starting a 'boss fight' that you cannot
win and it is scripted that you must die here, I recommend that you equip either your Rare Ring of
Sacrifice or if you happen to have any Purging Stones just a regular Ring of Sacrifice will do as
once you die you will be taken to a new area and will not be able to recover any lost souls or soft
Humanity for a while. When you are ready head into the door and simply stand in the centre of
the room until you are killed, there is no point putting up a fight or wasting Estus Flasks as you
cannot win here.
When you are revived you will wake up in a prison cell, use the bonfire and do what you need to
(levelling and repairing etc) then turn to face the cell door to see a Serpent Soldier leaning up on
the bars, attack and kill it to make it drop the Archive Tower Cell Key and let yourself out (if you
want to kill them there are three Crystal Soldiers on the other side of your cell) to trigger a scene.
When you step out of your cell two Serpent Soldiers will run up the stairs. The first will
sometimes attack but the second will almost always ignore you and just keep running up, kill the
hostile one if it attacks then go in the opposite direction and head down the stairs, in the first cell
you come to will be another Crystal Soldier, kill it if you wish and continue down, at this point a
group of enemies you saw released in the little clip before will start racing up the stairs, these are

Pisaca, defensively they aren't very tough but they do have some damaging attacks, when they
lean back and spread their tentacles run/roll away as they are going for a powerful grapple attack
that can do major damage if it lands.
When they are dead continue down the stairs, the next cell door you reach should be locked, so
head down further, the next cell door only houses two more Crystal Soldiers, kill them if you like.
At the next cell should be another two Pisacas, kill them and head into the cell, killing the Crystal
Soldier as you do then loot the corpse for the Archive Prison Extra Key and head back up the
stairs to the locked cell, head in and if you followed her questline correctly and purchased
everything from her in Undead Parish you will find Rhea of Thorolund in her Hollowed state, she
will be hostile and attack you on sight, when you have killed her she will drop a number of
Humanity and the Ivory Talisman.
With that out of the way head down to the bottom of the staircase where another four Picasa lay
in wait, kill them all and head through the doorway, where you will find two more Picasa cowering
in the corner, these two will not be hostile towards you, kill them anyway and they will both drop
a new Miracle:
🔆
Bountiful Sunlight (20/23)
🔆
Soothing Sunlight (21/23)
Look inside the large cell to see Big Hat Logan sitting by the doorway, speak with him and he will
ask you to find a way to get him out, with that done head out side and turn right to see a ladder,
climb up and at the top will be two Serpent Soldiers and a Serpent Mage at the back, kill them all
and open the chest the Mage was guarding to receive the Archive Tower Giant Door Key, from
here go back down the ladder and all the way back up the stairs until you reach another ladder at
the top.
If both or either Serpent Soldier ran past you earlier they will usually come down the ladder to
attack, defeat them when they do or climb up to reach and kill them, before heading into the
large door in front of you turn left and walk along the wooden planks jutting out from the wall, at
the end if you look down you can see another set of planks next to a cell, drop down (head back
to the bonfire and equip Fall Control if you feel the need) and head into the cell when you land,
on the corpse here you can collect the Maiden Set and the White Séance Ring when you have
them both you can drop down the hole in the cell returning you to the bonfire, when you are all
set head back up to the large door and go through using the key we found before.
On the other side, head out onto the walkway, on your right as you step out will be a Crystal
Soldier waiting for you, kill it and continue along where you will see another Soldier with a bow, if
you approach him another Crystal Soldier will attack from the left as you step inside the small
room, kill them both and follow the path back into the massive library, as you enter there will be a
Channeller on your left, try to kill it quickly before it's able to teleport away from you, there will
also be a Channeller above you on another balcony area firing magic at you so do your best to
avoid it, so long as you don’t stand still you should be ok. When the Channeller is dead continue

past him and through a passage into another large room, on your right is a Crystal Soldier and
there will be a Soldier with a bow in the area as well, kill them both and head up the stairs to the
other side.
At the top there will be a Crystal Soldier on your left and on your right (the right side has a bow)
kill them both so they wont bother you and head back onto the stairs, halfway down on one of
the sides you should see a wheel mechanism, approach and turn it to cause the stairs to spin
around then head down to the lower area first, turn right at the bottom of the steps and at the
end of the path is a chest with Twinkling Titanite inside, head up the stairs now to the other side.
At the top kill the Crystal Soldier and turn left to go through a passageway and kill another, on
the other side there will be another Soldier with a bow ahead of you as well as the Channeller
that was firing magic at you earlier, kill the archer and take cover behind a pillar from the magic
attacks.
Head over to the middle area of the balcony is and you should see a hap in the railings where the
stairs would go, walk through the gap to drop onto the stairs below you then sprint up and kill the
Channeller, turn right and follow the path to a chest containing the Sorcery:
🌀
Strong Magic Shield (20/24)
Then go down the stairs to the lower side to arrive where you entered the area.
Turn right at the bottom of the stairs and this time instead of going through the passage go down
the stairs to your right, kill the Crystal Soldier on your way down and when you reach the end of
the stairs turn left and left again to find another set, head down them and then down the main
set in the centre killing anymore Soldiers on the way, at the base of the steps through an archway
ahead of you will be the areas third bonfire. I strongly suggest kindling this bonfire to its
maximum potential as this will be the last checkpoint before the area boss, for the next section I
highly recommend equipping the Fall Control spell.
From the bonfire we are going to head back up the stairs in the centre of the room to the left
hand side and kill the Channellers so they won’t be a bother, with them dead head through the
passageway into the other room with a spinning staircase and walk into the centre with the
wheel, if you look below you there will be a bookshelf on one side of the room with a chest at the
end, what you need to do to reach it is first cast Fall Control and turn the wheel, as the staircase
is spinning you need to run to the bottom of the steps and time it right so you walk off the end as
it spins and land on the bookshelf - for a visual aid here is a great video. When you manage to
reach the bookshelf open the chest to obtain the Avelyn with the crossbow in hand drop down to
the ground and head up the steps in the centre of the room then up the right side, at the top to
the left is a passageway that will take you back into the room with the bonfire and go onto the
moving staircase, turn the wheel so that the lower section will take you to the opposite side of
the room (if you cannot find the stairs you may need to go up another level) and head down to
the balcony and through on opening where you will see a Crystal Soldier with a bow across from
you, unless you use magic you can't touch him, either way climb down the ladder and at the
bottom pull the lever you find to open a shortcut from the bonfire to this new area.

Rest at the bonfire if you wish then in the new section from the lever go into the room to your
left, inside will be a chest with a Blue Titanite Chunk inside. Head out and into the other room
now to find a group of chests, the first on your left is the Set of the Channellers, the next chest
will have the Archive Tower Giant Cell Key, to the right of this will be another chest however this
one is a Mimic, attack and kill it quickly and when dead you can pick up an Enchanted Falchion,
finally walk between the bookshelf and the pillar where the Mimic sat and turn right, at the end of
the path behind the shelf is a chest with the Crystal Ember inside.
Now that we have the Giant Cell Key we can free Big Hat Logan from his cell so make your way
back to the prison area, killing the Serpent Soldiers and Piscasa enemies as you go, when you
have cleared the area open the cell door and speak to Logan who will offer his thanks and
express that he wishes to go to the archives to do research with the intention of sharing any new
knowledge he finds with you, when you have finished talking to him head to the back of the cell
to pick up another Fire Keepers Soul then head back to the bonfire.
Before moving on, make sure you have about 50-100 arrows and maybe a couple of Purging
Stones, both can be bought from the Undead Merchants in Firelink Shrine and Undead Burg, you
will need them to help get a frustrating item soon. When you've got everything you need warp
back to the Dukes Archives and head through the shortcut then turn left and go into the small
room here to find Logan doing his research, to trigger the next step of his questline and obtain
the final Sorcery spell you must purchase all the spells Logan has to offer (yes even those you
may already have), do so now using any soul items you may have spare or farm souls in the
library here or anywhere else you prefer (should cost around 150,000 souls total) this will give
you the new Sorceries:
🌀
Crystal Soul Spear (21/24)
🌀
Crystal Magic Weapon (22/24)
🌀
Homing Crystal Soulmass (23/24)
When that's done, you can go into the other room and pull a lever to open up a new path. Head
down and turn around at the bottom to kill a Crystal Soldier, then open the chest to receive 20
Prism Stones, these items can be used as markers if you are getting lost but are generally
useless, you can now head through the fog door into a new open area.
Climb down the ladder to your left and look in the centre of the area, if you have been following
Siegmyers questline there should be a Golden Crystal Golem in the trees, head over and defeat
it, when you have it will release its prisoner, Sieglinde of Catarina. This is Siegmyers daughter
and she has been searching for her father while he has been off on his adventures, speak with
her a couple of times and she will ask if you have seen him, answer 'Yes' and she will be pleased
to hear it and will tell you she will continue her search, you will be able to find her in Firelink later
on now.
Head back over to the ladder and follow the wall to the back right corner, along the way you will

need to defeat two Crystal Golems, in the corner you will find a corpse with a Blue Titanite
Chunk. In the other corner you will see three more Golems huddled together but they aren't
guarding anything so there is no point fighting them unless you want to. Head back to Sieglinde
and a little past her on your right will be another corpse with the Crystalline Set. That's all the
items in this area, you can now proceed down the hill, killing a couple more Crystal Golems along
the way and enter the Crystal Cave.
This area can be very tough to navigate due to invisible pathways, I have added a video guide
below to give you direction if needed.
Head down the large crystal bridge and at the bottom turn right where you will see a Crystal
Golem on another bridge, head across it and carefully kill the Golem bring sure not to fall, try to
avoid even needing to guard attacks as they can sometimes push you over the edge. Follow the
crystal bridges until you come to a point in the path where you must turn right and you can see
crystal flake things items falling in a cave, this cave has a hidden path inside so head in and walk
wall the way to the other side and up a crystal to find a Humanity, drop down from here to the

path below you where you should see a Crystal Butterfly these enemies are more or less exact
copies of the Moonlight Butterfly boss from earlier in the game, they will not attack you unless
you attack first and can only be killed using ranged attacks so it really is best to just leave them
be.
From where you stand look down to the right and you will see the path continue, follow it up to
the wall where it will seem like a dead end. There should be more crystal flakes here, if you watch
where they land you can make out a path, if you look straight ahead you will see a massive
crystal with a Golden Golem on one end of it, you must walk over to it using the hidden path, just
walk straight ahead without deviating from your path and you should make it across just fine, if
you are having trouble pull out your bow and fire arrows in front of you into the path to mark your
way. Once you reach the other side turn left and head towards the Golden Golem, be VERY
careful fighting this one as it's attacks can easily knock you off if you aren't careful, just keep
your distance and time your attacks, once defeated this enemy will not respawn. Continue along
the crystal until you reach a larger area, turn to your right and you will see the crystal flakes
falling again, drop down here to land on an invisible path and turn around, inside a tunnel will be
two Crystal Lizards, kill them both and head through to the other end of the tunnel where you
can come out onto another hidden path, this is the tough one for a quick guide to cross it watch
here.
Use your bow to mark out the path, it will at some point turn to the right and again to the left,
once you finally make it to the other end you can collect the Blue Titanite Slab for the corpse
resting here, once you have collected it I suggest using a Homeward Bone to return to the
bonfire and making your way back rather than trying to navigate the path once more back to the
tunnel. Whichever method you choose, make your way back to the entrance of the tunnel you
took to the slab when you dropped onto a hidden path and look straight ahead, using your bow if
necessary make your way across to solid ground again, after this there are no more hidden paths
so you can relax now. If you head over to the left in the direction of the Crystal Butterfly you can
find a Soul of a Hero, after that head in the other direction to find a large open area, in this room
there will be five of the Man-Eater Shell creatures, to avoid just about all of them, put on your
Ring of Fog and head to your left as you enter and make your way to the far wall, when you reach
the wall there will be a Shell on your left that may pop up onto its legs but it will usually just stand
there and leave you alone, from the wall follow it down until you come to one of them you cannot
avoid, kill it and do not move.
Just ahead is the boss arena, this is the only boss in the game which does not require a fog door
to initiate, sort your equipment to make sure to have high Curse resistance and ensure you have
a weapon with a vertical slash attack (either one or two handed), katana and greatsword
weapons are generally best for this, you will need one as the next boss has the final tail we must
remove. When you are all set head into the room to face
Seath the Scaleless
When the battle begins head towards the glowing crystal on the other side of the arena and wait
for Seath to get a bit closer to you, when he does either let him use his crystal breath attack or
attack the crystal yourself to destroy it, doing this will stun him for a couple of seconds, while

you can run around to the back of Seath where you can find the second (middle) of his three
tails, you must attack the very tip of the tail using your weapons slash attacks to remove it, you
must attack the tip as it will not work if you are too far down the tail, also be wary as Seath may
start swiping his tails from side to side or slamming them into the ground in retaliation, if he
performs either of these attacks just back off and work on getting around him again for another
shot at his tail, once you manage to chop it off you will get the rare weapon:
⚔
Moonlight Greatsword (22/50)
Once you have the tail, the rest of the fight is much simpler, especially if you equipped Curse
resistant clothing/armour. Head around to the front of Seath and start attacking him while trying
to generally stick to the right side of him (your right/his left) he will now almost exclusively use
his crystal breath attacks with an occasional claw swipe, with your high Curse resist you
shouldn't have to worry about succumbing to it, if the bar starts to fill up too much simply get
some distance between you and Seath until it empties and start attacking again, just keep an eye
on your health and Seath will soon fall.
Upon his death you will be rewarded with 60,000 Souls, Humanity and the Bequeathed Lord Soul

Shard as well as unlocking
Defeat Seath the Scaleless
Defeat Seath the Scaleless, inheritors of souls.
1 guide
When he has disappeared, a bonfire will materialize in the room. Use it and warp back into the
Dukes Archives.
Upon your arrival head in to the small room with Big Hat Logan and try to speak with him, if you
purchased all of his spells before he will no longer recognize you and will now become agitated
when you try to speak to him, do this a couple of times and go back to the bonfire then warp to
Firelink and back to the Archives, head back into the small room and Logan should now be gone,
if not repeat this until he does leave.
Head back into the library now and up the central stairs and then up the set on your left, at the
top turn right and go through the passage to the other side and turn right again where you
should find a lever, pull it to bring back down the elevator you first used to meet Seath in the
unwinnable battle at the beginning of this area.
When the elevator has reached the top follow the path into the large room where you will now
find Big Hat Logan in his Hollowed form. Battle Logan but be careful as he has extremely
powerful magic and he will often use Homing Soulmass. Try to get in close and once you do just
attack as much as you can until he goes down. When Logan has been defeated you can loot him
to receive the Big Hat, Tin Crystallization Catalyst and the Sorcery:
🌀
White Dragon Breath (24/24)

If you have been buying all the Sorcery spells from both merchants and following this
walkthrough to gain the loose spells throughout the game you will now unlock
Wisdom of a Sage
Acquire all sorceries.
2 guides
In the centre of the room is a chest you can now open to find the Large Magic Ember, with
everything there is to do here complete use a Homeward Bone or head back to the bonfire and
warp to Firelink Shrine.
When you arrive speak to Sieglinde and she will again ask you if you have seen her father, tell her
'Yes' and she will be happy once more then head down to Anastasia and have her upgrade your
Estus with the Fire Keepers Soul you found in the Archives with that done go to the bonfire and
now warp to the Daughter of Chaos in Quelaag's Domain.
Before we continue, make sure you join and have reached at least Rank 2 in the Chaos Servant
Covenant (30 soft Humanity required) as you need this to open a shortcut we will be using soon,

doing so will also award you the Pyromancy:
🔥
Chaos Storm (17/19)
When you are ready, head out and turn right to go down a long tunnel and arrive in the next area.
17. Demon Ruins to Lost Izalith
As soon as you enter the Demon Ruins you will find a bonfire in front of you, rest to create a new
checkpoint and then head down the hill, when you reach the bottom you will see that the entire
area is covered with lava, turn to face the way you came and on your left down a path you will
see a fog gate, make your way over to it and enter to face the next boss
Ceaseless Discharge
There are two different ways you can go about defeating this boss, you can either battle him and
win legitimately or you can bait the creature into pretty much killing itself, granting you an easy
victory.

Above is a video showing you how to kill the boss using a little exploit, for those of you that like a
challenge though walk through the area where you will eventually find the boss however he will
remain docile for now unless you attack and provoke it, instead continue around the bend until
you come to a dead end with a corpse on an altar, pillage it and you will collect the Gold-
Hemmed Black Set as soon as you have picked the set up Ceaseless will begin its assault. If you
head out onto the cliff face and stay within melee range you will have a much easier time.
Ceaseless Discharge uses the following attack patterns -
- Fire Blast attack (only used from a great distance) shouldn't be a problem if you stay in melee
range
- Tentacle swipe attack
- Double tentacle swipe followed by a slam attack
- Stabs the ground in front of it multiple times with tentacles
- Single slam attack after which tentacles will sit on the cliff for a small amount of time
The method to use here is to try to guard/dodge all of the bosses attacks while waiting for it to
perform the single slam attack after which it leaves its tentacles open for attack, then it does
wield your weapon with two hands and attack as much as you can until it withdraws and repeat
the process. If going for this method I recommend using some armour with a solid stability rating
such as Stone armour or something similar as well as the Cloranthy Ring and just try to defend
and tank most of its attacks until you get your opening, the boss doesn't have a lot of health and
should be felled within 5-10 minutes rewarding you with the usual Humanity and Homeward Bone
as well as 20,000 souls for your efforts (sadly people tend to take the easy way so videos of a
legit fight are tough to find, I plan to record my own in the near future).
After the death of Ceaseless you will see a small clip showing all of the lava being drained from
the lower areas, return to the bonfire if you need to and prepare, you should also become Human
if you want to face Kirk of Thorns again as he will invade you in the next area. When you are
ready to go, head to the bottom of the hill to continue deeper into the ruins.
As you head down into the area all the lava was drained from you will see a large group of Minor
Taurus Demons, ignore for now and instead go to the right making your way across (it should be
obvious that you should avoid walking in the lava, at least for now). As you head over collect the
Soul of a Proud Knight from a corpse and continue until you face a Minor Capra Demon. Both this
and the Minor Taurus Demon are simply weaker versions of the bosses you faced earlier in the
game, they have the same attack patterns and should be quite easy to kill.
Continue and head down to the area the Capra was guarding and walk along the ledge down to
another area with more Capra Demons waiting, when you almost reach the bottom of the slope
Kirk of Thorns will invade you (if you are Human of course) turn around and head back up the
slope to find him coming for you. Kirks attacks are pretty much the same and he has around
1,000HP, once you defeat him he will drop the Spiked Shield. Head back and go through the
gauntlet of Capra Demons, if you need to, wear your Ring of Fog and use a bow to try and lure
them so you can face them one on one to make it a bit easier.
When all the Capra are dead go down the set of stairs you should see at the end of the path, at
the bottom on your right will be a Demonic Statue an easy but annoying enemy that should die in

one or two hits, just rush and attack them quickly when you find them and they shouldn't give
you any bother.
After you have killed the statue, turn to your right and walk along the wall to find a large bug
coming out of it, this Burrowing Rockworm is guarding a bonfire hidden just under it, while they
are normally a bit stronger this one is a bit weak so you can either use a couple Pyromancy blasts
or just run up and hit it with a couple two-handed attacks and it should die, rest at the bonfire
when you can to create a new checkpoint.
When you are ready to go again, collect the Soul of a Proud Knight just next to the bonfire then
head back to where you fought your first Demonic Statue. Kill it again and the collect another
Soul of a Proud Knight on the ledge to your right, when that's done head down the next set of
stairs, killing the four more Demonic Statues on the way. At the base of the stairs a Rockworm
will emerge from the ground on your right, ignore it and turn to your left and follow the path to a
Minor Taurus Demon, these guys are fairly slow and their attacks easy to avoid/guard if you have
high stability but be careful on these narrow paths as they can easily push you off with an attack
or even as they turn themselves around to try face you by nudging you over the edge. When
you've killed the Taurus continue along and kill another, try to roll past this one so you can fight it
on more solid ground and make it a bit less risky for yourself. Once the second Taurus is
defeated sprint down the path towards the chest at the end, as you head down Rockworms will
come out to attack you from the ceiling, just avoid them and keep making your way to the chest
at the end, once you reach it you can collect the Large Flame Ember. You now have a choice, you
can either try to fight your way through all the Rockworms or you can use a Homeward Bone or
similar method to warp back to the bonfire, personally I prefer to warp but it's up to you,
whatever you decide to do head back to the bottom of the stairs again (if you do fight the
Rockworms try your best to avoid their acid spray attack as this causes your equipment to lose
durability and break).
At the base of the stairs run straight ahead of you (avoid the Rockworm) and take down the
Taurus guarding the doorway, when it's dead turn right and kill another Capra and pick up the
Soul of a Brave Warrior. Head up the small stairs now and kill the two Demonic Statues then head
inside and pass through the fog door to face the next boss -
Demon Firesage
You shouldn't really need a lot of instruction here. As you can see it is just another cut/paste of
the Asylum/Stray Demon from the Undead Asylum area, simply use the same tactics you would
have defeating the other two, just try your best to avoid getting pinned up against the walls or
into a corner as he will kill you easily using its slam attack.

When you defeat the boss you will receive 20,000 souls as well as Humanity and the rare
weapon:
⚔
Demon's Catalyst (23/50)
Head out into the next room where you will see you have the option of either going up or down
some stairs, for now head up, killing all the Demonic Statues along the way. near the top you will
come to a group of three statues huddled together, lure the first two out and kill them individually
then kill the last of the group and collect the Soul of a Brave Warrior they were guarding. From
there head up another set of stairs to find a platform, stand in the centre to ride an elevator up
and create a shortcut back to Quelaag's Domain just next to the Chaos Princess bonfire. For the
next bit you should ensure you are now Rank 2 with the Chaos Servant Covenant, this will require
30 Humanity offerings (it may also help to rejoin if you have abandoned it as it can cause issues
if you are not in the Covenant), when you have done so, head back down the elevator and back
to where you fought the Firesage.
Head towards the doorway out into the Demonic Ruins and turn left at the hole in the wall where
the tree roots are coming from. Head down the slope and onto the left-side ledge and follow it
until you come to another tree root that acts as a path to lead you safely down to the ground
below, head forwards and down some stairs, at the bottom you will seemingly come to a dead
end with some Chaos Bugs around the place, kill them all as they do give you some useful drops
occasionally in the form of Red Titanite Chunks and Sunlight Medals (used to raise level in

Warriors of Sunlight Covenant). When all the bugs are dead walk up to the wall and interact with
it, if you have followed my instructions so far it should open a new pathway for you, opening a
shortcut to the Lost Izalith area however that is not what we are here for. On the other side of the
wall will be more Chaos Bugs, specifically though we are after one with large red eyes, to be safe
kill them all, you will know if you have found the right one as it will drop the Sunlight
Maggotheadpiece, this is a key step into completing Solaire's questline, when you are done
warp/walk back to the Firesage boss room and now head down the set of stairs to find another
bonfire.
Ahead will be another boss fight, I would suggest becoming Human at the current bonfire so that
you may summon some help from Solaire as it will make the next boss much quicker/easier, when
you are ready proceed down the tree root, at the base just to the left will be the summon sign for
Solaire if you chose to become Human, summon him and head through the fog door to face the..
Centipede Demon
With Solaire by your side, simply wait and the Centipede Demon will eventually come to you, just
guard its lunge attacks and it will jump onto the piece of land you are standing on where it will
focus most of, if not all of its attacks on Solaire, use this to your advantage and two-hand your
weapon attacking the Demon relentlessly. Every now and then the Demon will use a grabbing
attack on Solaire, during this time it will be immune to attacks so use this as an opportunity to
heal or buff up if you need to then finish the boss off.

When it has been defeated you will receive 40,000 souls, the Orange Charred Ring and for
having Solaire tag along you should get a Sunlight Medal. The Orange Charred Ring is an item we
will make a lot of use of as it vastly reduces the amount of damage you take from walking in lava,
for now head back up to the bonfire then warp to the Chaos Servant room again.
Now that we have the Orange Charred Ring and its protection from lava, head into the Demon
Ruins and over to that area from early infested with Taurus Demons, use your Ring of Fog ad bow
to defeat them all one by one as facing two or more at a time is not really a good idea, once they
are all wiped out equip the Orange Charred Ring and collect the items off of the two corpses
surrounded by lava, the one on a small patch of land will be a Large Soul of a Proud Knight, the
other will be the Chaos Flame Ember.
When you are ready, rest at a bonfire then go back to the path with the Chaos Bugs from before,
you should now be able to find Solaire here (assuming you killed the correct bug) extremely
depressed as he has failed to find his sun. When you are satisfied you have exhausted his
dialogue go back to the room you fought the Centipede Demon in and head to the back left of
the room to find a tunnel with a bonfire at the end, rest if you need to then press on and into the
lava (make sure you have the ring on) and onto a tree root that rises above the lava, follow this
through an opening to enter
Continue along the root and you will see amongst the lava a new enemy, these are Bounding
Demons - they can be deadly and will not respawn once killed but it's best to leave them alone.
Follow the tree root until it curves around a pillar and brings you to a Soul of a Brave Warrior then
look through the lava to see another root rising out beside the next pillar and run over to it, follow
this to the end and it should point you in the direction of a building, run over to it, picking up
another Soul of a Brave Warrior along the way.
When you reach the building there should be one or two Demonic Statues to kill, then head
around the left side where you will find an opening with a chest, open it up to get a Soul of a
Great Hero. Head back out and around to your right where you should see another building
across the lava, head in that direction but first walk onto a tree root on your right that leads to
the upper area of the building you are aiming for to find Twin Humanities up top, backtrack down
the root so you can approach the building. When you reach it walk around to the left hand side
and attack the wall there to open a hidden doorway with a bonfire inside, rest here and kindle for
maximum Estus use, it is also worth noting that if you become Human here you will be able to
face and defeat the final spawning of Kirk of Thorns in the next area, do so if you wish then
check your arrows stock, if you are running low, warp to Firelink Shrine and visit the Undead
Merchant inside the aqueduct you would take to Undead Burg/The Depths and buy enough
arrows (around 300 should do), if you need to also buy more Homeward Bones and use one to
take you back to the bonfire you just found in Izalith. When you are all ready head outside, across
from you will be a large, broken cylindrical stone structure, head through it and up a tree root

inside to enter the ruins.
As you descend into the next area there will be a group of Demonic Statues, one will be hiding
underneath the root you walked down on so watch your back. Continue through a covered area
where around five or so more Demonic Statues wait for you, kill the lot and head out to find one
more on its own, kill it and instead of heading up the stairs, go around the pillar beside them and
pick up a Large Soul of a Brave Warrior.
Ascend the stairs now and at the top will be a new enemy, this is a Chaos Eater, they can be
frustrating if they get the advantage, the best way to handle them I find is sprint in and attack to
put them off guard and try circle them and finish them off from the back. Go into the room it was
guarding and out to your right, head up the stairs in front of you to face the Daughter of Chaos,
she will use some strong Pyromancy, just try to get around her and place your attacks well to
take her down quickly, when defeated she will drop the rare weapon:
⚔
Izalith Catalyst (24/50)
Once she is defeated Kirk should now spawn for the final time in the same area, nothing is
different with him, just aim for a backstab or riposte for a quick kill, now that he is defeated, the
next time you go to the Daughter of Chaos bonfire (Chaos Servants) you can find his armour -
the Set of Thorns in the back of the room.
With those two dead follow the path (ignore the fog door for now) to another Chaos Eater, kill it
and open the chest to receive the Pyromancy:
🔥
Chaos Fire Whip (18/19)
With that head back to where you entered this section and turn left, ignore the first tree root you
immediately see and go beyond it to find another one and follow it down where it ends at a thin
ledge. There will be a couple more Demonic Statues here so take care of them then follow the
path around the structure to find a Soul of a Hero. Return to the root but instead of taking it back
up, you should be able to see another corpse resting on a root hanging above the ground, aim
carefully and drop down onto it to collect a Rare Ring of Sacrifice, this can be very tricky to get
so if you miss the first time or two feel free to pass it up as it isn't an overly important item, either
way head back up to where the tree root started and head down the first one this time.
When you reach the bottom there will be a large group of Demonic Statues floating around, kill
the entire lot and then stand in the centre and look down a dark tunnel. Along the wall you will
see a corpse with loot on it, do not head this way though as it will ruin an important part of the
game for you. Instead head into the middle of the floor and it will give way, you will however land
on solid ground. In front of you is a pit with four Chaos Eaters directly underneath, on the other
side is your old friend Siegmyer of Catarina, if you had attempted to loot the corpse you would
have fallen straight into the pit with the Chaos Eaters which you cause you to miss this important
piece of Siegmyer's questline. From where you landed turn right and follow the path around to a
tree root you can walk on and use it to make your way to Siegmyer. Before doing anything else,

take out your bow (possibly equip the Hawk Ring for more power) and kill three of the four Chaos
Eaters below you, try to take not of how many shots it takes and on the final Chaos Eater attack it
until it has just a little health remaining. When that is all set up, speak to Siegmyer and he will
proclaim that it is finally his turn to aide you, he will then jump into the pit and kill the remaining
Chaos Eater and then go rest up against a pillar. Equip your Rusted Iron Ring and jump in after
him, you will become immediately poisoned but you should be ok, on your right there will be a
fifth Chaos Eater, if it attacks it's up to you if you want to let Siegmyer kill it himself or help him,
he is able to kill it in one or two hits so he should be ok, but if he gets hit it could impact the
result you are aiming for. If you do help him be very careful to avoid connecting an attack with
him and causing him to become aggressive towards you. When you are all safe again speak with
Siegmyer, if he managed to survive with over 50% of his health remaining he will simply speak to
you then go back to sleep - this is what you want to happen, if however he has less than 50% he
will end his own life and drop the Speckled Stoneplate Ring. After finishing with Siegmyer collect
the Red Titanite Chunk pieces on the corpses here then head out where the fifth Chaos Eater
waited and turn left then left again and finally take a right, you should see a chest at the end of
the passage, inside will be the Red Titanite Slab.
Return now to where you fought the fifth Chaos Eater and this time head in the other direction
then turn left to find the stairs out, at the top look for another tree root and follow it all the way
out of the hole. If you are running low on Estus, I would suggest heading back to the bonfire as
well as spending any spare souls you have as you may lose them in the next boss battle and
recovering them can be very difficult, if you feel you are ready though, you can head back up and
to the fog door where you will face the...
Bed of Chaos
The Bed of Chaos is a very unique boss as it is unlike any other in Dark Souls, this boss is fought
over three stages, each becoming more difficult as you make progress, another unique
characteristic with this boss is that your progress will be saved should you die so if you destroy
one or two roots they will still be destroyed the next time you enter the arena. To begin with you
will see two orange orbs on either side of the boss, to begin with head over to the right side one,
at the moment the only attack the boss will use is a slow swipe attack with its branches/arms,
you should be able to easily block and absorb the it if you are using a shield with relatively high
stability. Once you reach the orb enter and break down the roots and attack the large glowing
yellow root in the centre, doing this will trigger a cut scene where a large flaming sickle-like
tentacle will emerge from the boss. For the next stage you must now make your way across to
the other side, be careful though as now the floor will begin to give way in specific areas and the
enemy will now use a stabbing attack on top of its swipes, once you reach the other side you
want to try and position yourself HERE in this position you will be out of reach of the Bed of
Chaos' attacks, simply pull out your bow and aim in amongst the roots, with enough arrows you
should hit your target which will trigger a second tentacle protruding from the boss.
For the final phase of this battle you need to head back to the centre of the room where you
would have landed after sliding into the boss arena, be careful as the Bed now has two attacks in
which the floor will be covered in flames, make sure you heal up when or after this happens as it

can take quite a toll on your health. When you reach the centre you need to run towards the boss
but do not do so recklessly as the floor in front of it will give out and crumble, on your right will
be a piece of flooring that will stick out slightly further than the rest, walk off of the edge here
and you will drop onto a tree root below, run up the root and into the heart of the boss through all
the roots that block your way. At the centre you will find the Bed of Chaos' heart, just attack it
once and the battle will be over.
You will receive 60,000 souls as well as a Lord Soul, you will also unlock
Defeat Bed of Chaos
Defeat the Soul Lord Bed of Chaos.

2 guides
A bonfire will now appear in place of the Bed of Chaos' heart, use it to travel to Firelink Shrine.
18. Cleaning Up & Kiln of the First Flame
Once you arrive at Firelink, Sieglinde should be just beside the bonfire, if you were successful in
having Siegmyer defeat the Chaos Eaters in Lost Izalith speak with her and she will tell you she
has found her father, exhaust all dialogue with her until she just repeats herself then warp from
Firelink to Stone Dragon in Ash Lake, from here make your way out and through the area to the
bonfire on the other side (near where you killed the second Hydra). Sieglinde should be here
standing over the body of her father, speak to her and she will explain that he had gone Hollow,
in her gratitude for everything you did for her father Sieglinde will hand you a Titanite Slab.
Use the bonfire in Ash Lake to now warp to Undead Parish. From there make your way to the
bonfire in Darkroot Basin. Behind the bonfire will be an elevator, ride it to enter a small area
called Valley of the Drakes. At the bottom as you walk out you will find the enemies that give this
area its name, Drakescan be very dangerous and it is highly advised you do not attempt to take
on more than one, they mainly attack with a lightning breath which will hit through your armour
and shield for reasonable damage, if you decide to take a couple on you can collect the Bandit
Set and a Spider Shield. Head up the path along the cliff face in front of the bridge, around a
corner you will have to fight a Drake in a very tight spot, do your best to get in close to force it to
use melee biting attacks rather than it's lightning and attack when you get the opportunity,
another method is to use Pyromancy if you have any equipped, once its dead head into a small
alcove just to the left and collect a Humanity then continue to the top of the path to find a
second Undead Dragon.
This Undead Dragon will be reasonably weaker than the one in Ariamis, with around 500 less HP
as well as slightly weaker attacks. The method we used on the first dragon doesn't really work
here as you don’t have much room to work with, the best method I find is to simply run in whilst
trying to avoid the miasma of toxic breath, attacking the claw and then defending, even while
defending you will take a decent amount of damage but if you back off after every attack or two
and heal up you should be able to defeat the enemy fairly quickly. When the dragon is dead you
can pick up the Soul of a Proud Knight as well as the following rare weapons:

⚔
Dragon Crest Shield (25/50)
⚔
Astora's Straight Sword (26/50)
Next on our list of things to do is to head to your nearest bonfire (or use a bone/spell to reach
one) and warp to the Daughter of Chaos, then head out into the Blighttown swamp and find
Quelaana, now that you have defeated the Bed of Chaos speak with her, she should now award
you with the Pyromancy:
🔥
Fire Tempest (19/19)
If for some reason this doesn't happen, the next best thing is to ensure your Pyromancy Flame is
upgraded to a level you are happy with and then kill Quelaana (make sure you have purchased all
spells first) when she dies you should be able to pick up Flame Tempest from her corpse. If for
some reason neither of these work, you can just kill her when you meet in the next playthrough to
get the spell, once you do have it you should now have all Pyromancies allowing you to unlock
Bond of a Pyromancer
Acquire all pyromancies.

way to the Sunlight Altar near Undead Parish and rejoin the Covenant if you need to and then
offer up all of your Sunlight Medals, once you rise in rank with the Covenant you will be awarded

and ride the elevator down. Head out into the cathedral hall and after killing the first Royal
Sentinel go up the stairs on your right, take care of the Silver Knight in your way and at the top
head towards the windows beyond the door leading to the blacksmith to see that one of the
windows has been removed. Walk outside and follow the steps down to a corner, you should now
be able to see a corpse hanging over a ledge between the railings of a fence, walk along the
ledge you are on and drop behind the fence to reach the corpse and collect the rare weapon:
⚔
Dragonslayer Greatbow (27/50)

into the Kiln of the First Flame.
The Kiln of the First Flame is the final area of the game, we will quickly explore this as it does
have some very important items for us. Head inside and you will find a vast landscape covered in
mountains of ash, the area here is very straightforward with only five enemies in total as well as
the boss at the end. Each enemy you encounter will be a variant of the Black Knights you have
dealt with over your travels through the game, these are very useful as they do respawn after
visiting a bonfire and as well as having a 100% drop rate for specific chunks of titanite they all
have the chance to drop the weapon they wield, I would advise before heading any further that
you equip your Covetous Gold Serpent Ring to increase your chances of obtaining each weapon.
Below I will list the order in which you face the Black Knights as well as what they will drop,
remember that each titanite chunk is a 100% drop. Please note some of these checkboxes are

To do this you will need a total of 63 Titanite Shards, which brings us to our next farming option,

Serpent Ring on for shard drops or you can farm souls in any location you like and then purchase
the shards for 800 souls each from either Andre of Astora (Parish) or the Giant Blacksmith (Anor
Londo) either way farm the lot and upgrade all your weapons to +5, you then need to begin
farming 63 Large Titanite Shards, these are a bit more of a pain to get, you can find them as an
uncommon drop from Balder Knights and Slime or rare drops from Giant Leeches, they are also a
100% drop from the Heavy Knight located on the bridge to face Priscilla in Ariamis, finally you
can buy them for 3,800 souls a pop from the Giant Blacksmith in Anor Londo, the best method I
find is the Heavy Knight in Ariamis, if you take into account the 8 Hollows you kill on the way to
fighting the Heavy Knight you earn a total of 4,180 souls, if you continue farming this way you

extra effort and kill the Phalanx enemies each run you can earn much more, however you decide

Blacksmith, he will be able to complete the final stage of the process and turn all your boss souls
into weapons, be sure to mark off each weapon on your checklist as you make it so you will know

Our last mission is to upgrade a weapon in each elemental category to it's maximum potential, to
do this we will first need to farm 30 Green Titanite Shards, they are dropped by both Slimes and
Giant Leeches, I find that the Leeches are the much better option as they drop five shards at a
time and if you wear the Covetous Gold Serpent Ring it shouldn't take you too long to collect
them (you can also use 10 soft humanity to bump up your drop chances) or you can buy them
from the Giant Blacksmith for 4,800 souls each. Next you will need 8 Titanite Chunks of each
coloured variety, if you did not farm these before from the Black Knights in the Kiln of the First
Flame, now would be the time to do so. Once you have all the necessary materials you must visit
certain blacksmiths to upgrade certain weapon types, here is a list of who will help you in each

Vamos (Catacombs) - Fire and Chaos

making the trip and he will be available for summoning on your left just after you defeat the
second straight sword wielding Black Knight, I would also suggest equipping the Flame
Stoneplate Ring, Cloranthy Ring and the Flash Sweat spell, when you are ready make your way
down to the fog door and proceed through it to face...
Gwyn, Lord of Cinder
If you have summoned Solaire to aid you in this battle you will have a very quick and easy fight
ahead of you as Gwyn will focus the great majority of his efforts almost exclusively on Solaire
leaving you to take shots at him whenever an opening presents itself. If you did not summon
Solaire this will be a fairly more difficult fight but it shouldn't cause too much grief. The key to
this battle if fighting solo is parrying and ripostes, if you have learned to use this technique

through the game your fight with Gwyn will be a much smoother one, all you need to do is learn
the timing of his strikes, the only attack you really need to watch out for is when Gwyn reaches
out with his arm and grabs you, this attack can cause a great deal of damage, however if you are
able to back off enough or roll out the way it leaves Gwyn wide open for attack or gives you
enough time to quickly heal yourself, just try to keep an eye on your health and try not to let it
get below roughly 50% maybe 60% to be on the safe side, if parrying isn't your thing just wait it
out and attack Gwyn whenever he leaves an opening with his grabbing motion, it may take a few
trips to practice but with enough you should be able to defeat him.
Once Gwyn has been defeated you will be awarded the Soul of Gwyn, Lord of Cinder and 70,000
souls as well as a choice, this game has two different endings and what you do next will
determine which ending you go with. You can either approach the fire in the centre of the arena
and reignite it yourself thus continuing the Age of Fire and fulfilling your destiny as an Undead or
you can simply leave and bring about a new Age of Darkness becoming the lord of the land,
which ever you choose you will unlock the corresponding achievement -

19. NG+ & NG++
Now that we have gone through the game once, and have experienced the vast majority this
world has to offer, our next two adventures through Lordran will be reasonably quicker. It will be
extremely fast with our third and final playthrough.
Play through the game as you normally would for the second playthrough of the game, if need
be, follow the same guides for each area as you would with playthrough one. Your main goals for
your second playthrough are:
● Obtain all Boss Tails you failed to acquire in your first playthrough. (If the boss has less
that 25% HP and you do not have the tail, either Homeward Bone, or quit out of the game
and start the fight over until you get it)
● Be sure to defeat Smough and Ornstein in the correct order to obtain the correct soul (if
you have been following this walkthrough correctly, you should need to defeat Ornstein
first this time around)
● Obtain at least one of each Titanite Slab, and complete the upgrading process for those
missed in playthrough one.
