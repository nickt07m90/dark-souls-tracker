With the Four Kings dead another NPC will make himself known to you so long as you have not
spoken to Frampt in Firelink since receiving the Lordvessel (though if you are following this
walkthrough you shouldn't have) - Darkstalker Kaathe. Speak with Kaathe and he will explain his
motives and goals, when he is done select 'Yes' and he will transport you to the Lordvessel Altar,
when you arrive place the Lordvessel and then speak to Kaathe once more and he will tell you
what you need to do next, acquire the other three Lord Souls by killing their owners, when he has
finished speaking talk with him again to be taken back to the Abyss.
When you arrive back speak with Kaathe one more time and he will offer to teach you the art of
Lifedrain, accept his offer and join his Covenant to be given the following rare weapon and
achievement:
⚔
Dark Hand (12/50)
Covenant: Darkwraith
Discover Darkwraith covenant.
6 guides
With everything done here, use the bonfire now to warp back to Firelink Shrine.

Your objective now is to make sure you have a weapon with the Divine attack type imbued to it as
the next area will be much easier with one, it's also worth noting that a higher Faith stat will allow
you to deal a lot more damage with a Divine weapon if you want to level that up as well though in
my opinion it isn't worth it as it takes a lot of souls invested to see any real improvement. Finally
the last thing it may be worth doing is heading back to the Depths area and killing Basilisk
enemies until you get 7 Eyes of Death, these will be used with an upcoming Covenant which you
must level up in before killing a boss making it impossible to do so until NG+
When you are ready to continue rest at the bonfire in Firelink and head into the temple area
where you will see a large sleeping creature, this is Kingseeker Frampt, it's pointless to speak
with him though, as we have joined Kaathe he will simply leave if you try, instead head around
him on the left and through a doorway then turn right and down a hill into the graveyard.
Down the slope you will encounter two Skeletons, you must land the killing blow with a Divine
weapon otherwise these enemies will continue to come back to life (and no you cannot farm
souls from the same enemy over and over), when they are dead face the way you came and on
the right you should see loot, go to it and kill two more skeletons and pick up a Large Soul of a
Lost Undead.
Back where you killed the first two skeletons look just to your left where you can see another
Large Soul of a Lost Undead then look left down a small path to another corpse in a cluttered
group of tombstones, when you reach it two more skeletons will rise, one in front and one behind
you, kill them and pick up the Caduceus Round Shield.
Back at the first skeleton fight, head up on your right side now and over to a much larger
tombstone with a corpse in front where a Giant Skeleton will spawn, these guys are a little
tougher but they are fairly slow, the main attack to watch for is a slamming motion when they
hold their sword in both hands by the hilt and the blade, when it's dead collect the Winged Spear
from the corpse. From here continue to another large tombstone just ahead where you will find
another Giant Skeleton and three or four smaller ones, take your time and kill them all (I find it
best to kill the faster ones first then focus on the big fellow). When they are dead, collect the
Zweihanderweapon from the corpse resting on the large tombstone, look further down the hill,
not too far away is another corpse, jog down (no more skeletons) and pick up the Binoculars
from the corpse.
Head back up towards the start of the graveyard and now look for a staircase leading down on
the face of the cliff, follow it down to reach the next area.
14. Catacombs to Tomb of Giants
Continue down til you get to a spiral staircase along the wall, a skeleton will come to you and
there will be floating heads called Wisps above the void, if these get close to you they will
explode and cause a decent amount of damage, when they begin to flash and scream try get as
far away as you can, while still keeping an eye on the skeleton if it's still alive, at the bottom of
the stairs and through a tunnel you will be on a ledge with another skeleton, kill it and then climb

down the ladder on the left.
At the bottom kill two more skeletons and head into a hallway on the left, on the other end kill
two more skeletons and go through a hole in the wall on your left to come to a room with a new
bonfire and a Necromancer, these are the enemies responsible for causing the skeletons to
reanimate after you've killed them, there are six in total in the Catacombs area and once they are
all dead you will no longer need to rely on your Divine weapons to stop them coming back to life
as the Necromancers do not respawn, when you can rest at the bonfire and then use the lever
beside it to create a new opening in the other room.
Head out and turn left up the new path, try to avoid getting too close to the statues as some of
them can be traps. At the top of the path on your right you will see another Necromancer, if you
are wearing the Ring of Fog he should leave you alone, otherwise he may use Pyromancy (namely
Fireball) attacks. Take the path on your left and kill the three skeletons you come across then
head up a small ramp into the crypt-like area where there will be three or four skeletons as well
as the Necromancer, try to take him out first then deal with the rest of the enemies.
Head out through the only other exit, a skeleton will drop down from a higher ledge and attack,
kill him then look for a room on your right with two more skeletons inside, kill them then search
the corpse for a Lucerne.
Back on the main path continue along killing a couple more skeletons as you go and take a left
when you reach a fork, when you enter a larger room kill the two skeletons here (one should have
a bow) and look along the walls, on a corpse will be a Large Soul of a Nameless Soldier. With the
room cleared look through the openings and outside one you will see a path with a bridge
covered in spikes, head out this way and turn right, you need to sprint down this path avoiding
the statues, exploding Whisp enemies and skeletons until you reach a lever at the end, push it to
flip the bridge on it's side, quickly pick up the Soul of a Proud Knight just past the lever then
head back and cross the bridge, killing the skeletons on the other side and the Necromancer just
behind them in the doorway.
On your right you will see a small room through a hole in the wall, do not bother going in here as
it is a trap, instead continue forward and down a spiral staircase along the wall, in the first alcove
you will find a skeleton, in the second there is a Soul of a Proud Knight resting just in front of one
of the trap statues, be careful when picking it up (try from the side), and in a room at the bottom
will be another Soul of a Proud Knight as well as three more skeletons. With everything gathered
go outside the third room and turn to see a plaque on the wall, ignore it for a moment and go
down another staircase until you come to another room on your right, inside push in the lever and
head back to the plaque where a new path will have opened, enter and immediately turn left
(going forward will lead to your death), when you come to another cliffside path turn left until you
come to a ladder, at the base attack the wall on your left right next to a statue (this one is also a
trap) to reveal a hidden path, follow it to find a new bonfire, rest and equip the Fall Control spell
(you should have it by now). Head back out and up the ladder and push the lever to flip over the
next bridge, head over to it and go through the fog door.
In the next section head down the steps and kill the skeletons then look for a weak brick wall and
attack it, creating a new opening, walk through and turn right as soon as you step in, just below

you will be a skeleton archer, drop down and kill it then drop down to the ground and kill two
more skeletons. Along the wall is a ladder that leads up to another archer but he shouldn't bother
you so it's your choice to kill it or not. Head up the steps in front of you and when you get close
to a large statue at the end of the passage a Giant Skeleton will drop through the ceiling, kill it
and at the base of the statue will be an open tomb, loot the corpse inside to gain the Darkmoon
Séance Ring. Turn back and go through an opening on the left hand wall, follow this all the way to
the end where a skeleton and Necromancer wait. Kill the pair and climb up a ladder on your right,
at the top roll between the two trap statues and inside the room will be the Miracle:
🔆
Tranquil Walk of Peace (10/23)
Then head back to where the enemies were and drop down from the ledge to find yourself back
in the room where you broke through the wall, head back to the bonfire now to heal and restock
if you need to.
In the room where you broke the wall, head outside through the opening and onto another cliff,
here there will be a number of Whisps and on a large platform in the middle of the path four
skeletons, kill them while avoiding the blasts from the Whisps and continue down the path into a
new passageway, at the end you should be able to see a Prowling Demon waiting, head down and
take care of him, when it's dead head to the end of the path and pick three Eyes of Death from a
corpse. When heading back the way you came look on the right for a coffin poking out of the wall
and slightly opened, walk up to it and it should give you the option to 'Nestle in coffin' choose to
do this and wait about 30 seconds for a scene to play where the coffin lid is shut on you, this will
transport you to an area in the Tomb of Giants.
Once out of the coffin, head over to the other side of the room where you will see Gravelord Nito
inside a very large coffin, walk up to him and pray (he will not be hostile at all) then choose to
enter his Covenant, doing so will give you the following rare weapon, miracle, and achievement:
⚔
Gravelord Sword (13/50)
🔆
Gravelord Sword Dance (11/23)
Covenant: Gravelord Servant
Discover Gravelord Servant covenant.

3 guides
The Gravelord Sword is a fantastic weapon if you have been unable to get a Black Knight drop
until this point and if it ups your stats (which I expect it will) you should equip it and use it as
your new base weapon. Lastly, if you took my advice and made sure you got at least seven Eyes
of Death from Basilisks in the Depths, with the three you just picked up you will have enough to
offer to Nito allowing you to rise a rank in his Covenant and be rewarded with the Miracle:
🔆
Gravelord Greatsword Dance (12/23)
NOTE: You must do that BEFORE defeating Nito a little later otherwise you must wait until NG+
Head back now to the coffin you arrived in and head back to the area you came from then make
your way back to the bonfire.
From the bonfire head towards the bridge again but this time head back through the passage
way in the wall into the previous room with the spiral staircase. Head down again and this time
past the room with the lever, at the end of the path use your Fall Control spell and look down, you
should be able to see a small ledge below you, drop down to it and then to another with a corpse
on it, loot the corpse for a Green Titanite Shard and drop down once more to a floor that has a
hole in it, drop through for a scene where you will be introduced to Vamos this blacksmith will
handle creating your Fire and Chaos weapons once you have the correct embers.
Speak with him and repair/upgrade what you like then head out through the opening he made for
you, in this room you will encounter many Skeleton Wheel enemies as well as some Whisps,
these guys an be quite annoying and will consistently roll towards you when they get the chance,
try your best to avoid them and pick them of as you go. On each side of you will be a path to
take, for now take the left side path into a room with two skeletons and a Necromancer, kill them
and continue through here until you reach a ladder. Climb up and enter another room with two
skeletons and a coffin in the centre, try to stick to the walls and avoid walking in the middle of
the room, when the skeletons are dead, look at the floor on either side of the coffin and you will
see that the bricks are a different colour, walk over them to drop down into another room with a
Black Knight wielding an axe, kill him to get a White Titanite Chunk and then grab the Soul of a

Proud Knight on the ledge beside it and drop down to the area below. Again take the same path
and when you get to the room you dropped through the floor in climb another ladder up to
another opening with a Soul of a Proud Knight just beside it, go through to find the area with the
Prowling Demon in it from earlier. Take the path that leads outside and just next to the doorway
will be a section of ramp with spikes on it, walk up it slightly and look down on the right side to
see a couple of lootable corpses, cast Fall Control again and drop yourself down, the first has a
Soul of a Nameless Soldier on it then drop down carefully to the next for the Cleric Set and a
Mace.
Drop down once more and take the right hand path this time and follow it until you reach the fog
door, walk through and in the next room drop down into the giant coffin to face your next boss...
Pinwheel
The fact that Pinwheel is even a boss in this game seems like a bit of a joke, by this point in the
game and with a decent weapon (which you should have in the Gravelord Sword) Pinwheel
should go down within less than a minute, maybe getting one or two attacks in on you if it's
lucky. As soon as the battle starts wield your weapon two-handed and run towards Pinwheel,
attacking until you are exhausted, after a few hits it should teleport to the other side of the room,
sprint over again, it may use a magic attack on the way but you should be fine. By the time you
reach Pinwheel again it should have used its primary defence and made copies of itself, though
usually the one you were originally running towards will still be the real one so attack it again and
within a couple more attacks it should be dead.

When killed you will be rewarded with 15,000 souls, Homeward Bone and the Rite of Kindling
which will unlock
Rite of Kindling
Acquire the Rite of Kindling.

along with it. In the spot you killed Pinwheel you will also find one of the three masks it was
wearing, these are The Mask of the Child, The Mask of the Mother and The Mask of the Father. I
would now highly suggest you use the Homeward Bone you just obtained to go back to the last
bonfire as the next area is going to be extremely annoying and at times difficult, if you can use
more that one spell at a time I would suggest equipping Fall Control and Cast Light, when you are
prepared return to the Pinwheel room and climb out using a ladder on the right hand side, at the
top venture into the darkness to enter..
If you have the Cast Light spell use it now, otherwise you are going to have to try navigate as
best you can in the dark for a while using only the glowing stones as your guide. Follow the first
lot until you come to a large coffin, walk across it as it acts like a bridge and on the other side will
be a Giant Skeleton, they are no different here than they are in other areas so kill them as you
would anywhere else, just be careful of your footing as there are a lot of long drops around the
place, with the skeleton dead continue down the ramp it was on and you will come to the top of
another coffin, walk onto it and slide down it to a landing below, on your right just around the
corner will be another Giant Skeleton, kill it and pick up the Soul of a Proud Knight from the
corpse. Head back to where you landed and slide down another coffin to the next landing below,
on your right will be two more Giant Skeletons, if you aren't wearing the Ring of Fog they will
likely both attack together, try to fight defensively and get behind them for easy hits. When they
are dead follow the path to one more coffin though raised a bit higher out the ground than the
others, slide down, you will see an item on your right but ignore it for now. At the bottom when
you land you will see a fellow in front of you, ignore him for now and turn left and look for a
ladder, climb down and follow the path at the bottom to find the areas first bonfire.
When you're ready head back up the ladder and turn right, you should be able to see a thin ledge
that winds around the side of the cliff, walk up it until you come to a massive coffin with a small
opening, drop down onto a ledge inside the tomb, below you on the ground are six Giant
Skeletons, I highly recommend wearing the Ring of Fog here so that you have an easier time
fighting each of them alone, when they are all dead you can find a Soul of a Proud Knight on a
corpse as well as the Large Divine Ember on the corpse of a blacksmith, with those in hand climb
out of the coffin and continue up the path along the cliff, at the top you will find two more Giant
Skeletons, one with a sword and the other with a bow, try to kill the melee one first while paying
attention to when the bowman fires his shots, when they are dead climb up the ladder. At the top
will be two more Giant Skeletons, when they are dead head back to the ladder, just on the right
you can drop down into a little ditch and pick up a Large Soul of a Proud Knight, climb back up

the ladder and on the opposite side of it will be another Large Soul of a Proud Knight then head
up to the back of the room and up two ladders out of the coffin, if you walk over to the other side
and drop down you can pick up three Eyes of Death from a corpse then drop down and go up the
ladders again, follow the path up a slope and you can find another Soul of a Proud Knight, if you
drop down from here you will find yourself back at the beginning of the area, make your way back
to the bonfire whichever way you choose.
With that little detour done head up the ladder and now approach the NPC you saw before, this is
Patches the Hyena. Speak with him and he will ask if you are a cleric, answer 'No' and he will tell
you of a treasure he is willing to share, approach the glowing stone on the protruding ledge and a
scene will play out with Patches kicking you down into the pit below. When you gain control again
you can collect two Large Souls of a Proud Knight and a Skull Lantern. This item can be quite
useful, it takes the place of your shield in your off-hand and when raised will shine a light giving
you better vision, if you don't have the Cast Light ability this is a good substitute for now though
as I mentioned you will have to go without a shield in the meantime.
Follow the wall up into the room and you should see a woman sitting on the ground by one of the
pillars, this is Rhea of Thorolund. Speak with her and she will warn you of her two companions
who have turned hollow and are just ahead, go find them both - Vince & Nico - and defeat them
both (try keep them away from Rhea, if she takes any damage she will become hostile for the
rest of the playthrough. When they are dead return to Rhea and she will reward you with the
Miracle:
🔆
Replenishment (13/23)
Head back to the path Vince and Nico were down but before heading in turn right and follow the
wall to a path leading up, at the top on a corpse is a White Titanite Chunk, head back down and
two Bone Tower enemies will sprout from the ground, these can attack quickly and hard so keep
your guard up and try hit them a couple of times to take them down.
Up the path where Nico and Vince were follow it until you reach a room with three more Bone
Towers, when they've been dealt with climb a ladder and at the top turn right and follow the
ledge, you will be back at the bonfire so head down and rest again.
Back up the ladder, go and speak with Patches again, when you get the option select 'No' to tell
him there is no grudge and he will give you Twin Humanities and will now turn up in Firelink
Shrine as a merchant. Continue past him now and up the next path, when you get off the narrow
ledge keep your guard up, there is a new enemy here, the Skeleton Beast, these can be difficult
but their movements are easy to predict. When you see it always block the first attack, from
there simply circle around them and take a shot after they attack and miss, lowering their guard.
When you've killed it continue along the path on the right until you reach a fog door and pass
through it.
On the other side there will be another Skeleton Beast just ahead and in the distance will be a
Skeleton Archer, kill the beast first and then head over in the direction of the archer but be
careful of the ground, you must search for a small bridge to the other side, on the bridge will be
another Beast, lure it back onto the larger area so you can work your way around it and when it's

dead go take care of the archer and pick up the Soul of a Brave Warrior just behind it.
Search the area now for a slope leading down into a cave like area, on the right go through the
opening and along a ledge where you will find a Black Knight with a Halberd, lure it back into the
cave and kill it there for a bit more safety then head back along the ledge it was guarding and at
the end pick up the rare weapon:
⚔
Effigy Shield (14/50)
Head back into the cave area and follow the wall around on your right to a path leading down,
from here stick to the wall on your left and you should be able to stay out of the view of a Beast
and Giant Skeleton, if you follow the wall a short time you will come to the areas second bonfire.
Before leaving again you should first become human and kindle the bonfire as we will be
approaching the boss soon and we will also have the chance to encounter a Phantom NPC that
drops two items required for an achievement, but he won't invade if you kill the boss first. I will
also remind you before defeating the next boss you must rank up at least once with the
Gravelord Servant Covenant to obtain a miracle required for an achievement so do that now if
you haven't already. When you are ready head back out and back along the wall up into the cave
area and up to where the Skeleton Archer sits, kill the archer and the beast again and where the
corpse sits by the archer walk off of the ledge to drop onto another just below it, follow this path
around and you will see a corpse with loot on it, be careful, when you walk over the loot five Bone
Tower enemies will rise up, kill them all first then collect the Covetous Silver Serpent Ring. When
you have the ring walk over to the edge of the platform on your left and drop down to another
just below you then turn around and face the other direction and drop down again, when you are
back on the normal path you should be able to see a ladder on your right leading down, before
taking this head up the ramp and then go down a path that leads under the next ramp up, follow
it around to a Soul of a Brave Warrior, next head up the other ramp and as soon as you get to the
top follow the wall around and up another, at the top of this ramp along the wall in an alcove is a
White Titanite Chunk, with these items in hand head back down to the ladder and climb down it.
Head down the path until you come to a tunnel on your right, head through and kill the Crystal
Lizard if you can before it gets away. About halfway through the tunnel the NPC Phantom I
mentioned earlier, Paladin Leeroy will invade you if you are in human form, he has some pretty
dangerous attacks as he has a huge club for a weapon but this makes him slow and very
vulnerable to backstabs, he also has the ability to cast healing miracle so use those to take
advantage if you can, once you have defeated him you can collect a Humanity and the following
rare weapons:
⚔
Grant (15/50)
⚔
Sanctus (16/50)
If Leeroy happens to die by falling off the edge of the path simply quit out and reload your game
and his item drops will appear either where he spawned or where he fell.

Head in through to the other side of the tunnel now, along your way you will be attacked by four
Bone Towers and at the end of the path two Giant Skeletons (one melee, one archer), when they
are all dead head through the next tunnel to the last area of this place.
Inside you can see a swamp like area at the bottom, down here you will come into contact with
Skeleton Babies these little guys can be very dangerous as they have the ability to inflict Toxic
which can be very deadly, they have no real pattern of attack as they simply try to swarm you
while they continue to spawn and they will not stop so long as you are in the water. On land
across from you will be a familiar enemy, Pinwheel Servants, they will mainly fire magic blasts at
you but they can deal some decent damage especially if more than one can land an attack at a
time, try to rush them and attack each one quickly, they have low HP so killing them shouldn't be
any trouble.
From where you enter this area walk directly forward and drop down then turn left and drop down
a bit again to pick up a Soul of a Hero. From the soul item you want to sprint while following the
wall to your left this is will take you straight to the first Pinwheel Servant, from here turn to the
right and kill the second one (use the pillar at the first Servant to block their magic and time your
attack). To the left of the second Servant will be a third kill it then turn back and follow the path
up a slope to the fourth Servant (sometimes this one will fall to where you killed the first three).
When all are dead head up the sloped path again and stop at the turn, you will see a tunnel just
in front of you, take a run and jump into the tunnel, when you land follow the path to a corpse
and collect a White Titanite Slab, from here turn around and follow the path back to a ledge
where you muct drop down into the water with the Skeleton Babies, there can also on occasion
be another Pinwheel Servant waiting here for you, if so use a plunging attack and a quick follow
up to kill the Servant then run up the ramp straight ahead as quickly as you can before any
Babies can get to you.
At the top of the ramp heal up if need be and check your inventory, if you have a couple of
Blooming Purple Moss Clumps the head back down the ramp, on your right you should be able to
see a corpse, run down and pick up a White Titanite Chunk then run back up the ramp, if a
couple babies manage to attack and poison you with Toxin use the Blooming Purple Moss to cure
yourself, if you don't happen to have any on you it's best not to take the risk, once you have the
chunk that's everything here, head back up the sloped path once more to the top and break
through the debris to the fog door, before heading in make sure you have a Divine weapon
equipped as well as your primary damage dealing weapon as some skeletons will join the boss
fight and the boss is able to revive them, if you are using the Cast Light miracle it is best to wait
for it to expire as Nito has a habit of spamming a particular attack if it is used, finally if you still
have Fall Control attuned I suggest casting it before dropping into the arena saving yourself an
Estus, when you are prepared walk through, on the other side you will come to a hole drop down
to begin the boss fight with..
Gravelord Nito
When you gain control heal if you need to, Nito will be coming at you from the left side as well as
three Skeletons, walk up and try to draw the Skeletons to you before Nito gets too close and kill

them quickly with your Divine weapon, they will be brought back to life otherwise as Nito is their
Necromancer. When they're dead you want to try to stay with Nito in this one area of the arena
as there are three Giant Skeletons camping out on the other end and they are make defeating
Nito much more difficult.
With Nito alone now get nice and close to him on his left (your right) hand side, here almost all of
his attacks (mainly his melee ones) will completely miss you, the only attacks you will need to be
wary of are all predictable if you pay attention
- a grab attack where Nito's left hand (again your right) will glow red and he will swing it at you,
either roll away if you can or roll into him and to your right to avoid it, this can be pretty damaging
if it connects
- a Gravelord Sword Dance attack, this will be preceded by a scream, once you hear it be ready
and roll away just as the scream ends, if this attack hits you twice in quick succession you will
become poisoned by Toxic
- a powerful AOE attack, Nito will use this reasonably often, he will curl himself up into a ball and
start to glow faintly, when he does this back off as far as you can (be careful not to back up in
the direction of the Giant Skeletons), and keep your shield up, Nito will unleash a magic miasma
attack that will likely break through your shield but shouldn't deal too much damage if you are far
enough away
With these attacks in mind simply heal when needed, you should be able to wield your weapon
with two hands to deal that little bit more damage as you should only need the shield to defend
from the AOE attack, keep hitting Nito with everything you got and he will die before too long.
When he is dead you will obtain the Lord Soul, 60,000 souls and Humanity as well as unlocking

Defeat Gravelord Nito
Defeat the Soul Lord Gravelord Nito.
1 guide
Head over to the bonfire on the other side of the arena (the Giant Skeletons will be gone with the
death of Nito), before you leave look around the edges of the arena if you killed Paladin Leeroy
and you will find the Paladin Set on a corpse. Use the bonfire to teleport to Firelink Shrine,
Patches should now have taken up residence here, speak with him to see his wares where for
10,--- souls you can now buy the rare weapon:
⚔
Crescent Axe (17/50)
Next check your inventory for Blooming Purple Moss, if you are in short supply (less than ten)
quickly visit the female Undead Merchant in the nearby aqueduct and buy some then use the
bonfire to now teleport to Undead Parish.
When you have control head up the stairs and into the large cathedral, at the altar where you
killed your first Heavy Knight you can find Rhea of Thorolund praying, speak to her and she will
be grateful to you for rescuing her, she will also tell you of how Patches tricked her and her
companions into the pit and may also speak of her fears of Petrus. Purchase all of the Divine
Blessing items from Rhea, and all of the spells included those you already own (this is to trigger
the next part of her story) when you have everything you should now have the following new
Miracles:

🔆
Great Heal (14/23)
🔆
Magic Barrier (15/23)
🔆
Wrath of the Gods (16/23)
Next take the elevator down to Firelink Shrine and locate Petrus, kill him when you do, this will
prevent him from killing Rhea himself, when everything is done head to the bonfire closest to you
and warp to Anor Londo.
When you arrive, quickly speak with the Lady of the Darkling and upgrade your Estus Flask using
the Soul we got in New Londo, next use the bonfire to this time warp to the Darkmoon Tomb.
Head out and use the lever to call down the mechanical platform, take the stairs to the top and
follow the path into the cathedral, there will be ten Painting Guardians here, in the centre of the
room you should see the shattered remains of the chandelier we cut down when navigating the
rafters in the ceiling of the cathedral, there will be a corpse on the floor next to it with the
Sorcery:
🌀
Great Magic Weapon (19/24)
In the corner to the left of the giant painting on the back wall you can collect the Black Iron Set
as well as a Greatsword and the rare weapon:
⚔
Black Iron Greatshield (18/50)
With all the items collected now head up to the painting and interact with it (you must have the
Peculiar Doll item we got when we returned to Undead Asylum) to be pulled into another world.
15. Painted World of Ariamis
Once you have been transported into the Painted World of Ariamis there is no way out until we
reach the boss, to begin head across the bridge and up the steps to reach the areas bonfire. I
would suggest you kindle this bonfire to its maximum potential as it is the only one here and will
make things a bit easier on you having the extra flasks. I also recommend equipping either the
Pyromancer Set, Shadow Set or a mix of the two to give you strong resistance to poison as there
are enemies here that will cause the Toxic status and they can do it quickly to help avoid this I
also suggest equipping a long range weapon, the Lightning Spear +5 you should have if you have
followed this walkthrough closely will be perfect, finally the Ring of Fog can be a great option
here as it allows you to take some enemies in smaller groups.
Head up the first stairs and a Hollow directly ahead will attack, kill him as two more Hollows
come at you from your right. Head up the next two sets of steps, and at the top of the second

will be a Hollow with a bow, go up the steps and poke out right in front of him then back up down
the stairs again, if you are wearing the RoF only one melee Hollow will follow you down, if not you
will get two, lead them down out of the archers line of sight and kill them then head back and
take out the archer. On another set of stairs will be another archer (and melee Hollow if you were
wearing the RoF) kill the melee first if he's there then the archer, when the archer is dead back
up a bit, one or two new enemies will come around the corner, these are Engorged Zombies. The
zombie with the torch will just try to attack using melee, any zombies that are unarmed will use
fireball-like attacks to deal damage.
Swap over to your Lightning Spear and attack and kill the first zombie, trying to put as much
distance as you can between you both, when you land the killing blow quickly roll backwards as
the Zombies will explode upon death resulting in a putrid cloud of poison which is what will infect
you with Toxin should you be too close, when both zombies are dead pick up the Soul of a Proud
Knight from the corpse and turn around and face the way you came. On the right you can see a
path leading around a corner, follow it up a few flights of stairs killing three Hollows along the
way, at the top is a corpse with a Soul of a Proud Knight, picking this up will cause two enemies
to come down and attack, these are Crow Demons. These are deadly enemies and one of my
personally most hated in this game, their most deadly attack will come when one flies into the air
and then jumps onto your head dealing massive damage to you, when you manage to kill them,
look over the ledge to the left of the corpse that held the soul and you will see another below you
with an item on it, drop to it and pick up a Dried Finger, this item is meant for PvP purposes,
using it will shorten the time you must wait for each person to invade you.
From the ledge you are on walk through the doorway and drop down, on the platform above will
be a Hollow that should attack, kill it then head downstairs to the bottom of the tower where you
can find two Snow Rats, they are really no different to ordinary ones so kill them both and pick up
the Soul of a Brave Warrior they were guarding then head back up and out the only exit.
Head across the walkway ahead and in the next room go out to the right and kill the Hollow
archer, two more Hollows will climb over the wall and try to ambush you, when they are both
dead head inside and try to lure the closer Zombie over to you and kill it before taking on the
next one (there is a high chance that more Hollows and Zombies will drop down from a room
above you so be prepared for it, when you are sure you are safe look back the way you came and
go out the doorway to a walkway with a Hollow strung up by its foot, attack the rope with a sword
and it will fall to the ground giving you something you can pick up later on.
Head the other way now and up some steps where you will see a doorway, to its right are some
more stairs, take them to access the upper area of this tower, if none of the enemies before
dropped from the ceiling you will have to fight them up here. When the area is clear you should
be able to see a corpse with an item on it across a gap in the broken ceiling, take a run up and
jump over the gap and pick up a Soul of a Brave Warrior. To the right will be a ladder take it all
the way down and follow the path into a room with two more Snow Rats, kill them both and open
the chest to receive the Painting Guardian Set, head back up to the ladder where a single Hollow
will be waiting for you, kill it and head back up. Turn left when you reach the top and head
through the next opening, another corpse will be here with an Egg Vermifuge to collect once you

have that drop down just below and head out the doorway.
Turn left and head to the corpse, a Hollow hanging on the wall will climb over, kill him then pick
up the Large Soul of a Proud Knight. Head the other way now towards a large derelict tower,
when you can turn left and head down the steps, you should be able to see a large enemy at the
end of a bridge, this is an Undead Dragon, one of two in the game. If you walk down the bridge
you will trigger it when you get close enough, when the dragon gets up sprint back to the tower
at the start of the bridge.
The Undead Dragon has three methods of attack the first is a poisonous cloud it will breathe out
that sweeps across the area building up Toxic when it connects, the other attacks are a swipe
with its right (your left) claw and a chomping attack with its jaws. The best strategy is to wait
until it's finished it's charge then run down to its left claw (your right) and stand just in front of it,
this will cause the dragon to use his poison breath to the side and if you are standing it the right
position it will go right past you causing no damage whatsoever, as the dragon finishes its attack
the claw then run away as this will provoke a swipe attack when he sets his claw down again
rinse and repeat until it dies.
Once dead you will receive 5,000 souls and can pick up a Dragon Scale where it died, you can
also collect a Large Soul of a Proud Knight and a rare weapon on the bridge:
⚔
Bloodshield (19/50)
Head back towards the tower and take the stairs leading down on your left, follow the path into
the bottom of the tower to find a fog door, pass through and on the other side you will encounter
a group of enemies called Phalanx, this group is very simple to defeat, try to lock on to one in the
centre and keep your guard up at all times as they are able to throw their spears at you if they
are out of reach, when you get behind a few that cannot block with their shields take a few
swings and continue with the same method, the more you kill the quicker and easier the process
becomes, when all Phalanx enemies are dead head to the other side of the area ad open the
large door creating a shortcut to the bonfire at the start of the map, head there now to restock, it
is also worth noting that if you are in human form you will be able to encounter another NPC
Phantom in a moment if you wish.
Head back into the area with the Phalanx and turn right to enter a graveyard, here you will find a
group of Hollows (one or two with torches) kill them all then collect the loot from all the corpses,
when you've picked up everything you should have a Large Soul of a Proud Knight and two Souls
of a Proud Knight, if you became human and wait at the base of the hill the phantom Xanthous
King Jeremiah, he will use a whip as weapon as well as a couple poison based pyromancy spells
though he doesn't have a lot of health, when you have killed him you can pick up Humanity and
the Notched Whip. Head back up to the stairs out of the graveyard but before leaving follow the
wall to the left and around a corner to find a corpse with the Pyromancy:
🔥
Acid Surge (15/19)
Head back up and if you like defeat the Phalanx again then head over to a corpse on the left that
should be here if you cut it down earlier, pick up the Humanity from it then head up some stairs

and walk along the wall to pick up a Ring of Sacrifice. From there go back towards the stairs
beside the statue the Phalanx crowd and look on the left side where you can see a small gap
behind the tombstones, walk through and in the corner is a Soul of a Brave Warrior.
Head out in the direction of the bonfire and go up some stairs in the building to your right, at the
top turn left and head to the corpse, as before a group of Hollows will ambush you when you get
close enough, when they are all dead pick up the Soul of a Proud Knight and then just around the
corner cut down another body hanging from a rope.
Head back to the stairs and go the other way now where you will find a ladder, climb down and
enter an underground, dark and wet area, in here you will find five to six Skeleton Wheel
enemies, you have faced these before in the Catacombs they are in fewer numbers here so they
shouldn't cause you too much trouble, when they are all dead you can pick up a Soul of a Proud
Knight/Brave Warrior from the two corpses in the room then turn the wheel which will spin the
statue above around and unlock the door leading to the areas boss, however we still have a few
things we can do here.
Turn around from the wheel and look at the wall where you can clearly see a difference in the
colour and texture, attack it to reveal a hidden path. Head straight to the end and face right to
see another fake wall, attack it and head through then turn left again there will be another
Skeleton Wheel here, kill it then loot the corpse it was guarding to pick up the Annex Key, head
back the way you came and this time take the next right, another Skeleton Wheel will be waiting,
when it's dead continue up some steps, at the top will be another Zombie but this one just hides
in the corner, kill it and loot its corpse to receive the Pyromancy:
🔥
Fire Surge (16/19)
From here head back out into the courtyard with the Phalanx and head over to the building on the
other side of the courtyard, inside and up some steps unlock the door with the recently acquired
Annex Key.
Head all the way up the steps and out onto a walkway, straight ahead you should see a Zombie
enemy, head over and kill it causing two more just below to come join the fight, when all three are
dead head down the steps and find the corpse of a blacksmith, loot it to pick up the Dark Ember
this may cause two Crow Demons to ambush you. Make your way back to the stairs and on your
left you will see a weak looking wooden door, attack it to break it down and follow the path to
find the rare weapon:
⚔
Velka's Rapier (20/50)
At the stairs head in the other direction and up a large set of stairs with a Zombie at the top, kill it
quickly and turn to find a Crow Demon attacking. When it's dead head up the stairs to the top
where another Crow Demon waits. When you reach it, the Crow will call down another two of
them to aid it in killing you, be cautious and be sure to avoid their grapple attack and when they
are all dead loot the corpse for the Miracle:
🔆
Vow of Silence (17/23)

Go left from here into the large tower from earlier and immediately turn left to find the Black Set
and that is all we need to worry about here, we can now turn our attention to taking on the boss,
if you need to do so head to the bonfire and heal/restock then head to the door you unlocked not
too long ago.
Head across the long bridge, when you reach the first Hollow archer stop, on it's right in a small
alcove is a melee Hollow waiting to attack, try to get close to the archer to lure it out and kill
them both. When you get close to the next archer four melee Hollows will climb onto the bridge
and attack, you can either kill the archer quickly then turn your attention to the others or run
back and kill the melee ones first and kill the archer last, when they are dead head up a little
further to fight another Heavy Knight this time with a sword, while he is a little faster than the
other variations you have fought until now he is generally the same enemy, just try to move
around and keep to his back and take him down with him defeated you should finally reach the
fog door to the boss.
Before heading in we need to make some small preparations. First change your armour to a set
that has a high Bleed resist as this is the one of the next bosses most dangerous abilities, the
Black Iron Set is great for this though you will likely need Havel's Ring to be able to equip it and
even then you may not be able to manage the whole set, the Gargoyle Helm is another item with
powerful resistance, next you need to make sure you have a weapon equipped with a vertical
slash attack, a greatsword or katana style weapon is generally best for this. With everything
ready head through the door and face
Crossbreed Priscilla
When you first enter Priscilla will not be hostile until you land your first attack, Priscilla is also
one of the bosses with a tail we must cut off for a unique weapon. Get behind her to start with
and swap to your slashing weapon and take a swing at her tail, if it comes off awesome, if not you
will have to work a little more.
Once you attack Priscilla she will become invisible however you can track her movements by
watching the footprints she leaves behind in the snow, when she gets close run around behind
her and try to land three or so hits in quick succession (two handed would help assure this) if you
are successful Priscilla will become visible again for a short while, use this to your advantage and
use all your time aiming for her tail, other than this little bother Priscilla is a very easy boss to
beat so long as she doesn't land enough hits to cause the Bleed bar to max out, if this happens it
will likely result in death. If you are adamant about getting Priscilla's tail this playthrough if you
can see she is getting low on HP when she becomes visible again it may be in your interest to die
on purpose, however you should note that from now on when you enter the door she will be
hostile immediately.
When you win the battle you will be awarded 30,000 souls, the Soul of Priscilla, an achievement,
and (if you cut off her tail) her weapon:

⚔
Priscilla's Dagger (21/50)
Defeat Crossbreed Priscilla
Defeat Crossbreed Priscilla, the Lifehunter.
