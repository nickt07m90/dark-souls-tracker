land beyond the point you can walk where the ground breaks off and you would drop into the
lake, if this happens just stand in a good position where the heads don't touch you and use your
bow to take them out. When the Hydra is dead you will receive 5,000 souls a Dragon Scale and
the Dusk Crown Ring, on your right should also be a corpse with the Knight Armour set for the
taking.
From the water’s edge look over to the left to see a waterfall, walk over and carefully walk
through it to another patch of land, there is a ladder here that acts as a backdoor entrance into
Darkroot Garden should you need it in the future, from the patch of land continue through the
water making sure you will be walking on land and not dropping off the edge until you come to an
opening on your left, in the opening should be a Golden Crystal Golem, though there is a chance
that it sometimes does not appear, if this happens to you simply take yourself to the start of
where the clearing opens up and then quit and reload your game to fix it.
The Golden Golem is just a bigger version of the blue ones with a bit more health and the ability
to cause a bit more damage, they have the exact same attack patterns, the only difference being
that the golden guys crystal blast attack has a smaller radius, but that is really a bonus for us.
When you kill the golem you will free a new NPC, Dusk of Oolacile, to access her there is a
summoning sign by a rock where you killed the Hydra so return there to call upon her. Dusk has
some new sorceries available to you. The following can be purchased for a total of 18,000 souls:
🌀
Hidden Body (9/24)
🌀
Cast Light (10/24)

🌀
Repair (11/24)
🌀
Chameleon (12/24)
🌀
Hidden Weapon (13/24)
To save backtracking, it would be better to get these sooner than later. It may also be worth
noting that once you have summoned Dusk at the rock, if you head back to where the Golden
Golem stood you can loot a corpse for the Antiquiated Set.
Head back up the hill towards the bonfire now and turn left, you will come to a tower and a door,
be careful for when you open it you will face Havel the Rock, a powerful warrior that wields the
Dragon Tooth weapon, he is extremely slow but if he manages to connect with that weapon you
will likely be dead in one blow, two if you are extremely fortunate. Circle around Havel and when
he goes to swing roll out of the way and quickly get behind him for a backstab attack, repeat this
until he dies and he will drop Havel's Ring.
This ring is a great accessory that increases your equipment load by 50% allowing you to wear

much sturdier armour without compensating for speed. Climb up the steps in the tower and at
the top you will find yourself back in Undead Burg, from here return to Firelink Shrine.
Before we press on to the next destination I think it would be wise to go ahead and purchase all
possible spells up until this point as you now have access to most of the NPCs that provide them.
Make a note of how many souls you will need to buy everything and then head to either Undead
Parish or Darkroot Garden to farm the souls you need, remember that if you fight the Forest
Clansmen you will break the Covenant and have to pay a visit to Oswald before you can join again
(also remember to include any spells not purchased from Dusk to your total).Whether you do buy
all the spells or not, try to at least purchase the Pyromancy spell Flash Sweat as it will be helpful
in the next area which will be...
9. Blighttown
Blighttown is one of the most hated areas of Dark Souls, and with good reason, it is simply a pain
to navigate and it is easy to loose your footing and fall to your death. There are three paths to
reach Blighttown, one of them takes us through an area you may not be ready for so we will skip
it, the other is from the door in the Depths and the last requires the Master Key, we are going to
do both to pick up all the items. First we will start with the Depths as that is the most annoying so
we'll get it out of the way so head down to the Depths (use the bonfire on the way) where the
merchant sits and open the door beside him. Inside head around the ledge and down the next
two ladders, on the platform head forwards to fight your first enemy here an Infested
Barbarianthese guys aren't too scary, they can hit hard but if your stamina and shield stability are
good enough you should be able to absorb most of their blows, the only danger is that they can
build up and cause poison on you. After the first one head forward a little further where there are
two together, try to use a bow or magic to pull one to you, kill it and sort out the other one.
Pressing on you will find two new enemies, these are Infested Ghouls. They don't really pose a
massive threat though they do have one dangerous attack. When the ghoul leans back and roars
at your roll back a little as they will do a leaping grapple attack that cannot be blocked.
Continuing along you will see the path fork out to the right with two different bridges leading the
same way, leave the first one as it moves when you step on it and is likely to be a trap instead go
to the other one and you'll see three more ghouls on the opposite platform, take on all three if
you like or pull them one at a time.
When you can, head across and down a ladder where another ghoul should be (he sometimes
climbs the ladder to join the fight with the other three) and down a ramp, at the bottom on your
right is a Large Soul of a Nameless Soldier. If you look at the floor you can see that it's not very
solid, go up the ramp and then fall down onto the floor to break it and slide down the hill to
another platform.
When you land, heal if you need to and if you look just behind the torch on the platform you'll
find a ramp heading down, be careful as you will likely be attacked by two Flaming Attack Dogs,
try to avoid their flame breath attacks and take them down quickly.

At the bottom of the ramp once the dogs are dead turn around and go down the path next to it,
carefully walk up to the corpse to collect one Humanity. Head back up to the platform and on the
other side you will see a bridge, walk over it carefully as it will swing side to side, on the other
end will be two ghouls, kill them and go down the ramp where a ladder sits in the right side
corner, turn away from it where you can see another plank to walk out onto for 3x Blooming
Purple Moss Clumps, head back and up the ladder and follow the path to the area bonfire which I
highly recommend you kindle for more Estus, while you are here equip a Pyromancy spell like
fireball.
Just after the bonfire on the wooden platforms there should be a ladder, climb up and kill the two
ghouls (one is in a pot) and head across a bridge to find the place you crashed through the hole.
Head up the ramp and up the ladder again killing the four ghouls waiting and head across the
bridge. If you head to the edge on your right you should be able to see a platform on its own with
a corpse to loot, remove your armour so you will be a bit lighter and take a big running jump, if
you miss you will either fall to your death or you may fall onto a platform with the ladder you used
before to reach the bonfire, if you make the jump however you can collect the Iaito, a katana like
sword for dexterity builds that also causes the Bleed status on enemies. From here look for the
bonfire below you and you can drop down onto the platform below safely.
One more detour, head back up to the area with the ramp and four ghouls and climb up the
ladder again when it's safe to do so, if you walk around behind the wall you face at the top of a
ladder you can squeeze through a gap and walk along the dirt wall and drop down to a corpse to
collect the Shadow Set. From here drop down off the ledge on your right and on this platform is a
Soul of a Proud Knight, there should be a short ladder here, either climb it or walk down to the
next platform and on your right you should see a corpse behind some debris, smash it and pick
up another Soul of a Proud Knight, that is finally everything, if you look you should be able to see
the path just below you, drop down and kill the ghoul then head a bit further to take on two more
flame dogs. Head a little further and kill two ghouls and follow the path to a ladder. At the bottom
turn right and down a small ramp then left to pick up a Soul of a Proud Knight from the body then
go back to the small ramp and down the ladder next to it.
At the bottom there will be a ghoul waiting though sometimes he is climbing the ladder as well.
When you are at the bottom of the ladder follow the wooden path along and around the stone
column, at the back will be another ghoul, kill him then head down the slanted concrete path and
collect the Eagle Shield. Head back up the ladder now and up that small ramp, on the platform
should be some pots, smash them to reveal another ladder, climb down and kill the ghoul. Head
forwards and look to your left, there will be a large tentacle flailing creature attached to the wall,
do not approach it as it will kill you easily, instead use your fireball or fire orb spell or even soul
arrow if you have it, enough of these should kill it, if not take the rest of the health down with
your bow, when it's dead go to the corpse it was guarding to pick up the Pyromancy:
🔥
Power Within (6/19)
If you turn around and head the opposite way you will see a ramp that leads down and a ladder,
take the ramp as the ladder leads nowhere special and follow it into a tunnel where an Infested

Barbarian and ghoul are waiting, kill them both and head in and down a ladder. At the bottom
walk up to the fog door and pass through it to the next section of the area and follow the
platform to a ladder, head down this and then down another one.
Head along the walkway and you will meet a Cragspider enemy, they don't have a lot of health
and are easy to kill but they use a fire breath that can be deadly if you get cornered by one or
more. Kill it and a second one a little further ahead and then go down a couple of ladders, look to
your left to see a ramp going up, follow it killing two more Cragspiders and at the end will be a
corpse with the Wanderer Set and a Falchion, when you have collected them head back down the
ramp and down another ladder. You will finally be at ground level at the bottom of the ladder,
down here you will find a group of five or so Cragspiders as well as a couple of Giant Mosquitoes,
it's best to let the mosquitoes come to you and kill them, then go and take out the Cragspiders,
keep your distance as the mosquitoes can inflict poison, the mosquitoes will always come in
pairs and while it may seem they come at you infinitely, each pair of mosquitoes only respawns
seven times before they are exhausted.
When the coast is clear equip the Rusted Iron Ring, this will make running through the swamp a
little easier, the reason you need this is because the swamp will poison you if you stay in the
water too long so you want to hop between land masses. From where you begin look to your right
slightly for a large stone pillar, run towards it and get to land, wait until the poison bar empties,
from here look back to the island you came from and turn left to see another stone pillar, run to
the left hand side of this and kill the Cragspider there then follow the land along the wall into a
sewer where you will find the next bonfire. Use up a couple of humanities and become human,
you may as well kindle the bonfire to, in fact you should as we will take on the next boss soon.
While you are human and in the swamp you may be invaded by an NPC black phantom named
Maneater Mildred the chance for this encounter disappears once you kill the areas boss, it is a
good idea to kill her though as doing so allows you to summon her to aid you once we take on the
boss, she will also drop a Humanity and the Butcher Knife weapon. It's also a good idea to equip
the Flash Sweat spell now as it will make the boss fight a bit easier.
There are a few items in the swamp to in all honesty only one is worth picking up as it is a
Pyromancy spell and is required for an achievement, the other items are simply not worth the
hassle of getting poisoned all the time. Before venturing back into the swamp head up the back
of the sewer drain through a broken grating, in the small pit will be a chest with a Dragon Scale.
From the sewer opening, head back to the first piece of land you ran to with a pillar in the centre,
look behind it and you will see a corpse, head over to it to pick up the Pyromancer Set, from
where you picked it up turn right and walk in that direction you will see another pillar with a
corpse behind it, head over and search it for the Pyromancy:
🔥
Poison Mist (7/19)
Head around to the land in front of the pillar and follow it around until you see another pillar on
your right with a corpse, search it for a Large Soul of a Proud Knight.
Run around to the other side of this pillar and you will see land with a wooden ramp, head on up

it and up a ladder where you can find a primitive elevator device (this is the way you would have
come if you took the other Blighttown path). Ride a platform up and then climb the ladder, at the
top kill a mosquito and around the corner the cragspider. Follow the path the spider was on
around the back and you will see it connect with a tree branch, follow this over to the other side
but be careful of the Blowdart Snipers, one or two hits from them will cause the Toxic status, a
much stronger version of poison, on the other side of the branch follow the path to a corpse with
the Crimson Set and a chest containing the Sorcery:
🌀
Remedy (14/24)
Head back to where you killed the first Cragspider after taking the elevator up and go up the
nearby ladder. Follow the path into a sewer where if you follow the ledge all the way around you
can kill all of the Blowdart Snipers (they do not respawn). When done on the top level you can
find a Soul of a Proud Knight, make your way to the bottom, you can either drop down or use a
ladder though the area bellow the ladder is crowded with three Flaming Attack Dogs. Once on
the bottom level there are a total of seven flame dogs to take out, when you're done look in the
side section of the sewer to find a Firekeeper's Soul NOTE: If you let Lautrec live and collect
this Firekeeper's Soul he WILL kill Anastacia causing the Firelink Shrine bonfire to extinguish
though this can be repaired later. That is everything we need up here so either make the trip
back down to the bonfire or use a Homeward Bone.
At the bonfire, become human if you wish to summon Mildred to help with the next battle and
equip Flash Sweat. From the bonfire head over to the ramp that takes you to the elevator and
turn left, run over the land masses and through the swamp to the other side. From here look
towards the large mound ahead with spikes sticking out of it, just on your left is another piece of
land to run to, from there run over to the mainland. The enemies here are simply Infested
Barbarians that weild boulders instead of clubs, their attacks are easy to avoid, the one to watch
out for is when they put the boulder on the ground and then push it at you, you can't block this
so make sure to get out of the way. When they are all dead head up the hill and into Quelaag's
Domain, head on through and just avoid the enemies with eggs on their back, when you get to
the fog door equip yourself with high fire resistant gear (Stone Armour with Havel's ring is great
but keep your equip load below 50%) and summon Mildred if you can, finally cast Flash Sweat
and head in to face
Chaos Witch Quelaag
Quelaag can be one of the tougher bosses to take down, her wide range of attacks can make her
movements hard to predict and she can obliterate you if you have low fire defence. If you
summoned Mildred before entering the fight is exponentially easier as Quelaag will focus more
on your partner giving you the chance to go in for maximum damage. The spider body and
Quelaag herself both use different attacks, the main ones to look out for is her fire sword swipe
attacks used by the upperbody, she also uses an explosive fire AoE (area of effect) attack but as
long as your health isn't too low you should survive it fine. The spiders most deadly tactic is to
spew lava all over the ground, walking in it will cause you a great deal of damage so avoid it at all
costs.

Stand back and let Mildred head in to take Quelaag on herself, when she has Quelaag focused on
her circle around to the rear and start attacking. Move around as required, the main thing is to
keep an eye out for pools of lava and keeping your health up, if you have Flash Sweat stand back
and reapply if you need to. It shouldn't be long and Quelaag will die, giving you 20,000 souls and
the Soul of Quelaag.
When you can head up the stairs at the back of the arena into a tower and pull the lever, this will
ring the bell causing a cutscene (so long as the other bell has been rung) showing a giant
opening the previously closed gate from earlier. When the scene finishes you will be awarded a
Homeward Bone and unlock
Ring the Bell (Quelaag's Domain)
Ring Bell of Awakening in Quelaag's domain.

2 guides
Head down the steps on the outside of the tower and at the base will be an elevator platform that
no longer works, near it will be a tunnel but don't go here now as it leads to a very difficult area
we will save for much later, instead look for a stone wall and attack it revealing an illusion. Head
in and speak to the guy that looks like one of the enemies before; this is Eingyi when he asks if
you are a servant answer 'Yes'. When he is done talking use the bonfire and then head back into
Quelaag's Domain and up to where those Egg Carrier enemies were. Equip a really weak weapon
in the second slot of your right hand (the pyromancy flame gloves RT attack is good) and hit the
carrier to make him hostile, he will perform an attack where the egg sac opens and the worm
inside will latch to your head, once it has done this kill the carrier as well as the worms that expel
from the host upon it's death, remove your helmet and stand still for a few seconds, if your
character is scratching his head every now and then you have done what we came here for. Head
back down to Eingyi and wait for about one to two minutes, the scratching head will now blow up
into an egg sac (this will automatically remove your helmet if you didn't before) when this
happens speak to Eingyi, this will make him very pleased with you, he will give you an Egg
Vermifuge to cure yourself of the parasite and if you speak to him again he will sell you two
Pyromancies, notably:
🔥
Toxic Mist (8/19)
Don't buy Poison Mist though as we picked it up just before. Toxic mist costs 25,000 souls. With
Eingyi sorted out, walk over to The Fair Lady - this is actually Quelaag's sister. Speak with her
and first ask her to upgrade your Estus Flask in exchange for the Firekeeper's Soul and then join
the Chaos Servant Covenant unlocking

Covenant: Chaos Servant
Discover Chaos Servant covenant.
3 guides
Upon joining you will receive the Pyromancy:
🔥
Great Chaos Fireball (9/19)
If you have Humanities and Twin Humanities to supply The Fair Lady with 30 in total do so now to
unlock all the rewards possible, if not hold onto the Humanity as use it later as we are going to
join another Covenant very soon.
Head back into Blighttown (re-equip your anti-poison gear and the Rusted Iron Ring) and to the
island with the wooden platforms you used to first enter the swamp. After killing the surrounding
enemies look to the end of the swamp (the opposite side of Quelaag's Domain) and you will see a
large tree with a winding root leading inside it, just to your right will be a piece of land you can
run to and from there head onto the tree root and up to a corpse with the Plank Shield on it. To
the left of the corpse attack the wall to make it disappear and then open the chest to receive
Twin Humanities. Again attack the wall behind the chest to reveal another hidden path, walk
through to enter.
10. The Great Hollow to Ash Lake

Below is a video to be used along with the text here to help you locate each Crystal Lizard as well
as any items to loot.
Note : Getting into and out of this area can be quite the task for some. If you wish to save
yourself some trouble you can put off this area until a little later in the game when you gain
the ability to warp from bonfires. If you wish to skip The Great Hollow & Ash Lake areas for

now, then scroll down the page until you see the Covenant: Path of the Dragon achievement
and continue reading from there. (take me there)
Continue along the tunnel and down a ladder to reach a bonfire, as you can see this is quite a
deep and dangerous area. If you have an Intelligence level of 15 or higher I would suggest
attuning the Fall Control spell if you have it as we will be falling often in order to collect all items
as well as kill the ten Crystal Lizards we can find here. I would advise making sure you either
have Homeward Bones or the Homeward miracle (15 Faith required) as we will be starting over
often. Lastly although if you are a male character and it will look silly, you should equip the
Antiquated Set as this has a massive Curse Resist bonus, if you do not have it then the Crimson
Set we got in Blighttown is your next best option finally if you have it, equip the Ring of Fog, this
will give you more time to reach each Crystal Lizard before it disappears. I would also advise you
use any souls you have to level up if possible as there is a high chance you will die mutliple times
while trying to navigate this area,, in case you do experience difficulty I have included a link to a
video so you can see what to do should my words not be enough.
Alright with everything set and ready it's time to explore, I will do my best to give you the best
detail possible. As you set out onto the first tree root path you can see another one on the right
that extends higher than the one you are on, you need to run and jump onto this root. When you
land walk up towards it's highest point and when you reach the bend look down through the gap
between the root and the wall to see a lower root, drop to it and from this one if you look down
you will see a ledge, if you are careful and drop down slowly you should land on the very edge of
it safely. Inside this tunnel is a group of Crystal Lizards head through and kill as many as you find,
at the end of the tunnel press start and quit the game then reload to make the others respawn
and head through the tunnel again. Do this until you have killed five Crystal Lizards in total
rewarding you with 10 Twinkling Titaninte and a random assortment of other Titanite products
from Large Shards to the very rare Titanite Slab
Again jump over to the tree root on your right, when you land climb it all the way to the end and
drop off the end onto another lower ledge. Head inside the tunnel and at the dead end quit the
game and reload, when you do head back to the entrance to kill a Crystal Lizard, again quit and
reload and head back into the tunnel for another Crystal Lizard at the dead end. When you have
killed the two Lizards head to the ledge and at the edge of it you can see another ledge below
you, drop down to it and take the left side tree root, not far down it you will be able to step off
onto a very short adjoining root that doubles back and leads down, there should be a Crystal
Lizard here however if there is not, quit and reload the game until it appears, kill it and then
continue down the root that doubles back to a solid platform with a spiral ramp leading inside the
tree trunk, at the bottom of the ramp are three Basilisks, the same enemies from The Depths, do
your best to take them on one at a time, luring them however you can. When they are dead head
out the exit there and on your left behind the entry way is a Large Soul of a Nameless Soldier.
Walk down a narrow root on the right of the landing and follow it down to another platform, walk
about five or so more steps down the narrow root and look down to your left, you should see
another ledge directly below you, this should have a Crystal Lizard on it, if not quit and reload
until it does, when it appears drop down and kill it.

From the ledge you're on take the right side root and walk up it until it connects with another,
from here quit and reload the game until another Crystal Lizard appears on the platform you had
dropped down to, head over and kill it and use a Homeward Bone, or any other method to return
to the bonfire to star over again.
Head down the main root and not far in you should be able to look directly down and inside a tree
trunk below you with a corpse, roll off of the root you're on to land inside and pick up the
Cloranthy Ring. Drop down a hole that should be just behind you and walk outside the trunk and
turn right, make a short drop to the root below and collect the Titanite Chunk off of the corpse.
From the corpse turn around and you should see a platform to your right, run and jump/roll onto
it, take the tree root on the right up to a corpse with a Red Titanite Chunk on it and then head
back to the first corpse and drop down the the ledge under it where you will find the same three
Basilisks from before, kill them before they cause any damage.
Take the narrow root again on the right and follow it all the way until it ends and connects with
another root, from here drop down to the right on a root just below you, follow this until just after
it wraps around the trunk and you will see another wide root below you, drop down and when you
land look down and you should see a corpse on another root just below you, follow the root you
are currently on until just before it ends when you will see a safe spot to drop down, head up to
the corpse and collect a Blue Titanite Chunk then return to the bonfire again however you can.
Make your way down to the Basilisk area again and once more take the narrow path on the right
and follow it until if ends and drop down to the root just below you once more. From this branch if
you look down towards the wall you will see a corpse on a lower branch, position yourself as well
as you can and drop down to it and collect a White Titanite Chunk. From here turn around and
follow the root until it ends and you'll see another root on your left below you, drop down and you
will find yourself on the same branch just above the location of the Blue Titanite Chunk, drop
back down to that branch and head up to the corpse again, when you get there look down to the
left at another root and drop down onto it, follow it around to where it gets very narrow and at the
end underneath you on another narrow root is a Red Titanite Chunk, grab it and then drop down
to the level below, there will be two Basilisks here so kill them but be wary of the holes in the
ground as they lead to a large drop if you aren't careful.
Look around the trunk of the tree and down one of the holes you will see a corpse on a branch
you can drop down to, jump down and pick up a Blue Titanite Chunk, below you is solid floor
again but also another bunch of Basilisks so drop down when you are ready and kill them all as
quickly as you can. Collect the Large Soul of a Nameless Soldier and then if you look around the
edges you should be able to find a very thin branch that extends into an even thinner branch
protruding from it's left-hand side, walk onto it and then onto the very thin branch coming out on
the left and drop down to a tree root just below it, look to your right and there will be a corpse
with a White Titanite Chunk.
From the Chunk, look down to your right to see another thin branch and drop down onto it and
then onto another again until you can safely reach the main path, if you happen to die, make your
way down but this time you can avoid all the theatrics, if you head down the main tree root until
the end then drop down from there to the landing with the three Basilisks inside the tree, take the

narrow path on the right all the way down and continue around to the end on a landing with a
ladder, take that down and then down another ladder to the first section of solid ground, kill the
Basilisks and take another ladder at the edge of one of the inner holes down, kill the next set of
Basilisks and then take the main tree root down from there will will be on the main path.
Continue down and you will begin to see mushrooms growing everywhere, if you look to your
right you should see a corpse atop a mushroom, when you are almost at the end of the main path
there will be an opportunity to drop down onto a mushroom and then again to where the corpse
is to pick up a Titanite Chunk (this is the last of the items), follow the path until you reach
mushrooms you can walk on. Here you will find Mushroom Children though these ones will not be
docile like they were in Darkroot Garden, defeat each one until you reach the bottom where you
will find three Mushroom Parents and two Mushroom Children, fighting the Parents in these tight
quarters an be quite dangerous especially if you happen to have two or more coming at you
together, I would suggest simply running through into the tunnel and through the fog door at the
end where you will enter..
Head down the tree roots and through a large hollowed trunk, on your way down you should see
a Hydra to your left, this is the second and last one in the game, don't fight it yet instead turn
right and swing around to reach a bonfire, rest and kindle etc. Make sure you have the Rusted
Iron Ring on then head over to the Hydra and use the exact same strategy as before to defeat it
but be careful as the drop off point in the water is less than knee deep. Once it starts attacking
with its heads you can back out of the water a little as it being this close to you will cause serious
damage, even while blocking. After a few head dives the Hydra will start to back off into the
water again, when it does this it's getting ready to fire its magic attack, wait for it and then run
down to the edge of the water to avoid it, stay here until it comes close enough that it will start
attacking physically again. Within a couple of minutes you should be able to kill it and get 10,000
souls and two Dragon Scales.
From the water’s edge look to your left and you will see a corpse, head over and pick up a
Dragon Scale. From here head down the beach now, on your right will be a large hollow log,
inside is another Dragon Scale. Continue further along the beach where you will find two Man-
Eater Shells, these enemies are a pain and it would probably be better to just avoid them and
head to the tree just beyond them, before heading in on the left hand side of the dunes just on
the water’s edge is another Dragon Scale. When you get to the tree walk around the outside
back towards the way you came to find the entrance, inside waiting are two Basilisks and a
Mushroom Parent, use whatever means you have to lure the Basilisks out and then deal with the
Mushroom Parent before walking up the root and follow it out and around the tree where another
Basilisk will be waiting, just where the Basilisk is you should be able to see a broken hollow log
below you, drop inside and then follow the tunnel to get the Miracle:
🔆
Great Magic Barrier (7/23)

Head out of the tree now and follow the narrow trail of sand all the way to the end, there will be
another Man-Eater on the way but just run straight past it, at the end of the trail you will find the
Everlasting Dragon. Walk up to him and pray to enter the Path of the Dragon Covenant and
unlock
Covenant: Path of the Dragon
Discover Path of the Dragon covenant.
2 guides
Lastly, to finish off everything we can do here, walk on the sand around to the back of the
Everlasting Dragon and slice at his tail a couple of times to chop it off and gain the rare weapon:
⚔
Dragon Greatsword (9/50)
The next thing we will do before heading into the next area for story progression is gain access
to another Covenant. To begin, make your way up to Firelink Shrine; we will take the New Londo
shortcut this time. In Blighttown head over to the elevator device and ride it up, from there
continue up each ladder you come to until you arrive at the top. When you get there on your right
should be a chest with the New Londo Ruins Key inside. Head down the tunnel towards the exit,
there will be three Infested Barbarians on your way and into the Valley of the Drakes area. Walk
over the makeshift bridge just on your right as you exit Blighttown and turn left when you've
crossed to come to a stone structure with a gate, use the key you just gained to unlock it and
head down the stairs into New Londo.

Head up another set of stairs directly to your left and continue up some more until you reach a
lever, pull it to call down an elevator and ride it up into Firelink Shrine.When you arrive you can do
one of two things, farm for souls until you reach a Faith level of 25 or you can see Petrus of
Thorolund and rejoin the Way of White Covenant, the fastest way to get what we are aiming for
here is to go with Petrus so do that and then return to Blighttown heading back the way you
came through New Londo. At the bonfire in the swamp become Human and use the White
Soapstone to create a summon sign (being in the Way of White makes you more likely to find co-
op partners), when you are summoned stick with the host until you have helped them defeat
Quelaag in their world. The reason we are doing this is because each time you use co-op to help
another player defeat another boss it will drop the Faith requirement for the next Covenant by 5
points each time. If you started with the Bandit like me you should have begun with 10 Faith so
you will need to kill Quelaag with others a minimum of three times to adjust the requirements to
your level.
When you have killed Quelaag enough head back out of Blighttown and into Undead Burg to the
first bonfire there. The next task ahead of us is going to be killing the Hellkite Dragon. Before
going anywhere go and see the Undead Merchant if you left him alive and purchase about 50
arrows then head up the ladder beside the bonfire. Equip your best Fire resistant armour and
head up the steps to where the Hellkite guards the bridge.
At the top step out to antagonize the Hellkite into using his fire breath killing the other enemies
on the bridge so that they won’t bother you, run back down the stairs before he uses the attack
of course. When the enemies are dead head back up the steps and be ready as this strategy
requires good timing.
Use your bow to take a shot at the Hellkite, when it hits he will leap down onto the bridge right
beside the steps, for a few moments he will not act when he lands, in this small window you get
you need to use your main weapon two handed and run in and take a swing at his head, as soon
as you connect your attack retreat back down the stairs until he has flown back to his perch on
the building, repeat this process until you have defeated it. If you are having trouble
understanding the strategy refer to the video below

When the Hellkite is dead head into the building he was guarding (on a corpse just before the
entrance you can pick up a Claymore) where you will find a bonfire as well as a lever on your left
raising a gate for quicker access into Undead Parish. To the right of the bonfire head through the
doorway and up some steps to a broken statue on the balcony, if you have the right Faith
requirement you should get a prompt to pray at the statue, do so to join the Covenant which will
give you the following Miracle and achievement:
🔆
Lightning Spear (8/23)
Covenant: Warrior of Sunlight
Discover Warrior of Sunlight covenant.
4 guides

To continue now, head over to the bonfire above the blacksmith in Undead Parish. From here
head out to where the giant locked gate was located to enter.
11. Sen's Fortress
Sen's Fortress to me is one of the toughest areas in the game if you do not know what you are
doing and you do not pay attention to your surroundings.
In this very first room walk forward and keep your shield up as there is a pressure plate in the
floor, stepping on it will cause darts/arrows to fire from in front of you. Once they have stopped
head a little further to encounter a new enemy, the Serpent Soldier these guys will almost always
become staggered each time you guard an attack giving you a chance to retaliate but keep it to
one attack at a time as they have a high poise state and are difficult to stun, they are also quite
slow making backstabs a viable tactic. When you've killed the first to head up the first stairs and
on the right behind some pots is a Soul of a Brave Warrior, then head through the passage into
the first main area. You will need to cross a bridge with swinging pendulum blades, focus on your
timing and pass through the gaps one at a time, about 2/3's of the way across is a Serpent
Soldier, try to stay steady on the bridge so that he doesn't force you off.
On the other side of the bridge turn left and head upstairs to another bridge with more pendulum
blades, again time your steps well, at the end of this bridge is a dangerous enemy, the Serpent
Mage this enemy will hurl lightning attacks at you that can stun you for a split second even
through your shield, getting hit by this while trying to avoid the blades is very dangerous and you
need to time it perfectly, a better method to get across is to use either a bow or some spell to
attack the mage from afar before attempting to cross.
In the room the mage was blocking raise your shield as you enter and step on another pressure
plate, three more projectiles will hit and it will be safe to open the chest to get 2 Large Titanite
Shards. Up the next set of stairs walk across the bridge where a Serpent Soldier is asleep up
against the wall, ignore him and continue across. As you approach the doorway you will see a
Serpent Soldier appear and then get taken down by a boulder, this won’t kill him but will do some
damage, when he gets back to where you are kill him yourself.
Wait for a few boulders to pass so you can get a sense of timing with them. As soon as you're

ready and one passes you sprint up the first set of stairs and into an alcove on your left where a
fog door waits. Before entering wait for the boulders to pass again and run up the next lot up
steps where a Serpent Mage is guarding a doorway, kill it and in the back left corner of the room
is a chest with the Ring of Steel Protection inside.
Head back to the door and after the next boulder drops quickly pop out and look down to your
left where you will see a corpse, drop down and pick up the Shotel, drop down again another
level and first kill the Serpent Soldier here then speak to Siegmyer who sits on the ledge beside
you, he will speak to you of his plight being stuck and unable to pass the boulder trap.
Follow the path and kill another Serpent Soldier then head up the stairs again when you can to
the fog door and enter it. On the other side head through the narrow path, look on the floor and
you will see another pressure plate, when you step on it raise your shield and face the way you
cam to block the projectiles, in the next room will be another Serpent Soldier, kill it and then up
the small steps is another boulder trap.
When the boulder passes turn right out of the door sprint as quickly as you can up the hill and
around the corner so you can get out of the next boulders path, if one does come down you
should have enough health to survive at least one collision. At the top you will find the
mechanism responsible to controlling the direction the boulders fall. Walk around the pillar to the
lever and push it once to the right this will send the boulders down a long slope. When that's
done move it one more time to the right then retrace your steps back to the room where the
Serpent Soldier was sleeping on the job (be careful as sometimes the boulder machine will reset
itself). Where the enemy was leaning will now be a hole in the wall, head through to find a man in
a cage, this is Big Hat Logan a sorcerer that will teach you the more powerful spells in the game,
if you have the Master Key speak to him a couple of times and you should be able to unlock the
cage and set him free, speak to him once more and he will agree to meet you in Firelink Shrine
later, down the path in another cage is a Hero's Soul.
Return now to the second boulder trap and when you are ready run out and to the right again,
this time just before you reach the corner at the top drop down off of the ramp to the left to land
on a platform with a Serpent Mage, kill it and then pick up the Large Soul of a Proud Knight from
the corpse then enter the doorway on the right and follow it to another corpse to collect the
Black Sorcerer Set and the Sorcery:
🌀
Hush (15/24)
Head up the stairs and unlock the door to come out on a bridge with some steps that lead to a
ramp up to the boulder mechanism. Head up and now switch the boulder back to its original
path, when the next boulder fires follow it down to the first door on the left then pop in quickly,
when the next boulder comes through follow it all the way to the bottom where it will drop down a
pit, just before the pit is a door to the left. If you wait in this doorway and watch the boulders
they will eventually fill up the pit they are supposed to fall into and the next one will destroy the
wall, head inside the hole to collect the Covetous Gold Serpent Ring, this accessory boosts item
discovery making rare drops more likely.

Head back into the doorway and through the hall will be a chest sitting in the centre of the room,
do not try to open it as it is a trap enemy called a Mimic. When you attack it the Mimic will sprout
arms and legs and become hostile, try to avoid its attacks as best you can in the cramped room
and when you kill it you can pick up the Lightning Spear, a good weapon for the next boss.
In the corner of the room is an elevator platform covered in blood, hop on it and as soon as it
stops at the next level jump off, if you stay on it and go up a little further you will be killed by a
spike trap in the ceiling. Head up some stairs and you will again find yourself on the bridge with
stairs leading up to the boulder room, head up but instead of messing with the machine any more
look in the corner of the room to see a small set of steps leading into a tunnel. About halfway
through you will trigger another trap causing arrows to be fired from the wall on the left hand
side, guard against them then head through and to the next pendulum bridge. The key to this
one is to sprint over the bridge past all pendulums at the same time as they meet in the centre
and swing outwards, if timed right you should make it without any problems, as soon as you get
to solid ground on the other end of the bridge turn right and kill the Serpent Soldier waiting to
ambush. Up some stairs is another Serpent Mage, ignore him for now and take the path just to
the left of the stairs around and kill another Serpent Soldier and loot the corpse for 2 Large
Titanite Shards then head back up the stairs and kill the mage, at the top of the stairs is another
pendulum bridge, before stepping out look to the left and on a ledge is a Serpent Mage, use
whatever ranged attacks you can to kill it before attempting to cross, on the other side head up
some stairs to the right and through the next fog door.
When you walk through the fog door you will be in a more open area, be prepared to run as this
next section is dangerous. Until you can stop him there is a giant enemy at the top of the fortress
that will hurl massive firebombs at you so you need to move through each section quickly. From
where you start sprint out and up some steps to the left, at the top continue to sprint straight
forward up the next set of stairs. At the top of these look to your right and you should see a
section of wall that has been destroyed, run up to the wall and then slowly drop over the edge
and you will finally arrive at the areas bonfire, I suggest you kindle this bonfire as you will
probably need more than five Estus Flasks.
From the bonfire head down the passage and turn left to drop onto the stairs that were just
before the fog door, outside turn right and follow the path to the lower area (this is safe as the
bombs won’t reach you down here). Down the stairs will be two stronger versions of the Balder
Knights in the Undead Parish, kill them and at the end of the path is a chest with the Flame
Stoneplate Ring which boosts your Fire DEF by 50, I would suggest you equip it for now until you
deal with the enemy bombing you.
Head back up to the top area and again sprint up the first set of steps then the next set directly
in front of you, from here run up the stairs just to the left, when you get to the next level run
down a path that runs along the wall to the right, here you will be safe from the bombs.
Continue down the path and at the corner will be a Heavy Knight similar to the one you faced in
Undead Parish, kill him and continue along the path to a ladder. Climb down and then head up
the steps that wrap around the tower where you will meet an enemy known as Undead Prince
Ricard when you kill him he will drop the Ricard's Rapier weapon. Continue up the tower where

you can find two chest with a Divine Blessing in one and a Rare Ring of Sacrifice in the other.
Head back to where you fought the Heavy Knight and at the end of the path turn right and run up
some more stairs and then across a footbridge, turn right at the intersection and run under cover.
On your left down the tunnel with be a Balder Knight with a rapier, on your right is the path you
need to take.
In the next room will be two cages similar to the one Big Hat Logan was in, we will be able to use
these as a shortcut soon but we can't do anything with them now so head out the door and up
the stairs to another footbridge, sprint along this quickly as the bombs can hit you here, there is
also a crossbow knight on a ledge, kill him when you can and in the door on your left will be a fog
door that leads to the boss. On your right will be a spiral staircase that leads up, take them up to
find the Giant that has been throwing firebombs at you, he has a fair amount of HP but his
attacks aren't that troublesome, he does have one attack in which he will stomp both his feet in
quick succession and then let loose a flurry of punches, if you avoid it he will collapse to his
knees worn out, giving you a great chance to take him down. Once you have killed him he will
drop a Titanite Chunk and will not respawn again.
Now that the giant is dead, head back down to where the first footbridge was and jump across.
To give yourself a better chance at success remove all your weapons and armour and when you
run up take the jump from the left side of the bridge where it is slightly longer before it breaks
away. On the other side in the tower will be the Crestfallen Merchantwho will sell you some
pieces of regular and green titanite as well as weapons and armour. Take the stairs down to the
bottom of the tower (re-equip yourself) and on a path at the base kill the Serpent Mage and loot
a corpse for the Cage Key.
Head back up to the footbridge and at the edge look below you to see a corpse, drop down
(make sure you have enough HP to survive the fall) and pick up the Sniper Crossbow and 12
Sniper Bolts, then drop down to the level where the Balder Knights were then head back to the
bonfire to restock.
From the bonfire make your way back up to the fog door and on your way use the Cage Key to
unlock one of the two cages and ride it down and then back up to unlock the shortcut. Before
entering the fog if you take the path to the right into the tower at the end of the path and you are
human you can summon the NPC Black Iron Tarkus, this guy is quite strong and is invaluable
against the boss coming up, with everything covered head into the fog and prepare to face the
Iron Golem
The Iron Golem for me is one of the easiest bosses in the game. Yes he can hit hard but he is
incredibly slow and easy to avoid. All you need to do to win this fight is stay around his feet while
being careful of where he steps and attack his heels, after enough damage he will fall backwards
into a kneeling position where he will be helpless allowing you to take him down two-handed
without the threat of being attacked. If you were able to summon Tarkus you can even stand
back and do nothing as in your first playthrough Tarkus is tough enough to be able to take down
the Iron Golem all on his own.

When you have killed the boss you will be given 40,000 souls, Humanity and the Core of an Iron
Golem. In the centre of the rooftop will be a golden ring, interact with it to watch a scene, at the
end of it you will unlock
Reach Anor Londo
Arrive in Anor Londo.
3 guides

12. Anor Londo
Head all the way to the bottom of the steps, at the base you will see a new enemy, the Sentinel.
Take him on, if you have a shield with stability of 65 or higher you will be able to block all but one
of the Sentinels attacks, but thankfully it's this one attack that leaves it wide open. When the
Sentinel raises it's shield above its head it is about to do a slam attack with it, as it raises its
shield it's legs open up creating a gap you can roll through to get behind it, attack it here as
much as you can and back off if it survives then just wait for the shield slam to come again.
In the room to the left are two more Sentinels, try to pull and fight them one at a time as two or
more can be a bother, when you have killed them you can collect a piece of Demon Titanite from
the chest. Out the door on the far end of the room will be a large courtyard, you can see a room
in the distance with two more Sentinels inside but take a doorway to your left down some steps
and rest at the area bonfire first.
The woman leaning against the wall is the The Lady of the Darkling she is the Firekeeper for this
bonfire, if you kill her it will cause this bonfire to be extinguished.
Outside head into the other room with another pair of Sentinels and handle them the same as
you did the other two. When you've killed them you can open the chests. The one on the left will
have a Twinkling Titanite inside, the chest on the right however is another Mimic enemy so attack
it and kill it quickly, when it dies it will relinquish a Crystal Halberd. There is a door on the side of
this room with another Sentinel just outside it however there is nothing we can do going in this
direction for now so head back out and turn left to head towards a small tower.
When you stand on the platform in the centre it will trigger an elevator, when you reach the
bottom hop off and down the spiral staircase. At the bottom outside will be a Gargoyle which is
more or less a smaller version of the Belfry Gargoyle bosses earlier in the game, it is also
important to know that if you were unsuccessful in chopping off the tail during the boss fight you
may do so against this enemy and get the Gargoyle Tail Axe.
Head back to the stairs up to the elevator and look down over the edge on the right where you
can see a landing beneath you. Drop down and then walk up the slanted beam to the top, from
there look down to see a balcony and drop down to it.
Head inside the broken window and after a couple of steps a Painting Guardian will drop down
and attack, these guys aren't very strong so you should have no problem with them, head over to
the other side of the room and kill the second one then head into the centre and climb up the
ladder.
Make your way across the narrow rafters with a couple more Painted Guards, use a bow to take
them out from a distance (be careful they use throwing knives sometimes) if they are standing on
a horizontal beam and you score a headshot it should knock them off. When you make it to the

centre cut the chain to release the chandelier, this will get us something a little later. At the end
of the beams climb down the ladder and go through the fog door, at the end of the path you will
see some stairs with a wheel and lever device in the centre; push the lever to lower the tower,
connecting the path from the elevator before to the other side. When the tower stops there will
be a second Gargoyle waiting for you, go over and kill him (be careful of the section without
railing as he can push you off the edge). When the Gargoyle has been defeated head back to the
stairs and push the lever again to make the tower go down another level then walk to the bottom
of the staircase and into a room with a corpse that holds the Ring of the Sun's First Born and the
next bonfire.
Once you're ready head back up the stairs and push the lever to make the staircase rise back to
the path you fought the Gargoyles on and head up the large staircase toward the towering
cathedral. At the top you'll find two more Sentinels, kill them both and head through an open
gate to your right (the one on the left is locked for now). Head down the stairs on your right
slowly to try and pull away a new enemy, the Bat-Winged Demon. These guys use a weapon with
the lightning element imbued so if your lightning resistance isn't high you will likely take some
damage even while guarding, they aren't too clever though and often cause themselves to fall off
the ledges. There will be three here to start with so kill them all one by one and then head down
the narrow walkway to a tower below, when you reach it there will be two more demons behind
the pillars, kill them and look to your left for another narrow walkway, sprint up it to reach another
tower in the middle of the path.
This is going to be one of the most annoying sections of the game (it was for me) while climbing
up the next narrow walkway you will have two Silver Knights wielding Greatbows, should an arrow
connect with you, even with high stability and a powerful shield it can push you off the edge.
You need to try to sprint to the very top and turn right to reach the Silver Knight and kill him
before heading around the tower and being able to drop to a balcony, while heading to the Silver
Knight the best thing to do is take the time to watch his shots and roll underneath the arrows
until you are close enough that he will unsheathe his sword instead. Once the knight has
unsheathed his sword wait for it to start walking towards you and back up slightly, when it
reaches the corner it should fall down as it can't navigate the ledge properly, by the time you get
this close the other knight wont be able to hit you because large structures will be in the way of
his line of sight. While the knight on the left is guarding a soul item it really isn't worth the hassle
to go for it.
When you've managed to get by the Silver Knight walk around the edge and drop down to the
balcony below and walk over to pass through a fog door, on the other side head down the hall
and into the first door on your left to find a bonfire with Solaire sitting beside it. Speak with
Solaire for some dialogue and to make progress with his questline then rest.
Head out and into the door directly on the other side of the hall where a Silver Knight guards a
chest, now that you are on solid ground the best way to take on these knights is with a parry &
riposte technique, backstabs are difficult as they spin around much faster than most enemies
and keep their guard up constantly, the timing windows aren't too small and after some practice
you will know exactly when to strike. Each Silver Knight here is also able to drop a couple of the

rare weapons and a shield needed for an achievement so keep that in mind if you wish to try farm
for them now but it is just as easy to do it much later.
When you've killed the knight go to the chest and open it to get three Sunlight Medals. Back
outside the room head to the other side behind the stairs and kill another Silver Knight then go
through the door on the left to a seemingly empty room. Attack the wall inside the fireplace to
reveal a hidden passage and follow the stairs down to a dark basement like room, inside will be a
group of chests, the one in the centre of the back wall is a Mimic so attack and kill it quickly, the
Mimic will drop the Occult Club, search the other chests to find Havel the Rock's Set including
the rare weapons:
⚔
Havel's Greatshield (10/50)
⚔
Dragon Tooth (11/50)
Head back up to the main room and climb the staircase, at the top on the left and right sides will
be two more Mimics, kill them both to get a Gold Coin from one and five Silver Coins from the
other.
Down one of the hallways you should see a door with a knight standing guard, head the other
way and through the door on the left where a Silver Knight waits inside, kill him and on the
balcony to your right is a Soul of a Hero, pick that up and head back to the other hallway. Kill the
Silver Knight at the doorway then go back and into the room on the left (the right is locked for
now) which is empty, open the next door but be careful as you enter, there is a Silver Knight on
the right just as you walk in the door for an ambush attack.
Head up the stairs when he's dead to the roof of the cathedral, you have two paths you can take,
either the door on the left or the one in the centre of the rooftop. For now go down the stairs in
the door on the left (kill the Silver Knight in the doorway first) and at the bottom of the stairs you
will find Siegmyer of Catarina who has gotten himself stuck again. Speak with Siegmyer and he
will tell you that beyond the door are three Silver Knights in a room and he is having trouble
figuring out a way past them, he proposes that you could need three to five more people to help
and that is the extent of his dialogue. Head through the door, the first Silver Knight will on your
right just as you enter the room, the other two will be on the other side, if you use the Ring of Fog
and a bow to pull the others you can fight them all one at a time, try to parry & riposte to save
circling them and possibly triggering the others.
When all three are dead head back into the small room and speak to Siegmyer who will be
amazed by your efforts, as thanks he will give you the Tiny Being's Ring. Head back into the
room and on the other side of the bed is a chest with two Demon Titanite inside, then open the
door to open this pathway. Head back up the stairs and now go through the central door and
down another winding staircase, you will come to an intersection, on the left is a small chapel
room with a Titanite Demon inside, kill it if you want to then head into the room on the right,
down the stairs are two Silver Knights with spears, these guys are a bit tougher to parry even if
you have been practicing as they don't seem to use their lunge or stabbing attacks often, instead
after they use their wide arced swipe it is usually ok to take a shot at them and then get your

guard back up. Kill them both and in the chests you will find the Silver Knight Set. At the other
end of the room is a door you can open creating a shortcut from the bonfire on the bottom floor
up to the intersection where you can now return and head up the steps down the middle path to
arrive inside the central hall of the cathedral.
I advise you to wear the Ring of Fog for this next section just to make things a bit easier on
yourself. Head down the stairs and in front of you will be a Royal Sentinel, these are basically the
same as the other version the only differences is they have more health and they have access to
a couple of Miracles, the first is the Force attack which sends out a pulse like orb of energy
around the Sentinel, the second is a healing spell which they will use when low on health, this is
easy to spot as they will kneel down to perform it, when this happens rush them two handed to
try finish them off before they get the chance to heal themselves. You might also see a Greatbow
Silver Knight at the top of the other set of stairs, this is why the Ring of Fog helps as they will
usually spot you and fire at your back while you are occupied.
Behind the Sentinel you killed will be a fog door but we are going to ignore this for now, turn
around and head down to the door of the cathedral and kill another Royal Sentinel and on the left
of the door is a wheel level, push it to open the main doors up.
Don't head outside yet, instead head up the other stairs and kill the Silver Knight and then at the
top you should see a doorway to you right with some more stairs, follow this path and at the
bottom you will find the Giant Blacksmith. This is the guy you need, the Giant Blacksmith will be
the guy who handles the majority of your blacksmithing needs from now on, for now speak to him
and you should have enough titanite shards, and chunks to be able to upgrade your Lightning
Spear to at least +4, for now you should hold off from using your slab, equip the Lightning Spear
in your secondary weapon slot as we will use this weapon during the upcoming boss battle.
Outside of the Giant Blacksmith’s room is another group of Bat-Winged Demons, kill them all and
pick up the Titanite Chunk at the bottom of some steps where two of the demons sat then head
up to the gate and unlock it, from here go back down the stairs past the two Sentinels and ride
the mechanical staircases back to the bonfire (if this one isn't kindled I suggest you go to the
other Anor Londo bonfire for maximum Estus Flasks, you will likely need them).
Head back into the cathedral killing all the Sentinels as you go but be cautious, you want to try
and keep at least 7-8 Estus Flasks for the upcoming fight. When they are all dead check your
equipment, lightning resistance will be good in the next fight and if you have the Ring of Fog
swap it out for something like the Ring of Steel Protection, when everything is ready head
through the fog door and face...
Dragon Slayer Ornstein & Executioner Smough
This is one of the toughest boss battles in the game, on their own each enemy isn't too big a
challenge but trying to take them both on at once poses a challenge. The first thing you need to
know is that the order in which you kill them is extremely important, whichever you defeat first
the other will absorb their powers as their own and become a bit stronger, the second one you
defeat is the enemy who's boss soul you obtain. I would highly advise that you focus on killing
Smough first and Ornstein second, the reason being is that Ornstein is easily the toughest of the
pair and while he may be difficult now if you end up needing to kill him second in your NG+ run

he will be a massive pain to defeat.
Your best means of defence in this battle are PILLARS, there are six around the room and they
are an invaluable asset. By manoeuvring yourself around the pillars you can avoid the vast
majority of attacks from both enemies, try to move around the room for a bit to get a feel for the
enemies attacks and get a better idea of when there will be reasonable openings to take shots at
Smough. Slowly take down his health and once he is dead a small scene will play out through
which you will see Ornstein absorb Smough’s soul and become a much larger version of himself.
The trick to killing the giant Ornstein is to stick as close to his feet as you can. You should be
able to block almost all of his attacks other than the lightning based ones and an attack in which
he impales you on his spear and lifts you up before giving you a large blast of lightning, for the
other unblockable and devastating attack he will jump into the air and perform a butt slam into
the ground (an ability picked up from Smough) and fire out lightning as he hits the ground. To
avoid all of his attacks besides the slam simply roll into him and try to get through his legs, all of
his attacks should miss you if you can time it all right. When he goes for the slam simply back off
and roll out of the way then rush back in and attack as he gets back up.
After a little while you should be able to take him down, when you do you will be awarded 50,000
souls and the Soul of Ornstein and on the ground where Ornstein fell you can pick up the Leo

Ring. On the other end of the arena on either side will be an elevator, take it up and rest at the
bonfire then head into the large doors, inside you will meet Lady Gwynevere. Kneel before her
and she will congratulate you on the progress made so far, after some more dialogue you will be
given the Lordvessel and unlock
Lordvessel
Acquire the Lordvessel.
7 guides
After you have finished talking, kneel before her again, this time you can choose to enter her
Covenant, the Princess's Guard, do so and unlock
Covenant: Princess's Guard
Discover Princess's Guard covenant.
3 guides

With the Lordvessel in hand you now have the ability to warp between selected bonfires, making
travel much less of a pain, for now head back to Firelink Shrine. When you arrive you should first
see Siegmyer by the bonfire, speak with him and he will ask you if you were responsible for
opening the gates to Sen's Fortress, answer yes and he will thank you by giving you the Miracle:
🔆
Emit Force (9/23)
Next, head over to where Griggs of Venheim is located to also find Big Hat Logan sitting beside
him. If you have an Intelligence rank of 15 or higher Logan will also sell you sorcery spells, all of
which but two are the same as Griggs, the ones that differ for 40,000 and 20,000 souls
respectively are:
🌀
Homing Soulmass (16/24)
🌀
Soul Spear (17/24)
The next thing we will do is visit Laurentius just above the bonfire and have him upgrade your
Pyromancy Flame (the glove item) to at least +10, when you have done this teleport with the
bonfire to the Daughter of Chaos bonfire, from here head out into the Blighttown swamp, sitting
under one of the pillars close to Quelaag's Domain will be a hooded figure, this is Quelaana of
Izalith another of Quelaag's sisters however she managed to escape before the Bed of Chaos
turned her into a demon like the others. The requirements for making her appear are not really
known though it is generally agreed that a Pyromancy Flame at +10 will cause her to appear. Go
over and speak to Quelaana and she will allow you to purchase some powerful Pyromancy spells
from her, if you speak to her she will ask you to destroy the Bed of Chaos for her, we have to do
this anyway but by speaking to her before doing so we will get a reward from her later. For a total
of 75,000 souls, the five new Pyromancies you can buy from Quelaana are:
🔥
Great Combustion (10/19)
🔥
Firestorm (11/19)
🔥
Great Fireball (12/19)
🔥
Fire Whip (13/19)

🔥
Undead Rapport (14/19)
For me the best thing to do right now is take note of how many souls are required to purchase
the remaining spells you may need from all the NPC characters and head into Anor Londo and
farm souls from the Silver Knights and Sentinel enemies, even if you need 100,000 souls or more
farming in this area will ensure you fill that quota quite quickly it would also be wise to save up at
least 20,000 souls to make some purchases for the next area.
Note: If you decided to skip The Great Hollow and Ash Lake page earlier you should now jump
over to it as the Lordvessel will make leaving the area much easier.
From Firelink Shrine head up into the aqueduct you take to reach Undead Burg and visit the
merchant at the far end, using the 20,000 or so souls I advised you to save up purchase four
Transient Curses and make sure they are equipped for quick use, head back to the bonfire and
walk down the steps to Anastasia and continue down until you come to a room with an elevator
(if it isn't here pull the lever to call it up). Ride the elevator down and walk outside and follow the
path down some stairs, in alcove to the side of them you can find a Soul of a Nameless Soldier.
At the bottom of some more stairs walk out into a new area.
13. New Londo Ruins
You will find that the area is filled with Hollows, you don't need to worry about them as they will
all ignore you, kill them if you like for a few extra souls. If you look to your right and go down a
staircase you will find another blacksmith Rickert of Vinheim this is the guy you come to see if
you need Magic or Enchantment imbued weapons crafted.
Head back up the stairs and over to the other side of the area, head down the steps and if you
exhausted all of the dialogue with the Crestfallen Warrior in Firelink Shrine he will be waiting here
in his hollowed form and will attack, kill him quickly, he poses little threat then turn around and
smash the jar with a body in it, pillage the corpse for two more Transient Curses, now would be a
good time to use your first one. Head over both the wooden bridges to the ruins and you will be
faced with Ghostenemies, unless you wield a cursed weapon, are under the effects of the Curse
status or have used a Transient Curse you cannot deal any damage to these enemies (hence why
we bought a couple beforehand). Kill the first group that attack you and then turn to face the way
you came, to your left you should be able to see a corpse with an item on it, head in its direction
and you will see you must go through a doorway with a narrow bridge leading over the water to
the broken room, you will be confronted by a few more ghosts as you make your way over, when
you reach the corpse you can collect a new Fire Keeper's Soul. Head back to the main area and
head up some stairs, kill another couple of ghosts and cross the bridge into the castle, inside you
will be ambushed by about six or seven ghosts but so long as you focus on killing them one at a
time you should be ok. Through one doorway will be a lever with an elevator beside it, ignore this

for now and head to the other end and down some stairs, at the base head over to a corpse you
can see and kill a ghost waiting inside the wall beside it then pillage it to pick up a Parrying
Dagger. Head around to the other side and past the fog door, around the corner will be a female
version of the ghosts though she isn't too different, she does have the ability to use lightning
attacks, get in close and kill her quickly and she shouldn't cause you any trouble, when she is
dead you can pick up two more Transient Curses from the body then head back and through the
fog door.
On the other side of the door head up the steps and interact with the ladder, this will create a bit
of a shortcut for you later. Head over to the corpse you can see to pick up a Large Soul of a
Nameless Soldier (you will be attacked by a few ghosts as you cross this walkway). On the other
end head down the stairs and follow the path into a building, inside you will be attacked by a
large group of ghosts as you move from room to room so always be on the lookout. Head straight
through and around the outer halls to find a Soul of a Proud Knight then head into one of the
central rooms where another female ghost is standing in front of a fireplace, when she and the
other ghosts in the area are dealt with climb the ladder, at the top you can speak with Ingward,
he will give you the Key to the Seal allowing you to reach the boss for this area. Ingward sells
more Transient Curses, should you need any (for a much cheaper price than the other). To save
making a trip for it later, you should also pay 5,000 souls for the sorcery:
🌀
Resist Curse (18/24)
Head back down into the building and back to where you entered to take some stairs down to the
lower level, before taking the exit follow the passage all the way around to another opening
where you can pick up the Cursebite Ring then head back around and outside. Follow the path to
a fork and head down the stairs to the left to pick up a Green Titanite Shard then head up the
stairs on the other side, at the top will be a Large Soul of a Nameless Soldier, continue along the
path ignoring the next stairs up and into a tower, turn left and go unlock a metal gate using the
Key to the Seal, on the other side turn the wheel with the lever to open the floodgates revealing
the lower section of New Londo.
Back inside the tower head up the stairs now up to the walkways at the top of the area, through a
doorway and on your left will be a corpse with a Composite Bow and 16 large arrows, you can
now head back down and take the elevator here to the lower level.
At the bottom when you walk out if you look to your right you should see some dragon-like
enemies, avoid these for now as we have no need to fight them, instead head straight across into
the ruins and up some steps to face your first Darkwraith. Continue along and into a broken down
shack, inside you will find a Large Soul of a Proud Knight and just through the door next to it is
another Darkwraith, kill it and head through the fog door.
On the other side kill the Darkwraith on your left then look over the other side to see a new
enemy, the Mass of Souls these things will spawn Wisp enemies to come at you but other than
that they are very slow and quite easy to take down, the only danger here is two Darkwraiths
waiting inside the stable like structures on either side of it, if you can lure them out one at a time
then focus on the Mass, when it's head walk behind it on the right and look to your left, loot the

corpse for a Humanity then head into the doorway and up some steps, right in front of you will be
a Soul of a Brave Warrior then turn back and follow the path all the way around and up some
steps to a chest, inside is the Very Large Ember which allows you to upgrade regular weapons to
their maximum level of +15.
Go back down to where you fought the Mass of Souls and turn right and walk out into a pool of
water, turn left and kill another Darkwraith then collect the Large Soul of a Proud Knight from the
corpse. To the left of the corpse you will see some stairs going up into a building, before heading
up go to the left of the stairs to a corpse on the well and pick up six Cracked Red Eye Orbs, then
head towards the stairs (use a Transient Curse now if you haven't used one for a bit) the corpse
on the stairs holds a Large Soul of a Proud Knight, inside the building will be a couple of ghosts,
two Darkwraiths and another Mass of Souls. Try to take them on one at a time if you can being
wary of how many flasks you have as we are close to the boss now.
When everything is dead open a chest in the corner of the room for a Titanite Chunk and head
outside, if you are in human form on your right will be a summon sign to call upon Beatrice to
assist you in the boss fight (you must have used her against the Moonlight Butterfly for her sign
to be here) then head through the fog door and follow the stairs all the way down until they come
to a stop, before going any further now is a good time to check your equipment. First and most
important you MUSTequip the Covenant of Artorias Ring otherwise you will die before you even
see the boss, next is to equip some strong Magic DEF items, Crimson and Antiquated items are
good for this. When you are ready and you are sure you have the ring equipped, drop down off of
the stairs and into the Abyss where you will face..
The Four Kings
The Four Kings are a unique boss battle as you will have to face multiple enemies, either one at a
time or up to four at once depending on how fast you are. If you are a melee character then my
method will serve you well, for strategies relating to sorcery or pyromancy you can find them by
following the link above. As soon as the battle begins wield your weapon with two hands, once
the first King shows itself sprint towards it, they will often use a magical attack while you are at a
distance but with your high magic defence this shouldn't be too bad, get in as close as you can
to the King and start swinging, the idea is to stay as close as possible, at this range it's hard for
the sword attacks to make contact and if they do only the hilt will hit you dealing significantly
less damage than the attacks would if hit by the blade, the only other attack it will use is a grab
attack which you will be able to pre-empt as the King will draw a circle around itself before going
for it, if you are quick you can dodge it but again with your high magic defence it shouldn't take
of more than a third of your HP which is great in this case. The key here is to kill each individual
King before the next one jumps in to join the fight, you can also quicken the battle further by
attacking a King during its death animation as all of the Kings share a single health bar it will still
do damage. If you were able to summon Beatrice the battle will be even easier as she can both
tank and absorb a lot of the hits as well as deal devastating magic damage to the Kings dusting
them off in no time.

Once the Four Kings have been defeated you will be rewarded with the Bequeathed Lord Soul
Shard, 60,000 souls and four Humanity as well as unlocking
Defeat the Four Kings
Defeat the Four Kings, inheritors of souls.
