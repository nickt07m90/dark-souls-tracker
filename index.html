:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:center;justify-content:center}.ov.o{display:flex}.dl{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;max-width:340px;width:88%;text-align:center}.dl h3{font-family:"Noto Serif",serif;margin-bottom:8px;color:var(--accent-bright)}.dl p{font-size:0.85em;color:var(--text-dim);margin-bottom:18px}.db{display:flex;gap:8px;justify-content:center}.dl .btn{padding:8px 20px;font-size:0.8em}@media(max-width:600px){header{padding:12px 12px 10px;padding-top:calc(env(safe-area-inset-top) + 12px)}h1{font-size:0.95em}.btn{padding:5px 10px;font-size:0.68em}main{padding:12px 8px 60px}.it{padding:9px 7px;gap:8px}.tx{font-size:0.84em}.pl{min-width:75px;font-size:0.7em}}

<script>
const rawText = `As you begin the game you will enter the character customization screen and what class you
choose is up to you. They each have their own merits and you can eventually level any class up
to be the same as the others so the only thing that really differs is starting gear. Other guides
usually suggest the Pyromancer class however I have never been a 'Mage' class person so my
preference is as a Banditbut select whomever you like and move on to the Gift option. From here,
be sure to select the Master Key, unless you have selected the Thief class. This key will make
accessing some things a bit easier for you and all other Gifts can be obtained in game this it is
pointless selecting them. The only time the Master Key is the wrong choice is if you have decided
to go with the Thief class as they are defaulted with a Master Key and two copies of it will do
nothing for you. If you have selected the Thief, then I would suggest either the Tiny Being's
Ringwhich will give you a small 5% boost to your max HP or Black Firebombs (10). These bombs
can be used to kill the first boss and grab the Demon's Great Hammer, but this is optional.
Finally, choose the appearance of your character and once you are happy select 'Accept' and sit
back for an awesome introduction video!
You begin within a small cell inside the Undead Asylum. Through the ceiling, a corpse will be
dropped down and you can see a blue light emanating from the body. Approach it and hit
to pick up the Dungeon Cell Key, allowing you to leave your cell. Upon exiting the cell you will
begin a very brief tutorial-like area which will be the only help you get in the game in terms of
controls and how the world of Dark Souls works. As you head through the hallway, feel free to kill
the Hollows you encounter as they are not dangerous and any extra souls you get from killing
them is always a good thing. At the end of this section you will come to a ladder, climb up and at
the top walk into the sunlight where you will see a sword sticking up from the earth. Approach
and interact with it to light the bonfire and you will unlock:
Enkindle
Light bonfire flame.
2 guides

Bonfires are essentially a combination of a checkpoint, health recovery, replenishing Estus Flasks
(you'll get them soon), assigning spells, levelling up your character, and later on, a transport
system but for now you cannot do anything at this bonfire it's time to move on.
Head up the stairs in front of you and open the wooden door. Enter slowly and move over to the
left hand side of the room, sprint and look out for a door on the left giving you an exit as the
Asylum Demondrops itself into the room. While it is possible to kill this demon, at this point it is
highly unlikely especially for a beginner and we are better off avoiding him and picking up some
extra gear first. If you did pick the Black Firebombs as a Gift, you have a very good chance to kill
him, but for now, move on.
Head down the stairs, light the next bonfire and enter the next passage with caution as there will
be a Hollow at the end firing arrows at you. From where you are you should be able to see two
blue lights indicating items available for looting. Approach the first one, avoiding the arrows as
you go to get your first piece of equipment, which will vary based on the class you originally
chose but will go as follows:
● Sorcerer - Small Leather Shield
● Wanderer - Leather Shield
● Thief - Target Shield
● Pyromancer - Cracked Round Shield
● Deprived - Plank Shield
● Cleric - East-West Shield
● Hunter - Large Leather Shield
● Warrior - Heater Shield
● Knight - Tower Kite Shield
● Bandit - Spider Shield
With your shield in hand run, back out of the passage to safety and press
to access the menu. While the menu is opened the game will not be paused so it is always
important to make sure you are safe before doing so! Select the equipment tab and equip the
shield you just picked up and you can now head up the passage using your shield to protect
yourself from the oncoming arrows. When you get close enough, you will scare off the Hollow
and he'll run around the corner allowing you to pick up the next item which will be your starting
weapon. Depending on your class you will receive:
● Sorcerer - Dagger
● Thief - Bandit's Knife
● Knight - Broadsword
● Hunter - Shortsword
● Pyromancer - Hand-Axe
● Bandit - Battle Axe
● Cleric - Mace
● Deprived - Club

● Wanderer - Scimitar
● Warrior - Longsword
Again enter the equip screen and equip your new weapon. Proceed around the corner and kill the
Hollow from before continuing up the stairs after to come to your first Fog Gate. These doors
represent either you entering a new area or section of an area, or the next boss battle you will
come to, head through the fog and into an intersection, Go right, then downstairs to open a door,
giving you a small shortcut to where you are now and then head back up the stairs and onto the
next set SLOWLY. When you reach a point up the stairs, an enemy will send a large boulder your
way. quickly roll off the stairs and out of the way and the boulder will crash through the wall
behind, you making an opening. Head inside to find a knight up against the wall, looking a little
worse for wear. Speak to him and select 'YES', and after a brief conversation, he will give you
your Estus Flasks as well as the Undead Asylum F2 East Keyand unlock:
Estus Flask
Acquire Estus Flask.
2 guides
Estus Flasks are your primary way of HP recovery and you will begin with a limited amount (five)
though as you progress, you will get the ability to increase the amount. Once used, they must be
replenished by resting at a bonfire so use them sparingly and only when necessary.
Head back up the stairs in the direction the boulder came from and kill the Hollow responsible.
Press on down the path and around the corner you will find two sword wielding Hollows and one
with a bow. It's best to get the attention of the first two and lead them back around the corner
out of the range of the bowman to avoid unnecessary ranged attacks andwhen the first two are
dead, head around to take care of the third. If you wish you can head just beyond the fog gate
and kill an Undead Soldier. He isn't difficult but other than that there is no reason to head that

and kill an Undead Soldier. He isn't difficult but other than that there is no reason to head that
way. Whichever you choose, head into the fog door to now face the Asylum Demon!.
As you can see when you enter, you will be on a landing above the Asylum Demon. Press
to lock on to him and then drop down attacking at the same time to deliver a devastating blow.
Don't take too long to do this as it will jump up and attack you on the ledge if you take too long.
From here the battle is pretty simple and the best strategy is to stay around his back end to best
avoid his attacks. When he starts to float upwards, back away to avoid a slam attack he uses, he
poses no real threat or challenge and should be dead within a few attacks depending on your
chosen class. Once he is defeated, you will receive 2000 souls as well as the Big Pilgrim's Key
and Humanity.
Use the key to open up the metal door that the Demon was guarding and head up the hill towards
the peak; a small scene will play and you will arrive at the Firelink Shrine in the kingdom of
Lordran, unlocking:
Reach Lordran
Arrive in Lordran.

1 guide
You will arrive at Firelink Shrine, a hub-like area where multiple characters will gather as you
meet them on your travels. Rest at the bonfire and if you wish, spend some of your souls to level
up. I prefer to focus on Vitality, Strength, Endurance and Dexterity but you can do as you wish.
Sitting just behind the bonfire is the Crestfallen Warrior he will nudge you in the direction of your
next task: to ring the two bells, one up in the tower above Undead Burg and the other is in the
bowels of Blighttown.
On your right you can loot a corpse to be given three Humanity. Up some stairs to the left of the
corpse and up the back you can find Petrus of Thorolund. Speak with him a few times: first you
will obtain a Copper Coin, after this he will offer to allow you to join his Covenant so agree to do
so and you will unlock:
Covenant: Way of White
Discover Way of White covenant.

4 guides
This will also grant you the ability to purchase Miracles from him as well as learn the Shrug
emote if you wish, unless you opted to not level up at the bonfire, there should be nothing here
that meets your price range so you can leave for now. For future reference, Petrus sells the
following Miracles required for a later achievement:
🔆
Heal (1/23)
🔆
Great Heal Excerpt (2/23)
🔆
Seek Guidance (3/23)
🔆
Force (4/23)
🔆
Homeward (5/23)
Back at the corpse you took the Humanity from, head up the large set of steps behind it where
you will find a group of Undead Soldiers and Armoured Hollows. while most will be easy enough
to dispose of, one will be throwing Firebombs in your direction from above so proceed
carefully.Try to lead the other enemies out of the range of the Firebomber and kill them. Head up
the next steps to be on even footing with the bomber and as you approach him, a second Hollow
will attack from your left, so either be ready to take him on then and there or try to lead him back
to where you killed the others. With him dead you can kill the bomber and head up another small
set of stairs to kill the final enemy here.
With all the enemies dead, head down to where you killed the first group to pick up a Soul of a
Lost Undead. You can also see a landing just out of reach so give yourself a bit of distance and
jump over to it (hold
to sprint and as you reach the edge tap

again to jump). Navigate your way over the narrow ledge to the end of the structure to find a Ring
of Sacrifice on a corpse: this is a one-time use ring which allows you to keep all your souls and
Humanity upon death but will break after it performs this task. Wear it if you wish or save it for
later. It can be used as an insurance item when attempting to retrieve a huge amount of souls
from a previous death.
Head back up and before entering the aqueduct, head over to a corpse to pick up a Soul of a
Lost Undead. When you do enter the aqueduct, turn to your left and quickly kill the Small Undead
Rat. These little buggers have the ability to inflict poison, something that you do not have the
ability to cure right now and is very dangerous. When you've killed it, pick up the Soul of a Lost
Undead behind it (if it managed to poison you run back to the bonfire come back). Continue
through the aqueduct and exit out the other end to enter the next area.
Kill the two Undead Soldiers in front of you and the head around the corner to kill two more, one
right in front of you and another inside a doorway to your left. Head back a little to where the first
two were and on the right of the small steps are some barrels: smash them and drop down from
where they stood to a landing below, where you can find a Large Soul of a Lost Undead. From
here, drop down again where two Hollows will attack. Head across the small bridge and through
the room, towards the ladder in front of you and you will be ambushed by four more Hollows. Be
careful as these guys are weak on their own but in groups can be very annoying. When they are
dead head up the ladder and onto a walkway and at the end you can pick up some Humanity off
a corpse. Head through a gap in the walkway barrier to drop down onto the stairs where you
entered the area before passing through the next fog gate.
Inside, just on your left is a Soul of a Lost Undead, up the stairs and outside you will meet the
Hellkite Dragon, though he won’t bother you for now. Head up a little further to encounter three
Undead Soldiers with a fourth up some stairs well positioned with a crossbow. Try to lead the
soldiers out of his range and take care of them one at a time until you can reach the
crossbowman and kill him. Head back down quickly and open the door underneath the
crossbowman and head onto a small balcony to find a Wooden Shield Go back up and look to
your left to see your next bonfire and rest.
If you have used any Estus Flasks since Firelink Shrine, you may be wondering why your total has
not been reset to ten, to do this you must use a process called Kindling. To do this you must use
one of your Humanity items to reverse your Hollowing to make you human again and then
sacrifice a second humanity to kindle the bonfire. Doing this will upgrade the amount of Estus
Flasks you are allowed, this upgrade is permanent to each individual bonfire and is also
permanent in each subsequent playthrough but every time you discover and light a new bonfire
you must repeat it to gain the effects once more with that specific bonfire.
Head back out and kill the enemies again. Take the walkway over to the left where you will find
two spear-wielding Undead Soldiers. These guys are slightly tougher than the others as the

spears allow them to keep their guard up while attacking, the best way to kill them is to use a
parry/riposte attack which is covered in the Hints & Tips page. If you are having trouble grasping
this technique, then try to push forward and attack at the same time to kick the enemy and
maybe drop his guard for a quick assault. When the pair are dead, break some boxes to reveal a
stairway, head down and turn right, head towards the doorway but be careful as a soldier will try
to ambush you from behind some furniture. Kill him and follow the path outside and face four
Hollows. Head up the ladder when you are done with them and collect 10 Throwing Knives and if
you look over the edge of the roof ,you should see the area you passed through the fog gate
from. On the right will be some scaffolding. Take a run up and jump onto it to gain access to the
higher floor of the house and head up some stairs onto a balcony. Follow it around to pick up a
Light Crossbow and 16 Standard Bolts. From here return to the downstairs room below the spear
enemies and now head forwards to meet the male Undead Merchant, speak to him and purchase
a Short Bow, around 50 Standard Arrows as these will be useful soon and the Residence Key. If
you do not have enough souls on you simply rest at the bonfire to respawn enemies and kill them
until you have enough, once you have the bow save up more souls and buy the Repairbox and
Bottomless Box. You can now if you wish to, kill the merchant as he no longer has anything of
real importance, however you may want to keep him alive in case you need some more arrows for
a specific weapon coming up. Be wary as there are no other merchants that sell arrows for quite
a long time, the choice is yours to make, if you decide to kill him he will drop the Uchigatana, a
katana weapon that can be great early on for Dexterity focused characters, the choice is up to
you. He will also drop the Residence Key if you have not purchased it.
When you are ready, from the bonfire room head to the left, you can see a pair of Firebombers
pelting the walkway ahead of you, time it right and sprint across into a room where two Undead
Soldiers are waiting. There is usually a third just outside the room and he will usually join in,
though on the odd occasion he is sometimes in the room with the other two already. Kill them all
and head out and into a door on your left, where there will be another soldier waiting, kill him and
then go into the room on the left to find a chest containing 5 Black Firebombs. Head back
outside and up some stairs to find three more soldiers. Two will attack using melee, the third will
hurl firebombs at you, kill them and turn back the way you came and climb up a ladder. Kill the
three Firebombers on the scaffolding and then collect the Soul of the Lost Undead.
Jump back down where the ladder was and open the door there using the Master Key, head into
the room and out another door onto a landing with a chest containing 3 Gold Pine Resin, a useful
item that imbues your weapon with the lightning element for a short time. Outside again and
head into the tower on your left, keeping your shield up as you climb the stairs as there is a
crossbowman at the top. Kill him and head back down and slowly down the next stairs where two
sword soldiers and a spearman wait. Try to lure them up one at a time and kill them trying to
focus first on the spearman as he is the deadliest. Once at the bottom you have a choice to
make, on your right down some steps and at the end of a hallway is a Black Knight, these guys
are quite tough especially in the early game, defeating them though can lead to good items, a
good idea may be to use some of the Gold Pine Resin you found to get an edge on your enemy. A
good strategy is to lead him out of the tunnel and into some open space to avoid his attacks

whilst trying to circle around him and perform backstab attacks for maximum damage. If you
manage to kill the knight you will be rewarded with around 1000 souls and if you're lucky, the
following weapons can also drop:
⚔
Black Knight Sword (1/50)
⚔
Black Knight Shield (2/50)
The Black Knight Sword would be a massive advantage this early. It's stat requirements are not
too outlandish for you to reach either by grinding souls locally (20 STR/18 DEX).
Head back down the stairs and go down the path the Black Knight was guarding to pick up the
Blue Tearstone Ring.
If you decided to kill the knight chances are he took a bit out of you so head back to the bonfire if
you need to and restock on Estus Flasks as there is a boss battle approaching. When you have
returned to the area the knight was at, head up the stairs very carefully as you will be lured into a
trap. As soon as the barrel comes your way, try to run back down the stairs to avoid it and then
kill the enemy responsible. At the top of the stairs you will enter a tower, ahead of you will be a
wooden door that you may open now as you have the Master Key. Beware though, through the
door and down the bottom of some stairs is a powerful enemy. Though he is certainly not beyond
killing at this point, to make things easier, we will defeat him a little later as it is not necessary at
this point in the game. Head upstairs instead and you will come to the fog gate that leads to the
boss. Before doing anything look, behind you to find a group of barrels, destroy the one furthest
on your right to release a Crystal Lizard. Kill these creatures and they will drop upgrade materials
for your weapons and armour but you must be quick as they will run away and disappear if you
take too long. If you manage to kill this one you will receive two Twinkling Titanite and a Titanite
Chunk. If you need to, heal up and return to walk through the fog.
On the other side you will be safe to start with, turn to your right and climb up the ladder beside
you and kill the two enemies you find at the top, this spot will be a critical part of your strategy in
a moment.
Head back down the ladder and make your way across the walkway, when you have almost
reached the end, the Taurus Demon will show himself. Taking him head-on is a viable way to
defeat him but for ease run back along the walkway and up the ladder from before. When you
reach the top, target (
) the Taurus Demon below, switch to two handing your weapon and jump down while attacking to
deal some serious damage, in the same style as the Asylum Demon. Once on the ground, try to
lead the boss away from the tower with the ladder and when you think you've gotten him far

enough, roll through his legs and head up the ladder again to repeat the process. He should be
dead within three to four of these attacks & upon defeating him you will be awarded 3,000 souls,
Humanity and a Homeward Bone. It is also possible, albeit quite rare, to obtain his weapon,the
Demon's Greataxe. There is a short video below if needed.
Head across the walkway now and into the other tower and you will come to a set of stairs
leading down. First, break the crates just next to the stairs for a Large Soul of a Lost Undead. At
the bottom of the stairs, turn to your right and head down some more to meet a strange fellow by
the name of Solaire of Astora. Speak with him to begin a side quest involving the character, then
speak to him once more and he will ask if you are willing to hear a proposition so select 'Yes' and
after some more dialogue select 'Yes again to receive a White Sign Soapstone which can be used
to leave summon signs for other players to request your assistance in their Dark Souls world.
Head back upstairs and you now face a large bridge with a bunch of enemies. Approach it
extremely slowly as the Hellkite Dragon you met at the beginning of Undead Burg will now make
another appearance, reducing all the enemies on the bridge to ashes along with you if you are
too close. He will then perch himself atop of the structure at the end of the bridge. The aim here
is to avoid getting into an encounter with the dragon as it is extremely powerful at this point and
indeed any point in the game, instead you want to sprint across to about halfway where there will

be a descending staircase on your right. There is a good chance of multiple deaths here so feel
free to make a quick trip back to the bonfire or merchant to spend your souls before possibly
losing them for good.
When you have managed to make it down the stairs in one piece, you will have two doors in front
of you. One will lead you underneath the bridge, ignore it for now and enter the other one and
down a short set of stairs will be a ladder you can kick to make it descend to create a shortcut
for you to the Undead Burg bonfire. Head back up the stairs now and under the bridge, make
your way over the narrow ledges on the right side, and at the end of the path will be an Undead
Soldier. Kill him and then slowly approach the ledge on the other side where another soldier will
be, but lure him back onto more solid ground just to be safe before you kill him.
Head onto the ledge of the bridge where you can see the Hellkite Dragons' tail waving about,
take out your Short Bow (make sure you have arrows equipped) and begin shooting his tail each
time he will move around a bit but just wait until he returns to his original position, you are not in
any danger here. Eventually it will be cut off and you will be rewarded with a unique weapon that
is required for a much later achievement, the:
⚔
Drake Sword (3/50)
At the moment, unless you were lucky enough to get the Black Knight Sword earlier, the Drake
Sword will be a very powerful weapon so equip it for the time being but do not rely on it as it will
get weaker and weaker as you go as the Drake Sword, like other dragon weapons, does not scale
with any stat such as strength or dexterity and as a result it's abilities never increase.
From here you can head onto the ledge where the second soldier was waiting and into a tunnel
with a group of Undead Rats. Try to take them out carefully, one at a time if possible to avoid
being poisoned, after they are dead, head up the ladder in the same room and when you reach
the top you can exit through the archway into the next area.
6. Undead Parish to Darkroot Garden
There will be a soldier directly to your right, he should come to you so let him and kill him, in the
archway you just came from will be a spiral staircase leading up, if you are feeling gutsy you can
attempt to take on a second Black Knight at the top of the stairs though this one is a little bit
tougher than the first, the same strategies apply, try to go for parry and riposte attacks as well as
backstabs when he dies you will be awarded a Titanite Chunk and 800 souls.
Whatever you decide to do your next step is to head up the stairs the soldier was standing at the
top of, do so slowly and you will see a large metallic boar called an Armoured Tusk beneath a
small bridge, taking him head on is extremely difficult and there is another way to kill him, sprint
forwards and as soon as you can break right through some pillars, there will be an Undead
Soldier there but try to at least run up the stairs a little before you turn to fight him, ensuring the
boar cannot charge you. Kill the soldier and head upstairs where a spearman and on the bridge

two crossbow man are, try to time your attacks carefully with the spearman to avoid being hit by
the bolts flying in your direction, once you have killed them all pick up the item at the end of the
bridge to find an Alluring Skull.
Go into your menu and equip the Alluring Skull to your usable items roster, try to aim it just below
you on the bridge but be careful not to stand too close to the edge as the throwing action can
cause you to fall off. If you get it right it will attract the boar to come right up under you allowing
you to do a drop attack similar to the Asylum and Taurus Demons, this should kill it in one blow, it
can sometimes drop the Fang Boar Helm.
You should see a set of stairs leading down now next to where the Armored Tusk was guarding,
at the bottom and down a passage you will see a Hollow enemy running away, do not try run after
him as he is leading you into an ambush, instead just poke your head beyond the walls and roll
straight back to bring the Hollows waiting to you, kill them and head up the stairs to find a ladder,
go down the short stairs on its left killing the Hollow there and pick up the Mystery Key off of the
corpse then head up the ladder.
At the top two more Hollows will rush you, kill them and look out onto the rafters, carefully make
your way over them and pick up the Large Soul of a Lost Undead, head back to the landing and
up another ladder where you will find a fogged door, pass through as there is nothing waiting for
you on the other side. At the end of the short bridge turn right and follow the path where you will
see a Balder Knight, try to approach him slowly and use a backstab to take him down quickly, if
you alert him then just kill him in the normal fashion, Balder Knights are not difficult and are
simply beefed up Undead Soldiers, once you have killed him you can pick up the Knight Shield on
a corpse just in front of you.
Head back in the other direction and up some stairs where an Undead Soldier will be standing,
kill him and then head down the next passageway. Before heading out be careful of a coming
ambush, there will be an Undead Soldier (spear) to your right and a Balder Knight will run up on
your left, get their attention and try to head back into the passageway to take them on one at a
time. With them dealt with continue along and take a path on your left when it comes up, head
through and into an open area, down the stairs on your left kill the Undead Soldier and pick up
the Basement Key, then pull the lever to raise the gate, on the other side of the stairs you can
pick up a Halberd, from here return down the path you came from and avoid entering the building
for now.
Back on the main path follow it down some stairs where three Undead Soldiers are waiting (two
melee, one crossbow) try to walk the swordsman behind the building where the crossbow
attacks will not reach and when they are dead go take care of the last one, again do not head
into the building, instead go down the long path on your right into a room and proceed down the
stairs to find the next bonfire on the first landing, if you like kindle it to make sure you can have at
least ten Estus Flasks and level up as you need/want to. Before heading down the next lot of
stairs go through the door and up to the large metal gate, on your left sitting in wait will be
Siegmyer of Catarina, another side quest character, speak with him a couple of times and he will
reveal his dilemma of not being able to find a way to raise the gate before you, after that little
detour head back and down the next stairs to find your first blacksmith, Andre of Astora, first

have him repair your equipment and if you have been fortunate to get some as drops you can use
some Titanite Shards to upgrade your weapons and armour (do not bother upgrading the Drake
Sword).
Once you are all done, make your way from the bonfire back to where you raised the gate, head
inside the building now slowly and try to lure out the first Balder Knight, when hes dead head
back in again, the second one will not react when you get closer, as soon as you enter the door
way you will be attacked from your left, try to roll back to dodge it and head outside again and
take the Balder Knight on in a more open area, these ones are much quicker and agile than the
bulkier knights but still go down with a couple attacks, head in again when he's dead head inside
and kill the last one.
From where you stand you should be able to see a large Heavy Knight with a tower shield, it's
best not to enter from here to take him on as there is a magic wielding enemy lying in wait just
above where you would enter, instead go back around to where the path leading to the
blacksmith is located and enter the building from there and take on the Heavy Knight, while he
looks daunting he really isn't very difficult, just avoid his attacks and strike back when you get an
opening. When he's dead pick up the Fire Keeper's Soul that he was guarding where it rests on
an altar.
Head to your right now where you can find an elevator, riding this will take you back to Firelink
Shrine, jump on in and ride it down and make your way to the bonfire. Looking towards the man
that told you about the bells, look to the left and follow a staircase down and at the bottom
behind some bars you can find Anastasia of Astora, speak to her (as much as you can as she is
mute) and give her the Firekeeper's Soul you just acquired in exchange for upgrading your Estus
Flasks making their healing power more potent, that's all we need to do here for now so head
back to the elevator and up into the church once more.
When you get off of the elevator, look to your left and take some stairs up, just around the corner
will be a Balder Knight (Rapier), kill him and continue along, in the next room is the dangerous
Channeler, an enemy that uses magic attacks, surrounding him will also be a large group of
Hollows, together they can be a bit of a challenge, do your best to take them on individually but
try to focus on killing that Channeller, just keep an eye on him as he has the ability to buff the
Hollows and teleport around the place, once he has been defeated he will not respawn so in the
event of your death you will at least not have to deal with him again, if you get extremely lucky he
may cause himself to fall from the ledge allowing you the chance to kill him without being
bothered.
Once the room is cleared there will be two doors ahead of you, one on the left and another on
the right, ignore both and instead turn around when in the centre of the room and go down the
right hand path and up some stairs where another knight will be, kill him and not much further
will be a wooden door with clearly visible cracks in it, attack the door to break it down, at the top
of a small set of stairs you will find Lautrec of Carim, a useful but rather nasty NPC, speak to him
and he will ask you to free him, do so without worry, he will not become hostile unless provoked,
speak to him after opening the door with the Mystery Key and he will guarantee you a reward
which you will receive a little later.

Head back the way you came and into the doorway on the left where you can find a Large Soul of
a Nameless Soldier, then head into the other doorway and up a couple of ladders you will find a
fogged door, on the other side of this is your next boss fight
Belfry Gargoyles
If you are human, before the door should be a summon sign which will allow you to call on either
Solaire or another random player to help you with the boss, if you prefer you can take them on
yourself, in this fight you will take on two enemies, at first there will only be one gargoyle to deal
with however once you get him down to his last leg of health or you have taken too long a second
will join in. Speed is the key in this battle, you must aim to kill the first gargoyle as quickly as
possible, focusing all attacks on it's tail to chop it off, if you do so you will receive the rare
weapon:
⚔
Gargoyle Tail Axe (4/50)
By killing the first one quickly you can avoid getting rushed by both at the same time, the first of
them will focus on using melee attacks while the second also employs a fire-breath attack which
can deal a decent amount of damage, the other danger to be aware of is that should you get too
close to the edges of the rooftop you can fall to your death, if you did summon a helper or Solaire
this should be an easy fight as it gives a second target for the gargoyles to focus on but either
way you should be just fine.

Once both gargoyles are dead head into the tower on the other end of the rooftop into the
building and up a couple of ladders, at the top of the tower pull the lever to ring the first bell and
unlock
Ring the Bell (Undead Church)
Ring Bell of Awakening at Undead Church.
2 guides

Head back down and at the base of the tower will be a new NPC, Oswald of Carim the Pardoner,
this guy will sell you items to do with PvP. He also sells a Miracle for 40,000 souls:
🔆
Karmic Justice (6/23)
Though this is a bit out of your price range for now. From here make your way back down to
Firelink Shrine.
When you arrive you will have a choice to make concerning Lautrec, you can either kill him now
or allow him to live which will eventually lead to the death of Firekeeper Anastacia, once
Anastacia dies the Firelink Shrine bonfire will be extinguished but it is possible to reignite it later
on if you follow the questline, for a more in depth account of what will occur refer to the NPC
page or follow his/her link. I personally kill Lautrec as allowing him to live does not really result in
any great reward other than his armour which by the time you are able to obtain it is quite poor in
quality, when Lautrec is dead he will drop the Ring of Favor and Protection.
From Firelink Shrine return to the Undead Burg bonfire, from here you want to follow the path you
took to arrive at the Taurus Demon boss fight and continue until you can get to the area where
you first met Solaire. There will be a door just before the bridge with the Hellkite Dragon unlock it
with the Basement Key you found earlier and head down the ladder, at the base look to your
immediate right and ascend the stairs here to unlock a door giving you another shortcut to/from
Undead Burg. Rest if you need to and head back down into Lower Undead Burg and to your right
from the steps down another set. Almost immediately a new enemy will become hostile and run
towards you, be careful of these Undead Attack Dogs, when they attack you (even if you defend)
you will see a small bar pop up in the lower centre of the screen with the Bleed status symbol on
it, if this bar fills you will take a tremendous amount of damage, there should be three of these
dogs here, kill them and press forward.
Turn to your right and head back down a different path, about halfway you should hear a voice
coming from inside one of the houses but the door is locked, unlock it with the Residents Key we
got from the merchant a while ago and inside you will find Griggs of Vinheim, a Sorcerer that has
gotten himself stuck and just on his right roll into the barrel with a body in it (to avoid
accidentally hitting Griggs) and you can get the Sorceror Set and a Sorceror's Catalyst. You can
leave after speaking with Griggs now, he will meet you at Firelink Shrine next time you visit there.
Head back out at the end of this path will be a couple of groups of Hollows with torches, be wary
of these enemies as they can do a lot more damage than their weaker counterparts and will
attack wildly, when they are dead on the right you can pick up a Twin Humanities.
Head back down the main path slowly, once you have gone a little too far three of the doors on
your sides will swing open and you will be ambushed by three Undead Assassins, on their own
they aren't so bad but in a group they can be frustrating as they also have the ability to inflict
Bleed, when they are dead search in one of the rooms to the right that they came from and pick

up a Mail Breaker. Continue along the road and very soon three more Assassins will attack
followed by an Undead Attack Dog, kill them all (drop back a bit if you need to) when they are
dead look down the path as there may be one more dog left, if there is kill him and head back to
where you came to this part of the area, on the left will be a tunnel and inside is a barrel with a
body in it, break it to get a Large Soul of a Nameless Soldier and in the last door on the right you
can pick up the Thief Set as well as the Target Shield. Outside and at the end of the path will be a
fog door to the next boss.
Capra Demon
The boss fight itself is not so much as difficult as it is annoying, you must fight the boss in a
small cramped area while he is assisted by two Attack Dogs, the best strategy here is to run to
your left and up some steps, the Capra Demon rarely follows you and it should allow you to single
out the dogs easily, from there on the landing at the top of the steps the Capra Demon will
usually walk up just underneath you, use this to your advantage to land a plunge attack, repeat
this process if you can for a quick kill or fight him on the ground. When he is dead you will get
6,000 souls, Humanity and a Homeward Bone as well as the Key to the Depths and rarely the
Capra Demon's weapon, a Demon Great Machete.
After killing the Demon, exit the area and head left down the stairs. When you get to the bottom,

you will see an assassin ahead of you. This is an ambush and another assassin waits where the
path widens. Kill them both and continue until you see the steps. Go up the steps and inside the
tower. Halfway up is an archer. After killing him, head up and through the door into the sewer.
There is a Merchant on the right. After talking to her, head down the sewer and unlock the gate.
Kill the rat, and go outside. Be aware of the soldier immediately outside. You can see the Firelink
Shrine in the distance so head down and rest.
Griggs should be in Firelink now, if you have an Intelligence stat of 10 or higher he will sell you
sorcery spells that you can mark off the checklist as you go, you should have the checklist from
the page in the link - Dark Souls Walkthrough. As you probably noticed by now, this walkthrough
also includes embedded checkboxes that you can use if you prefer.
That said, the spells you can get from Griggs, for a total of 25,500 souls, are as follows:
🌀
Soul Arrow (1/24)
🌀
Great Soul Arrow (2/24)
🌀
Heavy Soul Arrow (3/24)
🌀
Great Heavy Soul Arrow (4/24)
🌀
Magic Weapon (5/24)
🌀
Magic Shield (6/24)
🌀
Aural Decoy (7/24)
🌀
Fall Control (8/24)
Head now to the elevator and take it up to the Undead Parish, head on through to the bonfire
above the blacksmith and head down to meet him, when you arrive look to your left to see a
doorway with some stairs leading down, in the room that follows will be a Prowling Demon (also
called a Titanite Demon). These enemies act as a sort of mini-boss though they are very
predictable and easy to defeat. The main strategy for killing one is to first run up to it as quickly
as you can while avoiding his lightning attacks as he only uses these at long range, when you
reach him try to always stick to it's right hand side (from your view i.e. the side he doesn't wield
his weapon on) if you stick to this side and keep your shield up the majority of his attacks will
either miss you completely or just graze you, simply take your time and whittle down it's health
until you defeat it, when you do you will be rewarded with 2,000 souls, a piece of Demon Titanite
and sometimes the weapon they wield the Titanite Catch Pole.
Head back up and heal at the bonfire if you need to and then walk through the doorway the
Titanite Demon was guarding to enter.

Head along the path and very soon you will be greeted by a new enemy, the Demonic Foliage,
these guys aren't too much trouble, the usual block and attack is fine but keep an eye out for an
animation where they will lean back slightly with both arms raised, when they do this they are
about to perform a grab attack which will do a decent amount of damage and can break your
guard, roll away to avoid it or hit them before they can complete the attack and disrupt it.
Further down the path you can kill another Foliage and you will see the path break of to your
right at the small pool of water and go uphill, don't worry about this area for now, we will come to
it later on. Continue along the cliff ledge ahead, just around the bend is another Foliage in front
of you at a distance. Do not go to attack, let it come to you and kill it, the reason for this is he is a
trap to trigger an ambush. Where you stand there should be a moss covered rock sticking out of
the ground along with some rubble from a broken wall, if you look on the ground just beyond the
rock you can see the top of a Demonic Foliage sticking out of the ground pretending to be a
regular bush, if you walk up and attack it you can catch it by surprise, walking to far past it will
trigger the trap and he will pop up behind you.
A few steps from the trap is a boulder on your left, behind it is a Large Souls of a Nameless
Soldier, head down the rest of the path as there are no more enemies for the time being, you will
come to a large door that will be locked, to open it you need to purchase the Crest of Artorias
from the blacksmith in the Parish for 20,000 souls and while it doesn't take that long to save up
this amount the enemies in here may be a tad too tough for a less experienced player so we will
avoid it for now, to the left of the door is a brick wall attack it to reveal a hidden bonfire and rest.
If you look to the right of the locked door you can see a path leading down, follow it and you will
come to a fog door, look on your right and you can see a cave with a lootable corpse but beware
as it's another trap. If you look closely you can see another three Demonic Foliage trying to pass
themselves off as normal shrubbery, take out your bow and fire a shot at one of them to make
them pop up, allowing you to kill them one at a time, when all three are dead you can collect the
Large Soul of a Nameless Soldier and head through the fog door.
When you pass through, right ahead you can see a large body laying on the ground, if you get
too close they will stand up and you will have to face a Giant Stone Knight, these guys have crazy
defence and hit hard, try your best to avoid their attacks and get behind them as their shield can
block out almost any damage, the other danger here is that these knights can cast a spell that
slows you down so you will be unable to fight properly or escape if you need to, approach at your
own risk. If you decide to take them on they have a chance to drop the rare weapons:
⚔
Stone Greatsword (5/50)
⚔
Stone Greatshield (6/50)
Hug the left hand wall of the area and you will come to a small gap with a path, head down but
turn around quickly and kill the Demonic Foliage that tries to rush you, continue down the short
path and kill the Tree Lizard that tries to camouflage itself and then collect a Partisan from the

corpse.
Back in the clearing continue to follow the wall along until you get to another tree with a lizard
enemy on it, kill it and turn to face the middle of the clearing, you will see another Stone Giant,
approach it to animate it and kill it, not far to the left of his original position is another one in
front of a doorway, you will need to kill it to continue.
When the Giant is dead look to your right before going through the doorway, you should be able
to see the glow of a lootable corpse, approach it slowly and you can see a Stone Giant with two
Demonic Foliage right next to it, that's not all though, if you circle around to the other side you
will see that there is an extra Stone Giant and two more Demonic Foliage making a total of six
enemies guarding the treasure, clearly taking them all on at once would be suicide, instead take
out your bow and use it to alert each of the Foliage enemies and take them out one at a time,
when they are all dead carefully walk up to one of the Giants to trigger it, being careful not to
wake them both at once and kill them. When they are all dead you can collect the Elite Knight
Set.
Through the doorway the earlier Giant was guarding will be some steps that lead up to a fog door
and the next boss battle, I would highly recommend becoming human before this boss battle as
under the stairs that lead up to it hidden by a bush is a summon sign to gain the aid of the Witch
Beatrice, she will be a godsend in the upcoming battle against the
Moonlight Butterfly
Do not be fooled by it's name, the Moonlight Butterfly while considered an easy boss can still
unleash some devastating attacks. If you went with a magic user this should be a bit of a simpler
fight for you and having Beatrice assist will make it even more so. The Moonlight Butterfly for
most of the fight will stay in the air at long range making it impossible to attack with melee, this
is why having Beatrice come along is recommended. All of the Moonlight Butterfly's attacks are
magic based so if possible equip some armour that gives a boosted magic defence (the
Sorcerer’s set you got when rescuing Griggs is perfect here). The Butterfly will use the following
attacks -
- Fires slow moving Soul Arrow attacks
- Fires multiple fast moving magic missiles in two waves
- Fires a sweeping beam attack (roll under it to dodge, this is one of it's most devastating
attacks)
- While changing sides of the bridge it will drop blue orb-like bombs, dodge by rolling in the
Butterfly's direction
- When below 50% HP the Butterfly will fly over the bridge and drops a blue orb bomb that
explodes on impact
If you are using melee, avoid the Butterfly's attacks and it will eventually land on the edge of the
bridge, take a two-handed stance with your weapon and wail on the enemy as much as possible,
after about 7-8 seconds the Butterfly will begin to glow, when it does run away as it will release a
magical pulse attack dealing good amount of damage, continue with this strategy and the
Butterfly will be dead in a couple of rounds.

When defeated you will be awarded with 10,000 souls, Humanity and the Soul of the Moonlight
Butterfly (DO NOT USE).Head down to the other end of the bridge and into another tower, at the
top of the stairs you will find the corpse of a blacksmith, loot it to receive the Watchtower
Basement Key, Homeward Bone and Divine Ember.
Head back where you entered the clearing and look to your right, you should see a large and out
of place tree, if you attack it a few times it will die off and reveal another path, head down and kill
the Frog-Ray you come to before continuing to the bottom where you can kill another tree and
head into another open clearing.
On your right you can see some rubble, in the centre are some steps that lead to a path, head up
and near the top you will find a Stone Giant, he is a little more dangerous in these cramped
conditions so do your best to kill him carefully, once it's dead at the end of the path you can find
the Wolf Ring. Back in the clearing to your right when you come out of the tunnel is another
Stone Giant, lead it away from the cliff edge as if you get too close it causes four of the Frog-Ray
enemies to appear, kill the giant and the frogs either separate or together if you're feeling
dangerous and follow the edge to the left to find a Soul of a Proud Knight. That is everything we
can do here for the time being, for now head back to the blacksmith and hand him the Divine
Ember, you will now be able to make Divine weapons so long as you have the necessary
materials.

From the Undead Parish head back into Undead Burg and down to where you defeated the Capra
Demon. To the right of the room Capra was in are some stairs leading down, follow them and
when you see the Assassin stop and fire a shot at them with your bow so it comes to you, the
reason you do this is because there is a second Assassin immediately behind a corner on your
left, this will stop you being trapped into a pincer attack. After they are dead head up some steps
to your left and into the doorway. Keep your shield up as there is a Hollow with a bow on a
platform above. Head up the steps killing the hollow on the way and into a tunnel that leads to
the aqueduct. On your right will be the Undead Merchant (female), this one sells moss recovery
items as well as some resins and other bits and pieces, down to the left you will come to a gate
you can open creating a new shortcut from Firelink Shrine. Head back down now and collect the
Large Soul of a Lost Undead and then use the a key to open the door and head into the next
area.
7. The Depths
Down the steps you will find two Hollows and behind you will be a third, kill them all and down
the path the third Hollow was will be a Large Soul of a Nameless Soldier. Down the next set of
stairs you will find six Hollows, they are spaced out enough that you can kill a couple at a time
without getting overcrowded. If you look down to the next level you will see an enemy chopping
up meet, this is the Butcher. Head down the next steps slowly, there will be an Undead Dog at
the base of them, try to bring it back upstairs and kill it without alerting the Butcher, head back
down and pull out your bow, you want to try to hit the Undead Dog that is right beside the big
guy and do the same as you did with the last one, now it's time to take out the main enemy here.
Lure the Butcher into the centre of the room and try your best to avoid his attacks, he swings
slow but hit's very hard, especially try to avoid his 'slam' attack when he raises his weapon above
his head with both hands, roll around and attack when you see an opening and he should die
without a problem. Head over to the area he was working at and open a chest here to get the
Large Ember.
You can now head down to the lowest level into the water, be careful here as your mobility is
limited, there will be two Undead Attack Dogs and a Hollow, take them out one at a time to be
safe and climb up some rubble back onto solid ground. Turn to you right and head down a little
then turn around, a second Butcher will have dropped down and be heading towards you, kill him
using the same strategies as before and when this one dies it will drop a Sack, an item you can
wear as a helmet.
Look in the direction the Butcher came from and head that way into a room full of barrels, in the
back right corner roll to break them and release a new ally, Laurentius of the Great Swamp.
Speak with him and he will give you his thanks, he will now be in Firelink Shrine next time you
visit and will sell you Pyromancy spells after some dialogue.
Go back now on the path you were on and down some steps into more water, you will see a
lootable corpse on your left but wait a moment and pull out your bow, aim with it and look up to

the ceiling to see a Slime enemy waiting to drop on you, fire an arrow and kill it, they have quite
high defence so it will take a couple of hits. When it's dead pick up the item, a Soul of a
Nameless Soldier and a Hollow with a torch will drop down, kill him and continue on until you get
to a tunnel where you can see a Hollow with a torch standing in front of a door, if you look up you
can see a bunch of Slimes on the ceiling, first use your bow to lure/kill the Hollow and then force
one or two Slime to drop at a time and kill them, when you can enter the door at the end to find a
bonfire.
From the bonfire head back out and through a doorway to your right down some steps, on your
left you will see a Giant Rat walking about, we will take care of him soon. Head through another
door and into a sewer, on your right will be five rats, kill them all and loot the corpse to get a
Greataxe. In the other direction as you approach the corner be wary of the single crate as a rat
will jump out if you get too close. Around the corner will be another rat with a couple more just
behind him in the lower area and the Sewer Chamber Key.
Turn to face the stairs back up to where you came from and you will see a tunnel, follow it around
to a fog door, pass through as there is no immediate danger on the other side. When you walk
through at the end of the platform you will see three Large Undead Rats and a Channeller, use
your bow to lure the rats up to you one at a time and then head down and kill the Channeller, his
spells shouldn't make contact while you are on higher ground. When you've killed the Channeller
look to your left, there will be two crates against the wall, these both have rats in them, take
them out and continue to the back wall, look to the left and get a Large Titanite Shard from the
body.
On the other side of the room, kill the shy rat and before you head into the next tunnel read these
instructions carefully as the tunnels ahead have trapdoors in them which will drop you into the
lower tunnels filled with deadly Basilisk enemies, while they don't do a lot of damage or have a
lot of HP they consistently use an attack that causes the Curse status (for info on this refer to
the Hints & Tips page), if you do drop down you will have to fight your way through them and
back to safety. So, to avoid these traps enter the tunnel and take the first right, you will see a rat
that will run away, don't chase him as he is trying to lure you to one of these holes, instead move
forward slowly and take the left, another rat will greet you, though this one is fine to follow to the
end, kill it and then loot the corpse for a Soul of a Nameless Soldier, from here turn to your right
and up a small ramp, in the next room will be the Giant Rat from before. The rat isn't very
difficult, it doesn't have a lot of HP and doesn't hit too hard but if you are having trouble try
standing in the doorway and firing an arrow at it, when it gets close head into the doorway and
attack him from the safety of the alcove as he shouldn't be able to reach you (if you are having
trouble try using a polearm weapon like the Halberd or Partisan).
When the rat is dead pick up the Soul of a Nameless Soldier and then head to the end of the
room where the water runs off, slide down, at the bottom you will be in the area I warned you
about before with the Basilisks, but as you are here on your own terms now it is easier to
navigate. The first Basilisk is down your first left, remember that if/when they spray their mist
attack roll back and try to let the Curse bar drain before attacking again, speed is the key with
these enemies. After it's dead take another left and up some stairs you will see two more behind

a metal gate, if your weapon is long enough you should be able to walk right up to the bars and
kill at least one of them so they don't try to mist you, if not you will need to head through a small
archway where a Soul of a Nameless Soldier is resting and try to fight them in a more narrow
area. Once those two are dead turn right and you will see another Basilisk on the other side of a
hole in the floor. If you are quick you can use your bow to fire a few arrows and kill it from a
distance.
Head over to where it was waiting and go up the ramp a little bit, turn around from here and you
should be able to see two or three more Basilisks, using your bow kill them all from the safety of
higher ground but be sure to stay on the ramp as the mist can reach you if you are too close to
the edge, when they are dead head back and now to your right where if you look down will be
two more Basilisks, try to hit one with an arrow and get it to come to you so you can fight them
individually or drop down and just try to kill them as quickly as you can. When they are dead
head down and pick up the Large Soul of a Nameless Soldier, head through the opening into the
area the other Basilisks were in and down the tunnel on a body you will find the Ring of the Evil
Eye. From here head back up the steps and then up the ramp you used to target the Basilisks, at
the top will be another trap hole it's no danger now as it only drops you to where you just picked
up the ring, roll over the hole and pick up the Humanity from the corpse and then retrace your
steps back to the first junction you found a Basilisk.
Follow the path to find a group of rats, kill them all. If you are Human you may trigger the
spawning of an NPC Phantom - Kirk, Knight of Thorns, if you kill him he will drop the Barbed
Straight Sword but you must fight him before killing the area boss as he will no longer invade this
area once you have. Head up the stairs and across the water to a set of stairs leading up, follow it
to a door you can unlock and inside you will see a ladder, if you go up it you will see you have
created a shortcut back to the bonfire, visit it if you need to restock or level up and return down
the ladder and stairs. In this section of sewer you will find two rats and three Slime enemies, kill
them all and at the back through a torn up gate you will meet Domhnall of Zena, a merchant who
will sell you different boss armour sets after they have been defeated as well as a few other
items, once you have rung both the bells he will move his business to Firelink Shrine.
Purchase anything you need/want from Domhnall and then go through a doorway and up some
stairs to your left. You will come out on a walkway overlooking a large open area, this is the arena
we will fight the next boss at, turn right and go down some stairs when you find them, continue
until you find the next set of stairs but continue past them and behind a pillar at the end of the
walkway you can pick up a Heavy Crossbow and eleven heavy bolts. Back at the stairs if you are
Human you should be able to see a summon sign that will allow you to summon Solaire do so if
you wish and head down the steps and enter through the fog door to fight
Gaping Dragon
The key for winning this battle is distance. The Gaping Dragon is a large enemy but very slow and
easy to manipulate so you will rarely if at all take a hit from him. This boss is also one of the few
with a tail you are required to chop off for the weapon:
⚔
Dragon King Greataxe (7/50)

If you did summon Solaire doing this is much easier as the dragon will focus on him for a minute
or so until Solaire is killed giving you ample time to focus on the tail, although it really is
irrelevant as the main strategy calls for you to be attacking the dragon from its rear so this
should be accomplished either way.
If you follow this strategy the dragon will use only three maybe four different attacks, the main
ones will be a slam attack in which he smashes his upper body into the ground regardless of your
proximity to it, immediately following the slam he will begin to charge at your position at the time
his slam made contact with the ground. The strategy focuses on these two attacks, when he
slams into the ground begin running to the side and around the dragon coming up to its rear
when it stops it's charge and taking a couple of shots at it's tail until it's cut off and then at it's
back/stump while wielding your weapon with two hands and then running as far away as possible
and repeating the process. The other attacks you may encounter are a swipe if you get too close,
a possible grab attack if he really gets close to you and an attack where he floats up into the air
and slams down, all of these are easily avoided so long as you keep your distance and do not rely
on targeting as it is easier to manoeuvre without it.
When you have killed the dragon you will receive 25,000 souls, Twin Humanities, Homeward

Bone and the Blighttown Key as well as the Dragon King Greataxe so long as you removed the
tail. If you look around the arena you can also find a corpse with the Warrior Set (minus the
helmet) on it.
That is everything we can do in The Depths, we now have access to Blighttown however we will
explore some other areas first, for now return to Firelink Shrine.
When you arrive you can find Laurentius up some steps and to the left overlooking the bonfire,
speak to him and say No and he will give you the Pyromancy Flame item, equip this to be able to
use pyromancy spells. For a combined total of 13,300 souls, the Pyromancies available are:
🔥
Fire Orb (1/19)
🔥
Combustion (2/19)
🔥
Iron Flesh (3/19)
🔥
Flash Sweat (4/19)
🔥
Fireball (5/19)
The next thing we are going to do is return to the Undead Asylum. To achieve this head to the
elevators to the Undead Parish and begin to ride it up but just after it begins to move you can
walk off of the elevator and onto the stone structure that covers the elevators entrance. From
here walk to the right to the end of a small cliff and if you look directly ahead of you there will be
a tower with a stone support beam-like thing protruding from it. The aim now is to roll from the
cliff onto this beam and enter the window. It may take a couple of attempts but is doable with
practice.
When you manage to enter the window, head up the steps to the first landing and you should be
able to see a corpse sitting on a rooftop, roll down and inspect it to pick up the Undead Asylum
F2 West Key, this is what we need for our trip back. Head to the other end of the roof and drop
down then make the trip back up to the stairs you rolled off of, go up the next set and follow the
walkway around the outside until you reach a large bird nest, stand inside and select to curl up
like a ball, after a few moments you will be taken back to...
8. Undead Asylum Pt 2 to Darkroot Basin
Head down the hill and kill the group of Hollows standing at the bottom, before going inside head
back up the hill just before walking up between the two crumbling walls, on the right at the end
of a ledge is another nest, this is for Snuggly the Crow, if you place certain items in the nest and
then quit and reload your game it will be replaced by a newer better item, a lot of the stuff
Snuggly wants you either do not have or it is not worth the trouble, for the moment place one of
each of the following, Purple Moss Clump, Bloodred Moss Clump, Blooming Purple Moss Clump

and Rubbish, for these you will receive four pieces of Twinkling Titanite in total and one Titanite
Chunk, make sure to do these one at a time, if you drop more than one item it will not work
correctly. When you are done head into the asylum but enter slowly. Do not walk on the central
flooring, doing so will cause it to collapse beneath you and force you into a boss battle, instead
walk around the edges while killing the two Hollows and rest at the bonfire.
From the bonfire you want to take the path that leads back to your cell where your journey
began, in case you need directions, head into the doorway in front of you and slide down the
ladder and just follow the path, when you arrive you will need to do battle with a Black Knight,
the same strategies apply to this one, aim to backstab for a quick fight and avoid taking heavy
hits. When you kill this one you will be rewarded with a Red Titanite Chunk. Head into the cell
now and pick up the Peculiar Doll item from the corpse, return to the bonfire when you have it.
Enter the room where you fought the Asylum Demon again, still avoiding the centre of the room
and enter the door on the left hand wall. Follow it through and face another Black Knight, this
one will also drop a Red Titanite Chunk. Head up the next set of stairs where you will find Oscar,
Knight of Astora in the same cell where he handed you the Estus Flasks, he has now become
hollow, gone mad and will be hostile towards you, kill him and he will drop the needed weapon:
⚔
Crest Shield (8/50)
With Oscar dead head up the stairs but be careful as the boulder trap from the beginning of the
game has been reset, avoid it again and head up to kill the Hollow then continue outside and
around to kill a few more. You should now be in the area where you entered to fog door to face
the Asylum Demon, instead head across through another door and kill two Undead Soldiers to
open the door they guard with the Undead Asylum F2 West Key.
Head through the door and down some steps to pick up the Rusted Iron Ring from a corpse, this
is an important accessory that we will use later on. With everything here done, return to the
courtyard with the bonfire and prepare to take on the boss.
Stray Demon
If you have the Fall Control spell from Griggs use it as the fall can cause you a decent amount of
damage (around half your HP). As soon as you hit the ground locate the Stray Demon and head
towards him, as you can see he is basically a copy of the Asylum Demon, the massive difference
here though is that he has a fire attack that will tear you apart if you aren't careful. The same
basic strategy against the Asylum Demon still applies here, stick to his back to avoid him
swinging his weapon about and back off when he floats up in the air for a slam attack. When the
Stray Demon rears up it is a sign that he is about to use his fire attack, raise your shield and back
off as far as you can to avoid it (it will still damage you through your shield but it will be
considerably lower) he tends to use this attack about 3-5 times in a row, in between each one
run in with your weapon in both hands and hit him a couple of times before backing off again to
avoid the next attack.

It shouldn't be long until you fell the demon, when you do you will be rewarded with 20,000 souls
and the usual Humanity and Homeward Bone, on the ground where the demon died should be a
yellow loot symbol where you can pick up a Titanite Slab. To get out search the corners of the
room, one of which should have a ladder, climb it to enter the corridor to your cell and make your
way outside and back to the peak of the cliff where you can have the crow carry you back to
Firelink Shrine.
When you have returned begin to make your way back to the bonfire above the blacksmith in
Undead Parish, head down and use the 20,000 souls you gained from the Stray Demon to
purchase the Crest of Artorias then return to
Once you reach a door use the Crest of Artorias to unlock it.
Be warned, inside are some tough enemies but if you fight them one at a time and with a bit of
thought they can be overcome easily, these enemies are called the Clan of Forest Protectors.
Head down the steps and stop, if you look into the trees you should be able to see a Knight
though he will be tough to spot as he has the 'fog' effect, to his right a little further in the trees
will be the Sorcerer.
Use your bow to get the attention of the Knight, you want to try and fight him as close to the
door as possible so you do not alert the Sorcerer. The Knight wields a Claymore and will switch

between one and two-handed stances, his attacks are slow but also quite powerful if you get hit
by them, try to get behind him for a backstab or two for an easy kill, once you defeat this Knight
he will not respawn.
Next fire a shot at the Sorcerer, this guy will try to keep his distance most of the time and fire
Homing Soul Arrows at you, use the trees as cover to get close and then get a few attacks in
before he creates distance again, repeat the same method and he should fall. Once the Sorcerer
is dead continue up through the forest sticking close enough to the cliff on the left hand side and
you will see a stone archway, just in front of it will be the Bandit enemy, he will usually wield his
axe two-handed and use slow attacks giving you plenty of opportunity to attack him. With the
Bandit dead look to your right and you will see the Cleric, fire an arrow to get them to come to
you as there is another enemy that will join the fight if you get too close. The Cleric will use
melee to fight until they come down to about 30% HP when that happens they will run away and
use spells to heal themselves and any other fighter in the fray, do your best to chase her down
and prevent this. After the Cleric, head towards the spot she was standing but keep your guard
up, the Thief is close by using the 'fog' status like the Knight though a little harder to see, the
Thief is more or less a tougher version of the Undead Assassin's in Lower Undead Burg so you
should be able to defeat them easily.
From the Thief continue forwards and you should find a second Knight, he is an exact copy of the
one you killed earlier and just like the previous one will not respawn once he has been defeated.
Finally from the Knight continue searching in the general area and you should find the Hunter,
she will keep her distance and use her bow for most of the fight, employ the same strategy used
with the Sorcerer, using the trees as cover and getting a couple of shots in, the only danger is if
she backtracks too far you may have to deal with Demonic Foliage as well as her. Once she is
dead she will drop Pharis's Hatand the Black Bow of Pharis she will not respawn after this. With
all the Forest Clan defeated you can either go back to the bonfire and use this as a good soul
farming area (you will get about 7,000 souls per trip once the Knights and Hunter are gone) or
you can head to the stone structure the Bandit was guarding, inside will be a cat named Alvina of
the Darkroot Wood sitting in a window, speak with her and you will be able to join her Covenant
and unlock
Covenant: Forest Hunter
Discover Forest Hunter covenant.
2 guides

Once you have joined you will be given the Cat Covenant Ring, while wearing this and online you
will be transported into the worlds of other players who have trespassed in the forest to defeat
them. You should do this for now until you manage to kill three people, speak to Alvina once you
have and she will reward you with the Ring of Fog, this is a good item that makes it take longer
for enemies to become hostile towards you. The other perk of the Covenant is that while you are
in it the Forest Clansmen will not attack you, but that does not give you permission to kill them,
doing so will mean you have betrayed the Covenant and you will not be able to rejoin until New
Game+ or you can see Oswald in the bell tower of Undead Parish and compensate him to absolve
you of your sins.
Whether you joined and got the new ring or not the next step is to head through the other
archway and down some stairs. In this area the main enemies you will encounter are Great
Felines (there are three and once dead will not respawn) Mushroom Children and Mushroom
Parents.
At the bottom of the structure head left and around the back of it to find a chest containing the
Stone Set, this has great defence but is extremely heavy and chances are you can't handle the
weight of it at the moment without being encumbered. If you head to the far right of this area
(dont worry about the Mushroom Children they will ignore you) you should come to a ledge and
on the other side of a ditch like area will be the three Great Felines, these can be quite difficult
especially if you get stuck fighting two or even all three at once. They tend to attack with a biting
motion but occasionally will roll up in to a ball and come speeding towards you, the only defence
against this attack is to dodge it as it cannot be blocked, for each one you kill you will receive
2,000 souls, and as mentioned above they will not spawn again, in the same area as the Felines
should be a corpse with a Large Soul of a Brave Warrior.
Head back towards the stone structure and in the centre of the forest you should see a pool of
water with two Mushroom Parents guarding a chest, if you step into the water the Mushroom
Parent you are close to will become hostile, these guys are tough and pack a mean punch but
they are slow and predictable so once you learn their pattern it should be simple to bring them
down. The Mushrooms have three attacks, a right hook, a right/left hook combo and a massive
right-hand haymaker, the simplest strategy is to back away when they do their hook then move in
closer to tease them into throwing a second punch completing the combo attack, it is this small
timeframe where you have the chance to attack and back off ready for the next swing. They also

leave an opening at the end of their haymaker attack which you should be able to recognize as
they lean back and swing their fist much harder than a regular punch.
Once you have killed both Mushroom Parents open the chest in the water for the Enchanted
Ember. The next step is to search around the end of the map for one of two glowing flowers, the
correct one will be beside a slope leading down, follow the path across a bridge and to a large
door, inside will be the next and one of my personal favourite bosses.
Sif, the Great Grey Wolf
Before you enter the door make sure you equip the shield you own with the highest stability stat,
this will be important for blocking Sif's attacks. Sif can be a tough boss to beat but if you
concentrate on his pattern you should be ok. Sif uses the following attacks -
- Two circular slashes from right to left and then left to right.
- A jump backwards with an upwards slash.
- When at long range Sif will use a charging slash attack, this is a deadly one to be hit by.
- A 3-hit combo, Sif will do the same two circular slashes as before but will end it with an attack
where he slams the sword into the ground directly in front of him.
- A single sword slam, you can pre-empt this as Sif will rise up on his back legs before bringing
the sword down, to avoid this just run/roll to the side.
To begin the battle once you have walked through the doors simply approach the tombstone with
the large sword leaning on it in the centre of the clearing, once the battle starts let Sif get close
to you, the two circular slashes are the most common attack he will use and the strategy I use is
to step back avoiding the first slash and then sprint towards Sif and roll under the second, if you
did this right you should be under Sif's belly where most if not all of his attacks will be unable to
reach you, take a couple of swings and then get your guard up as he will usually use his jump
slash attack at some point to get some distance, continue with this method and Sif will soon be
dead.

When he dies you will be awarded 40,000 souls, the Covenant of Artorias ring, the Soul of Sif,
one Humanity and a Homeward Bone, you will also unlock
Art of Abysswalking
Acquire the Art of Abysswalking.
4 guides

Before you leave the area, look on the other side of the tombstone and pick up the Hornet Ring,
that is all we can do in the main area of Darkroot Garden, next head in the direction as if you were
returning to the blacksmith in Undead Parish, when you are almost there you should see the path
split and go up a hill on the left (it should be when you walk through a puddle of water), head up
and then down a slope that will continue to go on for a while, you will soon be told that you have
entered
Around the time the Darkroot Basin alert shows on screen you should see a bright glow not too
far in the distance, that is a Crystal Lizard, if you can chase it down and kill it you will get two
Twinkling Titanite and two Large Titanite Shards. Continue down the winding path and you will
get to a point where you can either take a lower path or one that's on the same level as you, take
the latter and at the end you can drop down to a corpse and pick up the rest of the Hunter Set as
well as a Longbow and sixteen Feather Arrows, from the small platform drop down over the ledge
to the path below you.
You now have to option of going left or going right, take the right path for now and when you get
to the point the path curves and heads a little further down you should be able to see a Halberd
wielding Black Knight, fighting him on this thin path is a sure way to get yourself killed, either
directly by the knight or from falling, use your bow or get a little close to him and make him
chase you up the path to more stable ground and take him down, killing him will get you a Blue
Titanite Chunk.
Continue down the path he was blocking, at the very bottom is a Grass Crest Shield, when you
head back up you should see a tunnel, head inside to find the areas bonfire. You will need to get
yourself ready here as we are about to take on a very frustrating mini-boss, the Hydra. While at
the bonfire, organise your equipment, ensure you have the Rusted Iron Ring equipped as this is
an essential accessory, if you have the Ring of Fog it is best to wear that, if not then then Wolf
Ring or the Ring of Favour and Protection would be best (remember this will break once removed
so wear it at your own risk). Also make sure you are using a shield with high magic defence such
as the Crest Shield (it reduces magic damage 80%), you can now head out and up the winding
path, this time take the trail that extends to the left.
When you come into the clearing you should see a group of new enemies, these are Crystal
Golems, in the centre of them against a tree you can also find a Soul of a Nameless Soldier. The
golems themselves aren't the toughest bunch but they do have a powerful attack that can
devastate you and cause the curse status. Most of their attacks are basic and easy to avoid, just
walk in a circle keeping your guard up and rolling back if need be. The one motion to look out for

is when they raise both arms into the air, when they do this roll away and get some distance, a
crop of crystals will raise out of the ground, this can cause heavy magic damage as well as cause
curse so avoid being hit by it at all costs.
To be on the safe side use your bow to single them out one at a time, be careful how far down
the hill you go, if you do not have the Ring of Fog on the Hydra may spot you from afar and begin
firing its magic attack at you which is more than likely going to result in your death. On the left is
the best spot, you will see one of the golems on a bit of a hill, if you get to where he is you can
shoot arrows to lure the others to you while using the mountain as cover from the Hydras sight
and attacks.
Once all golems are dead charge down as fast as you can and get yourself about knee deep in
the water (maybe a little more but be careful, if you look into the water you can see where the
ground ends, going any further will mean your death) when you are this close the Hydra will stop
using it's magic attack and instead launch it's heads at you, keep your guard up to block them
and then pick a head and start chopping, when it pulls them back make sure you are back in the
water to stop him firing any shots at you and ensuring he attacks with his heads again, each head
you remove will make things easier as he will have less to attack with and if he does shoot his
magic attack there will be less blasts heading your way making them much easier to avoid,
should you die though all head will be back when you return. When you get down to the last head
or two sometimes it will be difficult to attack them because they either land too far away or they
